<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>险地探索 - 江湖将将胡</title>
<style>
/* ════════════════════════════════════════════════════
   dungeon.html - 独立地下城页面
   ════════════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --gold:#f0c060; --gold2:#e08010; --gold3:#ffe8a0; --dark:#050410;
  --panel:rgba(5,4,16,.97); --border:rgba(240,192,96,.18);
  --glow:rgba(240,192,96,.3); --glow2:rgba(240,192,96,.5);
}

body{
  background:var(--dark);color:#e8d5a3;
  font-family:'Courier New','微软雅黑',monospace;
  overflow-x:hidden;min-height:100vh;user-select:none;
  background-image:
    radial-gradient(ellipse at 15% 15%,rgba(28,12,80,.55) 0%,transparent 45%),
    radial-gradient(ellipse at 85% 80%,rgba(50,5,28,.5) 0%,transparent 45%),
    radial-gradient(ellipse at 50% 0%,rgba(12,6,40,.4) 0%,transparent 40%),
    radial-gradient(ellipse at 50% 100%,rgba(8,2,16,.6) 0%,transparent 40%),
    radial-gradient(ellipse at 50% 50%,rgba(5,4,16,1) 0%,rgba(2,1,8,1) 100%);
}

/* 粒子背景canvas */
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.55;}

/* 全局扫描线叠层 */
body::before{
  content:'';position:fixed;top:0;left:0;width:100%;height:100%;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);
  pointer-events:none;z-index:1;opacity:.4;
}

/* ── 顶栏 ── */
.title-bar{
  text-align:center;padding:20px 16px 14px;
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,rgba(2,1,8,1) 0%,rgba(4,2,14,.99) 60%,rgba(6,4,20,.97) 100%);
  position:relative;z-index:10;overflow:hidden;
  box-shadow:0 4px 40px rgba(0,0,0,.7), 0 1px 0 rgba(240,192,96,.08);
  display:flex;align-items:center;justify-content:center;
}
.title-bar h1{
  font-size:20px;letter-spacing:8px;
  background:linear-gradient(180deg,#fff8d8 0%,#ffdf80 20%,#f0a020 55%,#c87020 85%,#8b4400 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 20px #e08010) drop-shadow(0 0 50px rgba(240,128,16,.35)) drop-shadow(0 2px 4px rgba(0,0,0,.8));
  flex:1;
}
.back-btn{
  background:rgba(40,20,8,.8);border:1px solid rgba(180,100,40,.3);color:#c08040;
  padding:6px 14px;border-radius:5px;cursor:pointer;font-size:12px;letter-spacing:1px;
  transition:all .2s;white-space:nowrap;
}
.back-btn:hover{background:rgba(80,40,10,.8);color:#e0c060;}
.spacer{width:60px;}

/* ════════════════════════════════════════════
   地下城系统样式
   ════════════════════════════════════════════ */
#dungeonContainer{position:relative;z-index:3;min-height:100vh;}
.dg-wrap{max-width:900px;margin:0 auto;padding:16px 12px;}

/* 顶部标题栏 */
.dg-header{
  display:flex;align-items:center;gap:10px;
  background:rgba(20,8,4,.7);border:1px solid rgba(180,100,40,.25);
  border-radius:10px;padding:12px 14px;margin-bottom:12px;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.dg-back-btn{
  background:rgba(40,20,8,.8);border:1px solid rgba(180,100,40,.3);color:#c08040;
  padding:6px 12px;border-radius:5px;cursor:pointer;font-size:11px;letter-spacing:1px;
  transition:all .2s;
}
.dg-back-btn:hover{background:rgba(80,40,10,.8);color:#e0c060;}
.dg-title{flex:1;display:flex;align-items:center;gap:10px;}
.dg-icon{font-size:22px;}
.dg-name{font-size:15px;color:#d0a050;letter-spacing:2px;}
.dg-level{font-size:11px;color:rgba(180,150,100,.6);background:rgba(0,0,0,.3);padding:2px 8px;border-radius:10px;}
.dg-progress-badge{font-size:11px;color:#4ecb71;background:rgba(40,100,40,.25);padding:3px 10px;border-radius:10px;border:1px solid rgba(80,180,80,.2);}

/* 玩家状态条 */
.dg-status-bar{
  background:rgba(20,8,4,.7);border:1px solid rgba(180,100,40,.25);
  border-radius:10px;padding:12px 14px;margin-bottom:12px;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.dg-stat-item{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.dg-stat-item:last-child{margin-bottom:0;}
.dg-stat-label{font-size:11px;color:rgba(180,150,100,.7);width:40px;letter-spacing:1px;}
.dg-bar-track{flex:1;height:14px;background:rgba(2,1,6,.98);border-radius:7px;border:1px solid rgba(240,192,96,.1);overflow:hidden;position:relative;box-shadow:inset 0 2px 6px rgba(0,0,0,.7);}
.dg-bar-fill{height:100%;border-radius:7px;transition:width .25s ease;position:relative;overflow:hidden;}
.dg-bar-fill::before{content:'';position:absolute;top:0;width:30%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);animation:hpScan 2.5s linear infinite;pointer-events:none;}
.dg-bar-fill::after{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:rgba(255,255,255,.15);border-radius:7px;}
@keyframes hpScan{0%{left:-40%}100%{left:110%}}
.dg-stat-num{font-size:10px;color:rgba(200,180,140,.8);width:60px;text-align:right;}
.dg-lives-row{display:flex;align-items:center;}
.dg-lives-icons{font-size:14px;letter-spacing:2px;}
.dg-progress-bar{position:relative;height:16px;background:rgba(2,1,6,.98);border-radius:8px;border:1px solid rgba(240,192,96,.1);overflow:hidden;margin-top:10px;}
.dg-progress-fill{height:100%;background:linear-gradient(90deg,#4ecb71,#7ed957);border-radius:8px;transition:width .3s ease;}
.dg-progress-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:10px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.8);letter-spacing:1px;}

/* 主体布局 */
.dg-main{display:flex;gap:12px;flex-wrap:wrap;}
.dg-map-wrap{flex:1;min-width:280px;background:rgba(20,8,4,.7);border:1px solid rgba(180,100,40,.25);border-radius:10px;padding:14px;box-shadow:0 4px 20px rgba(0,0,0,.4);}
.dg-map-title{font-size:12px;color:#d0a050;letter-spacing:2px;margin-bottom:10px;text-align:center;border-bottom:1px solid rgba(180,100,40,.2);padding-bottom:8px;}
.dg-map{display:flex;flex-direction:column;gap:4px;align-items:center;}
.dg-map-row{display:flex;gap:4px;justify-content:center;}
.dg-cell{width:36px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:16px;border:1px solid transparent;}
.dg-cell:hover{transform:scale(1.05);}
.dg-wall{background:transparent;pointer-events:none;}
.dg-fog{background:rgba(10,8,6,.6);border-color:rgba(100,80,60,.2);color:rgba(100,80,60,.4);}
.dg-known{background:rgba(30,24,16,.5);border-color:rgba(120,100,70,.3);color:rgba(180,160,120,.6);}
.dg-adjacent{background:rgba(50,40,24,.6);border-color:rgba(180,140,60,.4);color:#d0a050;cursor:pointer;}
.dg-adjacent:hover{background:rgba(70,56,32,.7);border-color:rgba(220,180,80,.5);box-shadow:0 0 10px rgba(240,192,96,.2);}
.dg-player{background:linear-gradient(135deg,rgba(240,192,96,.3),rgba(180,140,60,.2));border-color:var(--gold);color:#fff;box-shadow:0 0 15px rgba(240,192,96,.3);animation:playerPulse 2s ease-in-out infinite;}
@keyframes playerPulse{0%,100%{box-shadow:0 0 10px rgba(240,192,96,.2)}50%{box-shadow:0 0 20px rgba(240,192,96,.4)}}
.dg-cleared{background:rgba(40,60,40,.4);border-color:rgba(100,150,100,.3);color:rgba(150,200,150,.5);}
.dg-dir-hint{text-align:center;font-size:10px;color:rgba(180,150,100,.5);margin-top:10px;padding-top:8px;border-top:1px solid rgba(180,100,40,.15);}

/* 房间面板 */
.dg-room-panel{flex:1;min-width:280px;max-width:380px;background:rgba(20,8,4,.7);border:1px solid rgba(180,100,40,.25);border-radius:10px;padding:14px;box-shadow:0 4px 20px rgba(0,0,0,.4);}
.dg-room-icon{font-size:42px;text-align:center;margin-bottom:8px;}
.dg-room-type{font-size:14px;color:#d0a050;letter-spacing:3px;text-align:center;margin-bottom:8px;border-bottom:1px solid rgba(180,100,40,.2);padding-bottom:8px;}
.dg-room-desc{font-size:12px;color:rgba(200,180,150,.8);line-height:1.7;margin-bottom:12px;min-height:60px;}
.dg-cleared-badge{display:inline-block;background:rgba(80,150,80,.25);color:#7ed957;padding:4px 12px;border-radius:10px;font-size:11px;border:1px solid rgba(100,200,100,.3);margin-bottom:10px;}
.dg-actions{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.dg-action-btn{flex:1;min-width:80px;padding:10px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;letter-spacing:1px;transition:all .2s;font-family:inherit;color:#fff;}
.dg-action-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3);}
.dg-action-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none;}
.dg-fight-btn{background:linear-gradient(135deg,#c05040,#e07050);}
.dg-fight-btn:hover{background:linear-gradient(135deg,#d06050,#f08060);}
.dg-boss-btn{background:linear-gradient(135deg,#802040,#c04060);}
.dg-boss-btn:hover{background:linear-gradient(135deg,#903050,#d05070);}
.dg-chest-btn{background:linear-gradient(135deg,#408060,#60b080);}
.dg-chest-btn:hover{background:linear-gradient(135deg,#509070,#70c090);}
.dg-trap-btn{background:linear-gradient(135deg,#805020,#b07040);}
.dg-trap-btn:hover{background:linear-gradient(135deg,#906030,#c08050);}
.dg-rest-btn{background:linear-gradient(135deg,#2060a0,#4080c0);}
.dg-rest-btn:hover{background:linear-gradient(135deg,#3070b0,#5090d0);}
.dg-event-btn{background:linear-gradient(135deg,#6040a0,#8060c0);}
.dg-event-btn:hover{background:linear-gradient(135deg,#7050b0,#9070d0);}
.dg-exit-btn{background:linear-gradient(135deg,#505050,#707070);}
.dg-exit-btn:hover{background:linear-gradient(135deg,#606060,#808080);}
.dg-meditate-btn{background:linear-gradient(135deg,#406080,#6080a0);}
.dg-meditate-btn:hover{background:linear-gradient(135deg,#507090,#7090b0);}
.dg-item-btn{background:linear-gradient(135deg,#608040,#80b060);}
.dg-item-btn:hover{background:linear-gradient(135deg,#709050,#90c070);}
.dg-collect-btn{background:linear-gradient(135deg,#805020,#b07030);}
.dg-collect-btn:hover{background:linear-gradient(135deg,#906028,#c08038);}
.dg-action-btn{background:linear-gradient(135deg,#404040,#606060);}

/* 地下城药品选择面板 */
.dg-item-panel{
  position:absolute; bottom:70px; left:50%; transform:translateX(-50%);
  width:min(320px,90vw); background:rgba(15,10,5,.97);
  border:1px solid rgba(180,130,40,.5); border-radius:10px;
  box-shadow:0 4px 24px rgba(0,0,0,.7); z-index:999;
  overflow:hidden; font-size:13px;
}
.dip-header{
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 14px; border-bottom:1px solid rgba(180,130,40,.3);
  color:#d0a040; font-size:13px; letter-spacing:1px; font-weight:bold;
}
.dip-close{
  background:none; border:none; color:#a06030; cursor:pointer;
  font-size:16px; padding:2px 4px; line-height:1;
}
.dip-list{ max-height:240px; overflow-y:auto; padding:6px 0; }
.dip-row{
  display:flex; align-items:center; gap:10px;
  padding:8px 14px; cursor:pointer; transition:background .15s;
  border-bottom:1px solid rgba(180,130,40,.12);
}
.dip-row:last-child{ border-bottom:none; }
.dip-row:hover{ background:rgba(180,130,40,.12); }
.dip-icon{ font-size:20px; flex-shrink:0; }
.dip-info{ flex:1; min-width:0; }
.dip-name{ color:#d4b06a; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.dip-qty{ color:#888; font-size:11px; }
.dip-eff{ font-size:11px; margin-top:2px; display:flex; gap:6px; flex-wrap:wrap; }
.dip-hp{ color:#e06060; }
.dip-mp{ color:#6090e0; }
.dip-detox{ color:#60c060; }
.dip-use-btn{
  flex-shrink:0; padding:4px 10px; border-radius:5px;
  background:rgba(40,80,40,.9); border:1px solid rgba(80,160,80,.5);
  color:#80c080; font-size:12px; cursor:pointer;
}
.dip-row:hover .dip-use-btn{ background:rgba(60,110,60,.9); }

.dg-log{max-height:150px;overflow-y:auto;background:rgba(0,0,0,.3);border-radius:6px;padding:10px;font-size:11px;line-height:1.6;color:rgba(200,180,150,.9);border:1px solid rgba(180,100,40,.15);}

/* ════════════════════════════════════════════
   开箱动画 - 华丽字符画风格
   ════════════════════════════════════════════ */
.chest-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,6,3,.92);display:flex;align-items:center;justify-content:center;z-index:2000;backdrop-filter:blur(10px);opacity:0;pointer-events:none;transition:opacity .4s ease;}
.chest-overlay.active{opacity:1;pointer-events:auto;}

.chest-container{position:relative;width:min(360px,90vw);height:400px;display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* 背景光效 */
.chest-bg-glow{position:absolute;width:min(300px,80vw);height:min(300px,80vw);background:radial-gradient(circle,rgba(240,192,96,.25) 0%,rgba(200,140,40,.1) 40%,transparent 70%);border-radius:50%;animation:bgGlow 3s ease-in-out infinite;}
@keyframes bgGlow{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.3);opacity:1}}

/* 放射光线 */
.chest-rays{position:absolute;width:min(400px,90vw);height:min(400px,90vw);background:conic-gradient(from 0deg,transparent 0deg,rgba(240,192,96,.1) 20deg,transparent 40deg,rgba(240,192,96,.08) 60deg,transparent 80deg,rgba(240,192,96,.1) 100deg,transparent 120deg,rgba(240,192,96,.08) 140deg,transparent 160deg,rgba(240,192,96,.1) 180deg,transparent 200deg,rgba(240,192,96,.08) 220deg,transparent 240deg,rgba(240,192,96,.1) 260deg,transparent 280deg,rgba(240,192,96,.08) 300deg,transparent 320deg,rgba(240,192,96,.1) 340deg,transparent 360deg);border-radius:50%;animation:rayRotate 8s linear infinite;opacity:0;transition:opacity .5s;}
.chest-overlay.active .chest-rays{opacity:1;}
@keyframes rayRotate{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}

/* 宝箱字符画包装 */
.chest-ascii-wrapper{position:relative;width:200px;height:140px;display:flex;align-items:center;justify-content:center;z-index:10;}

/* 闭合的宝箱 */
.chest-ascii{position:absolute;font-size:11px;line-height:1.3;color:#c09050;font-family:'Courier New',monospace;text-align:center;white-space:pre;filter:drop-shadow(0 4px 8px rgba(0,0,0,.6)) drop-shadow(0 0 20px rgba(192,144,80,.3));animation:chestIdle 2s ease-in-out infinite;transition:all .3s;}
@keyframes chestIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* 宝箱打开动画 */
.chest-ascii.opening{animation:chestShake .5s ease-in-out,chestFadeOut .3s ease-out .5s forwards;}
@keyframes chestShake{0%,100%{transform:translateX(0) rotate(0)}15%{transform:translateX(-8px) rotate(-5deg)}30%{transform:translateX(8px) rotate(5deg)}45%{transform:translateX(-6px) rotate(-3deg)}60%{transform:translateX(6px) rotate(3deg)}75%{transform:translateX(-3px) rotate(-1deg)}90%{transform:translateX(3px) rotate(1deg)}}
@keyframes chestFadeOut{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.1) rotate(-5deg)}}

/* 打开的宝箱 */
.chest-ascii-open{position:absolute;font-size:11px;line-height:1.3;color:#d4a060;font-family:'Courier New',monospace;text-align:center;white-space:pre;filter:drop-shadow(0 4px 8px rgba(0,0,0,.6)) drop-shadow(0 0 30px rgba(240,192,96,.5));opacity:0;transform:scale(.8);transition:all .4s cubic-bezier(0.175,0.885,0.32,1.275);}
.chest-ascii-open.show{opacity:1;transform:scale(1);animation:chestOpenPop .5s cubic-bezier(0.175,0.885,0.32,1.275),chestGlowPulse 2s ease-in-out infinite .5s;}
@keyframes chestOpenPop{0%{transform:scale(.5) translateY(20px);opacity:0}50%{transform:scale(1.1) translateY(-5px)}100%{transform:scale(1) translateY(0);opacity:1}}
@keyframes chestGlowPulse{0%,100%{filter:drop-shadow(0 4px 8px rgba(0,0,0,.6)) drop-shadow(0 0 20px rgba(240,192,96,.3))}50%{filter:drop-shadow(0 4px 8px rgba(0,0,0,.6)) drop-shadow(0 0 40px rgba(240,192,96,.6))}}

/* 闪光粒子 */
.chest-particles{position:absolute;width:100%;height:100%;pointer-events:none;}
.chest-particles span{position:absolute;font-size:14px;color:#f0c060;opacity:0;text-shadow:0 0 10px #f0c060,0 0 20px #f0c060;}
.chest-particles .p1{top:15%;left:20%;animation:particleBurst .8s ease-out .6s forwards;}
.chest-particles .p2{top:25%;left:75%;animation:particleBurst .8s ease-out .7s forwards;}
.chest-particles .p3{top:40%;left:15%;animation:particleBurst .8s ease-out .8s forwards;}
.chest-particles .p4{top:55%;left:80%;animation:particleBurst .8s ease-out .9s forwards;}
.chest-particles .p5{top:30%;left:50%;animation:particleBurst .8s ease-out 1s forwards;}
.chest-particles .p6{top:65%;left:25%;animation:particleBurst .8s ease-out 1.1s forwards;}
.chest-particles .p7{top:70%;left:70%;animation:particleBurst .8s ease-out 1.2s forwards;}
.chest-particles .p8{top:45%;left:35%;animation:particleBurst .8s ease-out 1.3s forwards;}
.chest-particles .p9{top:20%;left:60%;animation:particleBurst .8s ease-out 1.4s forwards;}
.chest-particles .p10{top:75%;left:45%;animation:particleBurst .8s ease-out 1.5s forwards;}
.chest-particles .p11{top:10%;left:40%;animation:particleBurst .8s ease-out 1.6s forwards;}
.chest-particles .p12{top:60%;left:55%;animation:particleBurst .8s ease-out 1.7s forwards;}
@keyframes particleBurst{0%{transform:scale(0) rotate(0);opacity:1}50%{transform:scale(1.5) rotate(180deg);opacity:.8}100%{transform:scale(0) rotate(360deg) translateY(-30px);opacity:0}}

/* 奖励展示 */
.chest-reward{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%) scale(0);text-align:center;opacity:0;z-index:20;}
.chest-reward.show{animation:rewardPop .7s cubic-bezier(0.175,0.885,0.32,1.275) 1.2s forwards;}
@keyframes rewardPop{0%{transform:translate(-50%,-50%) scale(0);opacity:0}50%{transform:translate(-50%,-50%) scale(1.3)}70%{transform:translate(-50%,-50%) scale(.9)}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}

.chest-reward-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:120px;height:120px;background:radial-gradient(circle,rgba(240,192,96,.4) 0%,transparent 70%);border-radius:50%;animation:rewardGlowPulse 1.5s ease-in-out infinite;}
@keyframes rewardGlowPulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.6}50%{transform:translate(-50%,-50%) scale(1.3);opacity:1}}

.chest-reward-icon{position:relative;font-size:56px;margin-bottom:12px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.5));animation:rewardIconGlow 2s ease-in-out infinite;z-index:21;}
@keyframes rewardIconGlow{0%,100%{filter:drop-shadow(0 4px 12px rgba(0,0,0,.5)) drop-shadow(0 0 15px rgba(240,192,96,.4))}50%{filter:drop-shadow(0 4px 12px rgba(0,0,0,.5)) drop-shadow(0 0 35px rgba(240,192,96,.8))}}

.chest-reward-name{position:relative;font-size:18px;color:#f0c060;font-weight:bold;letter-spacing:3px;text-shadow:0 2px 10px rgba(0,0,0,.9),0 0 20px rgba(240,192,96,.3);margin-top:8px;z-index:21;}
.chest-reward-qty{position:relative;font-size:16px;color:#e8d5a3;margin-top:6px;text-shadow:0 2px 6px rgba(0,0,0,.8);z-index:21;}

/* 获得提示文字 */
.chest-get-text{position:absolute;top:15%;left:50%;transform:translateX(-50%) scale(0);font-size:24px;font-weight:bold;color:#f0c060;letter-spacing:8px;text-shadow:0 2px 10px rgba(0,0,0,.8),0 0 30px rgba(240,192,96,.5);opacity:0;z-index:15;white-space:nowrap;}
.chest-get-text.show{animation:getTextPop .6s cubic-bezier(0.175,0.885,0.32,1.275) 1s forwards;}
@keyframes getTextPop{0%{transform:translateX(-50%) scale(0);opacity:0}50%{transform:translateX(-50%) scale(1.2);opacity:1}100%{transform:translateX(-50%) scale(1);opacity:1}}

/* 关闭按钮 */

.chest-close.show{opacity:1;pointer-events:auto;animation:closeBtnIn .4s cubic-bezier(0.175,0.885,0.32,1.275) 2s forwards;}
@keyframes closeBtnIn{0%{transform:translateX(-50%) scale(.8);opacity:0}100%{transform:translateX(-50%) scale(1);opacity:1}}
.chest-close:hover{background:linear-gradient(135deg,#d09050,#f0b070);transform:translateX(-50%) translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.3);}

/* 确认弹窗 */

.dgc-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(180,120,50,.2);}

.dgc-desc{font-size:12px;color:rgba(200,180,150,.8);line-height:1.7;margin:12px 0;padding:10px;background:rgba(0,0,0,.3);border-radius:6px;border-left:3px solid rgba(180,120,50,.4);}
.dgc-save-hint{font-size:11px;color:rgba(180,160,100,.7);margin-top:10px;padding:8px;background:rgba(80,120,80,.15);border-radius:6px;border:1px solid rgba(100,180,100,.2);}

.dgc-btns{display:flex;gap:10px;margin-top:16px;}

/* 事件弹窗 */

/* Toast提示 */

  .chest-particles span{font-size:11px;}
}
</style>

<script>
// ════════════════════════════════════════════════════
// dungeon.html - 独立地下城页面脚本
// ════════════════════════════════════════════════════

// ── 经验函数桥接（level-system.js 提供 addPlayerExp）──
if(typeof gainExp !== 'function'){
  window.gainExp = function(amount, source){
    if(typeof addPlayerExp === 'function'){
      addPlayerExp(amount, source || '地下城');
    }
  };
}

// 全局状态（edS 在 editor.js 中定义，这里使用 playerSave 存储存档数据）
let playerSave = null;

// 初始化 - 等待所有脚本加载完成
document.addEventListener('DOMContentLoaded', function(){
  console.log('[Dungeon] DOMContentLoaded - 初始化开始');
  
  // 再等待一小段时间确保所有脚本执行完毕
  setTimeout(function initDungeon(){
    // ── 启动地下城 BGM ──
    if(typeof BgmManager !== 'undefined') BgmManager.play('dungeon');

    console.log('[Dungeon] 延迟初始化执行');
    console.log('[Dungeon] edS 状态:', typeof edS !== 'undefined' ? '已定义' : '未定义');
    console.log('[Dungeon] enterDungeon 状态:', typeof enterDungeon !== 'undefined' ? '已定义' : '未定义');
    console.log('[Dungeon] DUNGEON_DB 状态:', typeof DUNGEON_DB !== 'undefined' ? '已定义' : '未定义');
    
    // 加载玩家存档
    loadPlayerSave();
    console.log('[Dungeon] playerSave:', playerSave ? ('已加载: ' + (playerSave.name || '无名')) : '未加载');
    
    // 检查URL参数
    const params = new URLSearchParams(window.location.search);
    const dungeonId = params.get('dungeon');
    console.log('[Dungeon] dungeonId:', dungeonId);
    
    if(dungeonId && typeof enterDungeon === 'function'){
      console.log('[Dungeon] 准备进入地下城...');
      // 同步到 edS（用于兼容 dungeon.js）
      syncToEdS();
      console.log('[Dungeon] 调用 enterDungeon');
      enterDungeon(dungeonId, 'town');
    } else {
      console.log('[Dungeon] 条件不满足，显示列表或错误');
      // 显示地下城列表或错误
      showDungeonList();
    }
  }, 200); // 200ms 延迟确保所有脚本加载完成
});

// 加载玩家存档
function loadPlayerSave(){
  try {
    console.log('[loadPlayerSave] 开始加载存档...');
    
    // 调试：列出所有 wuxia_ 开头的 localStorage 键
    console.log('[loadPlayerSave] 可用的存档键:');
    for(let i = 0; i < localStorage.length; i++){
      const key = localStorage.key(i);
      if(key && key.startsWith('wuxia_')){
        const val = localStorage.getItem(key);
        console.log('  -', key, ':', val ? (val.substring(0, 50) + '...') : '空');
      }
    }
    
    // 1. 优先从 wuxia_player_progress 加载经验值（battle.js 的 addPlayerExp 保存到这里，最实时）
    let progressData = null;
    const progressRaw = localStorage.getItem('wuxia_player_progress');
    if(progressRaw){
      progressData = JSON.parse(progressRaw);
      console.log('[loadPlayerSave] 从 wuxia_player_progress 读取:', 'Lv.' + (progressData.level || 1), 'Exp:' + (progressData.totalExp || 0));
    }
    
    // 2. 从 wuxia_player_profile 加载基础数据
    const profileSave = localStorage.getItem('wuxia_player_profile');
    if(profileSave){
      const profileData = JSON.parse(profileSave);
      playerSave = convertProfileToEdS(profileData);
      // 用 progress 的经验值覆盖（如果有的话）
      if(progressData && progressData.totalExp !== undefined){
        playerSave.totalExp = progressData.totalExp;
        playerSave.level = progressData.level || playerSave.level || 1;
        console.log('[loadPlayerSave] 用 wuxia_player_progress 的经验覆盖:', 'Lv.' + playerSave.level, 'Exp:' + playerSave.totalExp);
      }
      console.log('[loadPlayerSave] 从 wuxia_player_profile 加载存档:', playerSave.name, 'Lv.' + playerSave.level, 'Exp:' + playerSave.totalExp);
      return;
    }
    console.log('[loadPlayerSave] wuxia_player_profile 不存在');
    
    // 2. 尝试从 wuxia_save 加载（完整存档）
    const save = localStorage.getItem('wuxia_save');
    if(save){
      playerSave = JSON.parse(save);
      console.log('[loadPlayerSave] 从 wuxia_save 加载存档:', playerSave.name, 'Lv.' + playerSave.level);
      return;
    }
    console.log('[loadPlayerSave] wuxia_save 不存在');
    
    // 3. 尝试从 wuxia_editor 加载（editor.js 使用的格式）
    const editorSave = localStorage.getItem('wuxia_editor');
    if(editorSave){
      playerSave = JSON.parse(editorSave);
      console.log('[loadPlayerSave] 从 wuxia_editor 加载存档:', playerSave.name, 'Lv.' + playerSave.level);
      return;
    }
    console.log('[loadPlayerSave] wuxia_editor 不存在');
    
    // 4. 尝试从 wuxia_travel 加载（旅行系统存档）- 注意：travel.state 可能不是完整角色数据
    const travelSave = localStorage.getItem('wuxia_travel');
    if(travelSave){
      const travelData = JSON.parse(travelSave);
      console.log('[loadPlayerSave] wuxia_travel 数据:', travelData);
      // 优先使用 travelData.state.player 或 travelData.player（如果存在）
      if(travelData.state && travelData.state.player){
        playerSave = convertTravelToEdS(travelData.state.player);
        console.log('[loadPlayerSave] 从 wuxia_travel.state.player 加载存档:', playerSave.name, 'Lv.' + playerSave.level);
        return;
      }
      // 如果 state 里有 name，直接用 state
      if(travelData.state && travelData.state.name && travelData.state.name !== '无名侠客'){
        playerSave = convertTravelToEdS(travelData.state);
        console.log('[loadPlayerSave] 从 wuxia_travel.state 加载存档:', playerSave.name, 'Lv.' + playerSave.level);
        return;
      }
      // 尝试直接使用 travelData（兼容旧格式）
      if(travelData.name && travelData.name !== '无名侠客'){
        playerSave = convertTravelToEdS(travelData);
        console.log('[loadPlayerSave] 从 wuxia_travel 直接加载存档:', playerSave.name, 'Lv.' + playerSave.level);
        return;
      }
    }
    console.log('[loadPlayerSave] wuxia_travel 不存在或格式不正确');
    
    // 5. 尝试从 travelPlayerState 内存变量加载（如果在同一页面）
    if(typeof travelPlayerState !== 'undefined' && travelPlayerState){
      playerSave = convertTravelToEdS(travelPlayerState);
      console.log('[loadPlayerSave] 从 travelPlayerState 内存变量加载存档:', playerSave.name, 'Lv.' + playerSave.level);
      return;
    }
    console.log('[loadPlayerSave] travelPlayerState 不存在');
    
  } catch(e){
    console.error('[loadPlayerSave] 加载存档失败:', e);
  }
  
  if(!playerSave){
    console.error('[loadPlayerSave] 所有存档源都未找到');
    showToast('未找到角色存档，请先创建角色');
    setTimeout(() => returnToTown(), 2000);
  }
}

// 同步存档数据到 edS（用于兼容依赖 edS 的代码）
function syncToEdS(){
  if(!playerSave) {
    console.error('[syncToEdS] playerSave 为空');
    return;
  }
  
  // 确保 edS 存在（editor.js 中定义）
  if(typeof edS === 'undefined') {
    console.error('[syncToEdS] edS 未定义，editor.js 可能未加载');
    // 创建临时 edS 对象以避免崩溃
    window.edS = {};
  }
  
  // 将 playerSave 的属性复制到 edS（不重新赋值 edS）
  // ── 先用 wuxia_travel 的百分比血量修正 playerSave.hp ──
  // town.html 里 travelPlayerState.hp 是百分比(0-100)，wuxia_editor 里是绝对值
  // 以 wuxia_travel 为准（更实时），避免地下城读到战斗前的旧存档
  try{
    var _tRaw = localStorage.getItem('wuxia_travel');
    if(_tRaw){
      var _tData = JSON.parse(_tRaw);
      var _tState = _tData.state || {};
      if(_tState.hp != null && _tState.hp > 0){
        var _mhp = playerSave.maxHp || 150;
        // travelState.hp 是百分比（0-100）
        var _realHp = Math.max(1, Math.round(_mhp * _tState.hp / 100));
        console.log('[syncToEdS] 用旅行存档修正血量: pct=' + _tState.hp + '% -> hp=' + _realHp + '/' + _mhp);
        playerSave.hp = _realHp;
      }
      if(_tState.mp != null && _tState.mp > 0){
        var _mmp = playerSave.maxMp || 100;
        var _realMp = Math.round(_mmp * _tState.mp / 100);
        playerSave.mp = _realMp;
      }
    }
  }catch(e){ console.warn('[syncToEdS] travel修正失败:', e); }

  const syncData = {
    name: playerSave.name || '无名侠客',
    level: playerSave.level || 1,
    totalExp: playerSave.totalExp || 0,
    hp: playerSave.hp || 100,
    maxHp: playerSave.maxHp || 100,
    mp: playerSave.mp || 50,
    maxMp: playerSave.maxMp || 50,
    energy: playerSave.energy || 100,
    silver: playerSave.silver || 0,
    str: playerSave.str || 10,
    con: playerSave.con || 10,
    agi: playerSave.agi || 10,
    dex: playerSave.dex || 10,
    int: playerSave.int || 10,
    luk: playerSave.luk || 10,
    spd: playerSave.spd || 10,
    atk: playerSave.atk || 10,
    def: playerSave.def || 5,
    crit: playerSave.crit || 5,
    dodge: playerSave.dodge || 3,
    // 添加战斗需要的额外属性
    maxEnergy: playerSave.maxEnergy || 100,
    gender: playerSave.gender || 'male',
    appearance: playerSave.appearance || {},
    bag: playerSave.bag || [],
    skills: playerSave.skills || [],
    manuals: playerSave.manuals || [],
    sect: playerSave.sect || '',
    reputation: playerSave.reputation || 0,
    fame: playerSave.fame || 0,
    origin: playerSave.origin || '',
    originPts: playerSave.originPts || {},
    primaryPts: playerSave.primaryPts || {}
  };
  
  console.log('[syncToEdS] 准备同步数据:', syncData.name, 'Lv.' + syncData.level);
  
  try {
    Object.assign(edS, syncData);
    console.log('[syncToEdS] 同步完成:', edS.name, 'Lv.' + edS.level, 'HP:' + edS.hp + '/' + edS.maxHp);
    console.log('[syncToEdS] edS 完整状态:', {name: edS.name, level: edS.level, hp: edS.hp, maxHp: edS.maxHp});
  } catch(e) {
    console.error('[syncToEdS] Object.assign 失败:', e);
    // 尝试逐个属性赋值
    for(let key in syncData) {
      try {
        edS[key] = syncData[key];
      } catch(e2) {
        console.error('[syncToEdS] 赋值失败:', key, e2);
      }
    }
  }
}

// 显示地下城列表
function showDungeonList(){
  const container = document.getElementById('dungeonContainer');
  if(!container) return;
  
  const playerLevel = edS ? (edS.level || 1) : 1;
  const cityId = sessionStorage.getItem('wuxia_return_city') || 'luoyang';
  
  let dungeons = [];
  if(typeof DUNGEON_DB !== 'undefined'){
    dungeons = Object.values(DUNGEON_DB).filter(d => {
      // 简单过滤：显示所有不超过玩家等级+10的地下城
      return d.minLevel <= playerLevel + 10;
    });
  }
  
  if(dungeons.length === 0){
    container.innerHTML = `
      <div class="dg-wrap">
        <div class="dg-loading">
          <div class="dg-loading-icon">📍</div>
          <div class="dg-loading-text">附近暂无可探索的险地</div>
        </div>
      </div>`;
    return;
  }
  
  const listHtml = dungeons.map(d => {
    const tooLow = playerLevel < d.minLevel;
    const diff = playerLevel - d.minLevel;
    let diffTag = '';
    if(!tooLow){
      if(diff >= 5) diffTag = '<span class="dg-diff-tag dg-diff-easy">适合</span>';
      else if(diff >= 0) diffTag = '<span class="dg-diff-tag dg-diff-normal">有挑战</span>';
      else diffTag = '<span class="dg-diff-tag dg-diff-hard">危险</span>';
    }
    
    return `
<div class="dg-entrance ${tooLow ? 'locked' : ''}" onclick="${tooLow ? '' : `enterDungeonFromList('${d.id}')`}">
  <span class="dg-ent-icon">${d.icon}</span>
  <div class="dg-ent-info">
    <div class="dg-ent-name">${d.name} <span class="dg-ent-level ${tooLow ? 'dg-low' : ''}">Lv${d.minLevel}~${d.maxLevel}</span>${diffTag}</div>
    <div class="dg-ent-desc">${d.desc.substring(0, 40)}...</div>
  </div>
  <span class="dg-ent-arrow">${tooLow ? '🔒' : '▶'}</span>
</div>`;
  }).join('');
  
  container.innerHTML = `
<div class="dg-wrap">
  <div class="dg-entrance-title">⚔️ 附近险地</div>
  ${listHtml}
</div>`;
}

  const chestReward = document.getElementById('chestReward');

  const chestRewardQty = document.getElementById('chestRewardQty');
  const chestGetText = document.getElementById('chestGetText');
  const chestClose = document.getElementById('chestClose');

  if(!overlay){
    console.error('[playChestAnimation] 找不到chestOverlay元素');
    return;
  }

  console.log('[playChestAnimation] 播放开箱动画，奖励:', reward);

  // 重置动画状态
  chestAscii.classList.remove('opening');
  chestAsciiOpen.classList.remove('show');
  chestReward.classList.remove('show');
  chestGetText.classList.remove('show');
  chestClose.classList.remove('show');

  // 设置奖励内容
  let icon = '🎁';
  let name = '神秘物品';
  let qty = reward.qty || 1;

  // 优先使用meta信息
  if(reward.meta){
    if(reward.meta.icon) icon = reward.meta.icon;
    if(reward.meta.name) name = reward.meta.name;
  }
  // 其次使用reward.name
  else if(reward.name){
    name = reward.name;
    // 根据ID判断图标
    if(reward.id){
      if(reward.id.includes('silver') || reward.id.includes('coin')) icon = '💰';
      else if(reward.id.includes('herb') || reward.id.includes('grass')) icon = '🌿';
      else if(reward.id.includes('ore') || reward.id.includes('stone') || reward.id.includes('iron')) icon = '⛏️';
      else if(reward.id.includes('cloth') || reward.id.includes('fabric')) icon = '🧵';
      else if(reward.id.includes('fish')) icon = '🐟';
      else if(reward.id.includes('manual') || reward.id.includes('book') || reward.id.includes('scroll')) icon = '📜';
      else if(reward.id.includes('weapon') || reward.id.includes('sword') || reward.id.includes('blade')) icon = '⚔️';
      else if(reward.id.includes('armor') || reward.id.includes('shield')) icon = '🛡️';
      else if(reward.id.includes('pill') || reward.id.includes('dan') || reward.id.includes('elixir')) icon = '💊';
      else if(reward.id.includes('wine') || reward.id.includes('liquor') || reward.id.includes('alcohol')) icon = '🍶';
      else if(reward.id.includes('food') || reward.id.includes('meat') || reward.id.includes('bread')) icon = '🍖';
      else if(reward.id.includes('gem') || reward.id.includes('crystal') || reward.id.includes('jade')) icon = '💎';
      else if(reward.id.includes('wood') || reward.id.includes('log') || reward.id.includes('timber')) icon = '🪵';
      else if(reward.id.includes('leather') || reward.id.includes('hide') || reward.id.includes('pelt')) icon = '🟫';
      else if(reward.id.includes('col_')) icon = '🏺'; // 收藏品
    }
  }

  chestRewardIcon.textContent = icon;
  chestRewardName.textContent = name;
  chestRewardQty.textContent = '×' + qty;

  // 显示覆盖层
  overlay.classList.add('active');

  // 动画序列
  // 1. 宝箱震动并打开
  setTimeout(() => {
    chestAscii.classList.add('opening');
  }, 400);

  // 2. 显示打开的宝箱
  setTimeout(() => {
    chestAsciiOpen.classList.add('show');
  }, 900);

  // 3. 显示"获得战利品！"文字
  setTimeout(() => {
    chestGetText.classList.add('show');
  }, 1200);

  // 4. 显示奖励
  setTimeout(() => {
    chestReward.classList.add('show');
  }, 1400);

  // 5. 显示关闭按钮
  setTimeout(() => {
    chestClose.classList.add('show');
  }, 2200);
}

// 在dungeon.js加载后覆盖战斗启动函数
// 使用setTimeout确保在dungeon.js完全加载后执行覆盖
setTimeout(function(){
  console.log('[dungeon.html] 覆盖dungeonStartBattle函数');
  
  // 保存原始函数（用于调试）
  window._originalDungeonStartBattle = window.dungeonStartBattle;
  
  // 覆盖为跳转到battle.html的版本
  window.dungeonStartBattle = function(){
    console.log('[dungeonStartBattle] 被调用');
  // 使用 _dungeonState（dungeon.js中定义的全局变量）
  const ds = (typeof _dungeonState !== 'undefined') ? _dungeonState : null;
  if(!ds) {
    console.error('[dungeonStartBattle] _dungeonState 未定义');
    showToast('地下城状态异常，请刷新页面重试');
    return;
  }
  
  const [row, col] = ds.pos;
  if(!ds.map || !ds.map[row]) {
    console.error('[dungeonStartBattle] 地图数据异常');
    return;
  }
  const cell = ds.map[row][col];
  if(!cell) {
    console.error('[dungeonStartBattle] 当前格子数据异常');
    return;
  }
  
  const enemyId = cell.enemyId;
  if(!enemyId) {
    showToast('该房间没有敌人');
    return;
  }
  
  // 检查ENEMY_DB是否可用
  const enemyDb = (typeof ENEMY_DB !== 'undefined' && ENEMY_DB) || (typeof window !== 'undefined' && window.ENEMY_DB) || {};
  console.log('[dungeonStartBattle] ENEMY_DB keys:', Object.keys(enemyDb).slice(0, 10));
  console.log('[dungeonStartBattle] 查找敌人:', enemyId, '找到:', !!enemyDb[enemyId]);
  if(!enemyDb[enemyId]){
    console.error('[dungeonStartBattle] 敌人数据缺失:', enemyId, 'ENEMY_DB可用:', !!enemyDb, '总敌人数量:', Object.keys(enemyDb).length);
    showToast('敌人数据缺失: ' + enemyId);
    return;
  }

  // ═══════════════════════════════════════════════════════════════
  //  动态等级钳制（与 dungeon.js dungeonStartBattle 逻辑保持一致）
  // ═══════════════════════════════════════════════════════════════
  const rawEnemy = enemyDb[enemyId];
  const playerLevelForScale = (typeof edS !== 'undefined' ? edS.level : null) || 1;
  const cellType = cell.type || 'battle';
  const MAX_DUNGEON_GAP = { boss: 3, elite: 3, battle: 2, trap: 2 };
  const maxGap = MAX_DUNGEON_GAP[cellType] || MAX_DUNGEON_GAP.battle;
  const maxAllowedLevel = playerLevelForScale + maxGap;
  const minAllowedLevel = Math.max(1, playerLevelForScale - 1);

  // 克隆敌人数据并钳制等级
  const enemyForScale = { ...rawEnemy };
  const origLevel = rawEnemy.level || 1;
  if (origLevel > maxAllowedLevel || origLevel < minAllowedLevel) {
    enemyForScale.level = Math.max(minAllowedLevel, Math.min(maxAllowedLevel, origLevel));
    console.log(`[动态等级] 地下城跳转版钳制：${rawEnemy.name} Lv${origLevel} → Lv${enemyForScale.level}（玩家Lv${playerLevelForScale}）`);
  }
  // 标记已钳制，scaleEnemy 内部将跳过 displayLevel 随机化
  enemyForScale._dungeonClamped = true;

  // 调用 scaleEnemy 缩放属性
  let scaledEnemy = enemyForScale;
  if (typeof scaleEnemy === 'function') {
    scaledEnemy = scaleEnemy(enemyForScale, playerLevelForScale, true);
  }
  // 兜底钳制
  if (scaledEnemy.level > maxAllowedLevel) scaledEnemy.level = maxAllowedLevel;
  if (scaledEnemy.level < minAllowedLevel) scaledEnemy.level = minAllowedLevel;

  console.log(`[动态等级] 最终敌人等级：${scaledEnemy.name} Lv${scaledEnemy.level}，hp=${scaledEnemy.hp}，atk=${scaledEnemy.atk}`);

  // 保存地下城战斗上下文（包含钳制后的敌人数据）
  const battleContext = {
    dungeonId: ds.dungeonId,
    pos: [row, col],
    enemyId: enemyId,
    enemyTier: cell.type, // battle, elite, boss
    returnUrl: 'dungeon.html?dungeon=' + encodeURIComponent(ds.dungeonId),
    scaledEnemy: scaledEnemy  // ← 钳制缩放后的完整敌人数据
  };
  sessionStorage.setItem('wuxia_dungeon_battle_context', JSON.stringify(battleContext));
  
  // 保存玩家当前状态（血量等）
  if(typeof edS !== 'undefined' && edS){
    sessionStorage.setItem('wuxia_dungeon_player_hp', edS.hp || 0);
    sessionStorage.setItem('wuxia_dungeon_player_mp', edS.mp || 0);
    sessionStorage.setItem('wuxia_dungeon_player_maxhp', edS.maxHp || 100);
    sessionStorage.setItem('wuxia_dungeon_player_maxmp', edS.maxMp || 100);
    console.log('[dungeonStartBattle] Saved player HP:', edS.hp, '/', edS.maxHp);
  }
  
  // 跳转到战斗页面
  window.location.href = 'battle.html?mode=dungeon&enemy=' + encodeURIComponent(enemyId);
  };
}, 0); // 延迟0毫秒，确保在dungeon.js加载后执行

// 从战斗返回后的处理
function handleReturnFromBattle(){
  console.log('[handleReturnFromBattle] 处理战斗返回');
  
  const battleResult = sessionStorage.getItem('wuxia_dungeon_battle_result');
  if(!battleResult) {
    console.log('[handleReturnFromBattle] 没有战斗结果');
    return;
  }
  
  let result;
  try {
    result = JSON.parse(battleResult);
  } catch(e) {
    console.error('[handleReturnFromBattle] 解析战斗结果失败:', e);
    return;
  }
  
  let context = {};
  try {
    context = JSON.parse(sessionStorage.getItem('wuxia_dungeon_battle_context') || '{}');
  } catch(e) {
    console.error('[handleReturnFromBattle] 解析战斗上下文失败:', e);
  }
  
  console.log('[handleReturnFromBattle] 战斗结果:', result, '上下文:', context);
  
  // 清除战斗结果标记（保留context供后续使用）
  sessionStorage.removeItem('wuxia_dungeon_battle_result');
  sessionStorage.removeItem('wuxia_dungeon_from_battle');
  
  // 恢复玩家状态
  const savedHp = sessionStorage.getItem('wuxia_dungeon_player_hp');
  const savedMp = sessionStorage.getItem('wuxia_dungeon_player_mp');
  console.log('[handleReturnFromBattle] 读取sessionStorage - HP:', savedHp, 'MP:', savedMp);
  if(typeof edS !== 'undefined' && edS) {
    // 确保 maxHp/maxMp 有默认值
    if(!edS.maxHp || edS.maxHp <= 0) {
      edS.maxHp = playerSave?.maxHp || 150;
      console.log('[handleReturnFromBattle] 初始化 maxHp:', edS.maxHp);
    }
    if(!edS.maxMp || edS.maxMp <= 0) {
      edS.maxMp = playerSave?.maxMp || 100;
      console.log('[handleReturnFromBattle] 初始化 maxMp:', edS.maxMp);
    }
    
    if(savedHp !== null && savedHp !== '' && !isNaN(parseInt(savedHp))) {
      edS.hp = parseInt(savedHp, 10);
      console.log('[handleReturnFromBattle] 恢复血量到 edS.hp:', edS.hp);
    } else {
      console.warn('[handleReturnFromBattle] 无效的血量值，不恢复:', savedHp);
    }
    if(savedMp !== null && savedMp !== '' && !isNaN(parseInt(savedMp))) {
      edS.mp = parseInt(savedMp, 10);
    }
    console.log('[handleReturnFromBattle] 最终状态 - HP:', edS.hp, '/', edS.maxHp, 'MP:', edS.mp, '/', edS.maxMp);
  }
  
  // 处理战斗结果
  if(result.won){
    // ── 发放战斗奖励 ──
    // 注意：经验已经在 battle.html 中通过 addPlayerExp() 发放并保存到存档
    // 这里只需要从存档重新加载最新的经验值，避免重复计算
    if(typeof edS !== 'undefined' && edS){
      // 从存档加载最新经验值（battle.html 已保存）
      try {
        // 优先从 wuxia_player_progress 读取（battle.js 的 addPlayerExp 保存到这里）
        const progressRaw = localStorage.getItem('wuxia_player_progress');
        if(progressRaw){
          const progress = JSON.parse(progressRaw);
          if(progress.totalExp !== undefined){
            edS.totalExp = progress.totalExp;
            edS.level = progress.level || edS.level || 1;
            console.log('[handleReturnFromBattle] 从 wuxia_player_progress 同步经验:', result.exp, '(总计:', edS.totalExp, ')');
          }
        }
        // 同步到 profile 存档（确保一致性）
        const profileRaw = localStorage.getItem('wuxia_player_profile');
        if(profileRaw){
          const profile = JSON.parse(profileRaw);
          profile.totalExp = edS.totalExp;
          profile.level = edS.level;
          localStorage.setItem('wuxia_player_profile', JSON.stringify(profile));
          console.log('[handleReturnFromBattle] 已同步到 wuxia_player_profile');
        }
      } catch(e) {
        console.error('[handleReturnFromBattle] 加载经验失败:', e);
      }
      // 显示获得经验提示（使用 result.exp 显示本次获得量）
      if(result.exp && result.exp > 0){
        console.log('[handleReturnFromBattle] 本次战斗获得经验:', result.exp, '当前总计:', edS.totalExp);
      }
      if(result.silver && result.silver > 0){
        // 优先用 addSilver（SilverManager 封装），fallback 才直接赋值
        if(typeof addSilver === 'function'){
          addSilver(result.silver);
        } else if(typeof SilverManager !== 'undefined'){
          SilverManager.add(result.silver);
        } else if(typeof edS !== 'undefined'){
          edS.silver = (edS.silver || 0) + result.silver;
        }
        console.log('[handleReturnFromBattle] 获得银两:', result.silver);
      }
      // 注意：物品已经在 battle.js 的 checkWin() 中通过 bagAddItem/injectDropToCraftBag 直接发放到背包
      // 这里只需要记录日志，不需要重复添加
      if(result.items && result.items.length){
        console.log('[handleReturnFromBattle] 战斗获得物品（已在 battle.js 中添加）:', result.items);
      }
      // 刷新经验条显示
      if(typeof renderPlayerExpBar === 'function'){
        console.log('[handleReturnFromBattle] 刷新经验条前 - edS.totalExp:', edS?.totalExp, 'edS.level:', edS?.level);
        renderPlayerExpBar();
        console.log('[handleReturnFromBattle] 已刷新经验条显示');
      }
      // 保存
      if(typeof saveProgress === 'function') saveProgress();
    }

    // 胜利：标记房间已清理，并将玩家位置移动到战斗房间
    // 如果 _dungeonState 为 null，先从存档恢复
    if(!_dungeonState && context.dungeonId && typeof enterDungeon === 'function') {
      console.log('[handleReturnFromBattle] _dungeonState 为空，从存档恢复地下城状态');
      // 先恢复地下城状态（使用存档中的进度）
      const prevSave = dungeonLoadSave ? dungeonLoadSave() : null;
      if(prevSave && prevSave.dungeonId === context.dungeonId) {
        enterDungeon(context.dungeonId, 'town');
      }
    }

    if(context.pos && typeof _dungeonState !== 'undefined' && _dungeonState) {
      const [row, col] = context.pos;
      // 将玩家位置移动到战斗房间
      _dungeonState.pos = [row, col];
      const cell = _dungeonState.map[row][col];
      if(cell && !cell.cleared) {
        cell.cleared = true;
        _dungeonState.clearedRooms++;
        _dungeonState.totalBattles++;
        dungeonSave();
        console.log('[handleReturnFromBattle] 标记房间已清理，玩家位置:', row, col);
      }
      // 展示奖励 toast
      let rewardText = '✅ 战斗胜利！';
      if(result.exp) rewardText += ` +${result.exp}经验`;
      if(result.silver) rewardText += ` +${result.silver}银两`;
      if(result.items && result.items.length) rewardText += ` +${result.items.length}件物品`;
      showToast(rewardText);
      _renderDungeonUIStandalone();
    } else if(context.dungeonId) {
      // 如果没有位置信息，重新进入地下城
      setTimeout(() => {
        enterDungeon(context.dungeonId, 'town');
      }, 300);
    }
  } else {
    // 失败：扣命或重置
    // 如果 _dungeonState 为 null，先从存档恢复
    if(!_dungeonState && context.dungeonId && typeof enterDungeon === 'function') {
      console.log('[handleReturnFromBattle] 战败，_dungeonState 为空，从存档恢复');
      const prevSave = dungeonLoadSave ? dungeonLoadSave() : null;
      if(prevSave && prevSave.dungeonId === context.dungeonId) {
        enterDungeon(context.dungeonId, 'town');
      }
    }
    
    if(typeof _dungeonState !== 'undefined' && _dungeonState){
      _dungeonState.lives = (_dungeonState.lives || 3) - 1;
      console.log('[handleReturnFromBattle] 战败，剩余生机:', _dungeonState.lives);
      
      if(_dungeonState.lives <= 0){
        showToast('💀 气力耗尽，探索失败...');
        dungeonClearSave();
        _dungeonState = null;
        setTimeout(() => returnToTown(), 2000);
      } else {
        showToast(`💀 战败！剩余生机：${_dungeonState.lives}`);
        // 从休息点复活
        const [revR, revC] = _dungeonState.lastRestPos || _dungeonState.dungeon.startPos || [0,0];
        _dungeonState.pos = [revR, revC];
        if(typeof edS !== 'undefined' && edS){
          edS.hp = Math.round((edS.maxHp || 100) * 0.5);
          edS.mp = Math.round((edS.maxMp || 100) * 0.3);
        }
        dungeonSave();
        setTimeout(() => _renderDungeonUIStandalone(), 1500);
      }
    }
  }
}

// 页面加载时检查是否从战斗返回
window.addEventListener('load', function(){
  const fromBattle = sessionStorage.getItem('wuxia_dungeon_from_battle');
  if(fromBattle){
    sessionStorage.removeItem('wuxia_dungeon_from_battle');
    handleReturnFromBattle();
  }
});

// 背景粒子动画（简化版）
(function initBgCanvas(){
  const canvas = document.getElementById('bgCanvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  let width, height;
  let particles = [];
  
  function resize(){
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);
  
  // 创建粒子
  for(let i = 0; i < 30; i++){
    particles.push({
      x: Math.random() * width,
      y: Math.random() * height,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      size: Math.random() * 2 + 1,
      alpha: Math.random() * 0.5 + 0.2
    });
  }
  
  function animate(){
    ctx.clearRect(0, 0, width, height);
    
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      
      if(p.x < 0) p.x = width;
      if(p.x > width) p.x = 0;
      if(p.y < 0) p.y = height;
      if(p.y > height) p.y = 0;
      
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(240, 192, 96, ${p.alpha})`;
      ctx.fill();
    });
    
    requestAnimationFrame(animate);
  }
  animate();
})();
</script>
