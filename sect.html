    { id:'daily_dungeon',icon:'⚔', name:'清理险地',   desc:'完成一次地下城探索（任意房间）',       type:'dungeon',rewardContrib:5,  rewardExp:40 },
    { id:'daily_fish',   icon:'🎣', name:'采集物资',   desc:'钓鱼或采药获得一件素材',                type:'gather',  rewardContrib:2,  rewardExp:15 },
    { id:'daily_social', icon:'💬', name:'同门交流',   desc:'与任意门派NPC对话或送礼',               type:'social',  rewardContrib:2,  rewardExp:10 },
  ];

  function renderBoard(sect){
    const el = qs('#sectBoardContent');
    const ed = edS || {};

    // 公告栏对所有加入/未加入都可见（minor也有）
    if(!isJoined){
      el.innerHTML = '<div class="sb-board-empty">📢 加入「<b style="color:'+sect.color+'">' + sect.name + '</b>」后可接取门派日常</div>';
      return;
    }

    // 读取今日已完成
    let doneToday = [];
    try{ doneToday = JSON.parse(localStorage.getItem('wuxia_board_done_'+sect.id+'_'+_todayStr())||'[]'); }catch(e){}

    const feats = getSectFeatures(sect);
    const now = new Date();
    const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

    let html =
      '<div class="sb-board-header">' +
        '<span class="sb-board-title">📢 ' + sect.name + ' · 公告栏</span>' +
        '<span class="sb-board-time">' + timeStr + '</span>' +
      '</div>';

    // ── 日常任务 ──
    html += '<div class="sb-daily-section"><div class="sb-daily-label">📋 今日日常</div>';

    SECT_BOARD_DAILIES.forEach(function(daily){
      const isDone = doneToday.includes(daily.id);

      // 根据规模过滤一些高级日常
      const hideMap = {alchemy:!feats.alchemy, dungeon:false, arena:!feats.arena};
      if(hideMap[daily.type]){
        // 规模不够的不显示该日常
        return;
      }

      html +=
        '<div class="sb-daily-card' + (isDone?' sb-done':'') + '">' +
          '<div class="sb-daily-icon">' + daily.icon + '</div>' +
          '<div class="sb-daily-info">' +
            '<div class="sb-daily-name">' + daily.name + (isDone ? ' ✓' : '') + '</div>' +
            '<div class="sb-daily-desc">' + daily.desc + '</div>' +
          '</div>' +
          '<div class="sb-daily-action">' +
            (isDone ?
              '<span class="sb-daily-status">✅ 已完成</span>' :
              '<button class="sb-daily-btn" onclick="window._onClaimDaily && _onClaimDaily(\''+sect.id+'\',\''+daily.id+'\')">领取</button>'
            ) +
          '</div></div>';
    });

    html += '</div>'; // /daily-section

    // ── 悬赏任务（仅 major/supreme）──
    if(feats.missions){
      html += '<div class="sb-bounty-section">';
      // 从门派任务链取当前 active 任务作为悬赏提示
      const chain = (typeof SECT_CHAINS!=='undefined') ? SECT_CHAINS[sect.id] : null;
      if(chain && chain.chain){
        const activeNode = chain.chain.find(function(n){
          var progress = {};
          if(typeof getSectChainProgress==='function') progress = getSectChainProgress();
          var cp = (progress||{})[sect.id] || {};
          var state = cp[n.id] || 'available';
          return state==='active' || state==='available';
        });
        if(activeNode){
          html +=
            '<div class="st-treasury-cat" style="margin-top:12px">📜 当前悬赏</div>' +
            '<div class="sb-daily-card" style="cursor:default;border-color:rgba(240,192,64,.2)">' +
              '<div class="sb-daily-icon">' + (activeNode.icon||'📜') + '</div>' +
              '<div class="sb-daily-info">' +
                '<div class="sb-daily-name">' + activeNode.name + '</div>' +
                '<div class="sb-daily-desc">' + (activeNode.desc||'前往要务页面查看详情') + '</div>' +
              '</div>' +
              '<div class="sb-daily-action">' +
                '<button class="sb-daily-btn" onclick="switchTab(\'missions\')">查看详情</button>' +
              '</div></div>';
        } else {
          html += '<div class="st-treasury-cat" style="margin-top:12px">📜 当前悬赏</div>' +
            '<div class="sb-bounty-empty">暂无悬赏任务，请关注公告更新</div>';
        }
      }
      html += '</div>'; // /bounty-section
    }

    el.innerHTML = html;
  }

  // 领取日常奖励
  window._onClaimDaily = function(sectId, dailyId){
    const daily = SECT_BOARD_DAILIES.find(function(d){return d.id===dailyId;});
    if(!daily) return;

    // 简化判定：直接领取（后续可以加具体条件检查）
    let doneToday = [];
    try{ doneToday = JSON.parse(localStorage.getItem('wuxia_board_done_'+sectId+'_'+_todayStr())||'[]'); }catch(e){}
    if(doneToday.includes(dailyId)){
      showToast('今天已经领取过了！','warn');return;
    }

    const ed = edS || {};
    ed.sectContrib = (ed.sectContrib||0) + (daily.rewardContrib||0);
    if(typeof addExp === 'function') addExp(daily.rewardExp||0);
    else ed.exp = (ed.exp||0) + (daily.rewardExp||0);

    doneToday.push(dailyId);
    localStorage.setItem('wuxia_board_done_'+sectId+'_'+_todayStr(), JSON.stringify(doneToday));
    if(typeof saveGameState==='function') saveGameState();
    try{ localStorage.setItem('wuxia_editor', JSON.stringify(ed)); }catch(e){}

    showToast('📋 日常完成！贡献+' + (daily.rewardContrib||0) + ' · 经验+' + (daily.rewardExp||0), 'ok');
    const sect = SECTS.find(function(s){return s.id===sectId;});
    if(sect) renderBoard(sect);
  };

  // ── 全局暴露的交互方法 ──

  // 藏经阁购买功法
  window._buySectManual = function(manualId){
    if(typeof edS === 'undefined') return;
    if(typeof MANUAL_DB === 'undefined') return;
    const m = MANUAL_DB[manualId];
    if(!m) return;
    const price = m.price || 0;
    if((edS.silver||0) < price){
      showToast('银两不足！需要 ' + price + ' 两','warn');return;
    }
    // 扣银
    edS.silver -= price;
    // 加秘籍
    if(typeof addManualToBag === 'function') addManualToBag(manualId);
    // 存档
    if(typeof saveGameState === 'function') saveGameState();
    try{ localStorage.setItem('wuxia_editor', JSON.stringify(edS)); }catch(e){}
    showToast('📜 获得「' + m.name + '」！','ok');
    // 刷新藏经阁
    const sect = SECTS.find(function(s){return s.id === currentSectId;});
    if(sect) renderLibrary(sect);
  };

  // 接取门派任务
  window._acceptSectMission = function(sectId, nodeId){
    if(typeof SECT_CHAINS === 'undefined') return;
    const chainData = SECT_CHAINS[sectId];
    if(!chainData) return;
    const node = chainData.chain.find(function(n){return n.id === nodeId;});
    if(!node) return;

    // 有叙事内容？弹窗展示
    if(node.narrative && node.narrative.accept){
      showNarrative(node.narrative.accept, function(){
        doAcceptMission(sectId, nodeId, node);
      });
    } else {
      doAcceptMission(sectId, nodeId, node);
    }
  };

  function doAcceptMission(sectId, nodeId, node){
    if(typeof setSectChainNodeState === 'function'){
      setSectChainNodeState(sectId, nodeId, 'active');
    }
    // 发放前置奖励（如果有即时奖励的话——经验/贡献等在完成时发放）

    // 根据任务类型处理
    if(node.type === 'talk' && node.targetNpc){
      // 对话类：标记完成后给奖励
      showToast('已接取：「' + node.name + '」，请前往与相关NPC对话','ok');
    } else if(node.type === 'travel' && node.targetCity){
      showToast('已接取：「' + node.name + '」，请前往' + node.targetCity,'ok');
    } else {
      showToast('已接取：「' + node.name + '」','ok');
    }
    // 刷新任务列表
    const sect = SECTS.find(function(s){return s.id === sectId;});
    if(sect) renderMissions(sect);
  }

  // 叙事弹窗
  function showNarrative(narr, onConfirm){
    const overlay = qs('#scNarrativeOverlay');
    if(!overlay) return;
    qs('#scNarrScene').innerHTML = narr.scene || '';
    qs('#scNarrLines').innerHTML = (narr.lines||[]).map(function(l){
      return '<div class="sc-narrative-line">' + l + '</div>';
    }).join('');

    qs('#scNarrCancel').onclick = function(){ overlay.classList.remove('active'); };
    qs('#scNarrConfirm').onclick = function(){
      overlay.classList.remove('active');
      if(onConfirm) onConfirm();
    };
    overlay.classList.add('active');
  }

  // 试炼配置（从 town.html 迁移）
  // 注意：SECT_TRIAL_CFG 在 town.html 定义，这里需要重新定义或引用
  // 为避免重复，我们在 town.html 的 _doSectTrial 中用 window 暴露，
  // 这里也做同样的定义以保持独立可用性

  // ── 试炼系统（从 town.html 迁移的核心逻辑）──
  const SECT_TRIAL_CFG = {
    supreme: { name:'三关试炼', desc:'需连续通过三道考验', rounds:3, baseLvl:50 },
    major:   { name:'切磋考验', desc:'与门派长老切磋，证明实力',   rounds:1, baseLvl:30 },
    minor:   { name:'入门试炼', desc:'击败一名弟子即可入门',       rounds:1, baseLvl:15 }
  };

  window._doSectTrial = function(sectId){
    if(typeof SECTS === 'undefined') return;
    const sect = SECTS.find(function(s){return s.id === sectId;});
    if(!sect) return;
    const ed = edS || {};
    const playerSect = ed.sect || null;
    const playerLevel = ed.level || 1;

    if(playerSect === sectId){
      showToast('你已经是「' + sect.name + '」的弟子了！','info');return;
    }
    if(ed.sectLeaveCooldown && ed.sectLeaveCooldown > Date.now()){
      const remaining = Math.ceil((ed.sectLeaveCooldown - Date.now()) / 86400000);
      showToast('🔒 需等待 ' + remaining + ' 天才能重新加入','warn');return;
    }
    if(playerLevel < 5){
      showToast('🔒 需达到 Lv5 才能申请加入！','warn');return;
    }
    // 直接启动试炼
    window._startSectTrial(sectId);
  };

  window._startSectTrial = function(sectId){
    if(typeof SECTS === 'undefined') return;
    const sect = SECTS.find(function(s){return s.id === sectId;});
    if(!sect) return;
    const cfg = SECT_TRIAL_CFG[sect.tier] || SECT_TRIAL_CFG.minor;
    const playerLevel = (edS||{}).level || 1;

    // 构建试炼对手
    const opponentLv = Math.max(5, Math.round(playerLevel * (cfg.baseLvl / 20)));
    const tierMult = {supreme:2.0,major:1.45,minor:1.15}[sect.tier]||1.2;
    const trialNpc = {
      id: 'sect_trial_' + sectId,
      name: sect.name + '·考官',
      level: opponentLv,
      tier: sect.tier==='supreme'?'elite':(sect.tier==='major'?'major':'func'),
      role:'fighter',
      schoolTag:(sect.schools||[])[0]||'force',
      maxHp: Math.round((40 + opponentLv*8)*tierMult*0.7),
      atk: Math.round((5 + opponentLv*1.0)*tierMult),
      def: Math.round((2 + opponentLv*0.5)*tierMult),
      spd: Math.round((5 + opponentLv*0.08)*tierMult*10)/10,
      crit: Math.min(28, Math.round(5 + opponentLv*0.12)),
      dodge: Math.min(18, Math.round(3 + opponentLv*0.06)),
      maxMp: Math.round((30 + opponentLv*4)*tierMult*0.6),
    };

    // 尝试打开切磋面板
    if(typeof openRplFightPanel === 'function'){
      window._tmpTrialNpc = {inst:trialNpc, sectId:sectId};
      window._isSectTrialFight = true;
      window._trialTargetSectId = sectId;
      setTimeout(function(){
        try{
          openRplFightPanel(trialNpc.id, travelCurrentCity||(typeof WORLD_NODES!=='undefined'&&sect.city?sect.city:'kaifeng'));
        }catch(e){
          console.warn('[SectTrial] 切磋不可用，走简易判定', e);
          _doSimpleSectTrial(sectId, trialNpc, cfg);
        }
      },300);
    } else {
      _doSimpleSectTrial(sectId, trialNpc, cfg);
    }
  };

  function _doSimpleSectTrial(sectId, npc, cfg){
    const sect = SECTS.find(function(s){return s.id===sectId;});
    const ed = edS || {};
    const playerLevel = ed.level || 1;
    const winRate = Math.max(0.18, Math.min(0.85,
      0.5 + (playerLevel-npc.level)*0.03 + (ed.atk||0)*0.005 - (npc.atk||0)*0.002
    ));
    if(Math.random() < winRate){
      _onSectTrialSuccess(sectId);
    } else {
      const cn = cfg?cfg.name:'试炼';
      showToast('你在' + cn + '中惜败……再练些时日吧。','error');
    }
  }

  window._onSectTrialSuccess = function(sectId){
    if(typeof SECTS === 'undefined') return;
    const sect = SECTS.find(function(s){return s.id===sectId;});
    if(!sect) return;
    const ed = edS || {};
    const oldSect = ed.sect || null;

    if(oldSect && oldSect !== sectId){
      _clearSectNpcRels(oldSect);
    }

    ed.sect = sectId;
    if(!ed.sectContrib || ed.sectContrib < 0) ed.sectContrib = 0;
    ed.sectRank = 'disciple';
    if(typeof saveGameState === 'function') saveGameState();
    try{ localStorage.setItem('wuxia_editor', JSON.stringify(ed)); }catch(e){}

    const contribBonus = {supreme:50,major:30,minor:15}[sect.tier]||15;
    ed.sectContrib = (ed.sectContrib||0) + contribBonus;
    if(typeof checkSectRankUp === 'function') checkSectRankUp(ed);

    const rankCfg = (typeof SECT_RANK_CFG !== 'undefined') ? SECT_RANK_CFG[ed.sectRank||'disciple'] : null;
    const rankHint = rankCfg ? ' · '+rankCfg.icon+rankCfg.name : '';

    showToast('🎉 成为「'+sect.name+'」弟子！贡献+'+contribBonus+rankHint,'ok');
    isJoined = true;
    currentSectId = sectId;

    // 手动触发"门派已加入"提示（showTip 内部已遵守 once 规则）
    if(typeof showTip === 'function'){
      setTimeout(function(){ showTip('sect_join', TIPS_DB['sect_join']); }, 600);
    }
    if(typeof _tipMarkShown === 'function'){
      setTimeout(function(){ _tipMarkShown('sect_join'); }, 600);
    }

    showHqView();
  };

  window._onSectLeaveClick = function(sectId){
    if(typeof SECTS === 'undefined') return;
    const sect = SECTS.find(function(s){return s.id===sectId;});
    if(!sect) return;
    const ed = edS || {};
    if(ed.sect !== sectId) return;

    if(confirm('确定要退出「'+sect.name+'】吗？\n\n退出后将清零贡献、清除门派NPC好感度，且7天内不能重新加入。')){
      _doSectLeave(sectId);
    }
  };

  function _doSectLeave(sectId){
    if(typeof SECTS === 'undefined') return;
    const sect = SECTS.find(function(s){return s.id===sectId;});
    if(!sect) return;
    const ed = edS || {};
    const lostContrib = ed.sectContrib || 0;
    ed.sectContrib = 0;
    const cooldownMs = 7*86400000;
    ed.sectLeaveCooldown = Date.now() + cooldownMs;
    ed.sect = null;
    ed.sectRank = null;
    _clearSectNpcRels(sectId);
    if(typeof saveGameState === 'function') saveGameState();
    try{ localStorage.setItem('wuxia_editor', JSON.stringify(ed)); }catch(e){}
    showToast('🚪 已退出「'+sect.name+'」，贡献 '+lostContrib+' 清零。7天内无法重新加入。','warn');
    isJoined = false;
    // 保持在当前门派总舵页面，刷新显示未加入状态
    showHqView();
  }

  function _clearSectNpcRels(sectId){
    if(typeof NPC_DB === 'undefined') return;
    if(typeof npcState === 'undefined') return;
    const toClear = Object.keys(NPC_DB).filter(function(k){return NPC_DB[k].sect===sectId;});
    let cleared = 0;
    toClear.forEach(function(npcId){
      if(npcState.relations && npcState.relations[npcId]){ npcState.relations[npcId]=0; cleared++; }
    });
    if(cleared > 0 && typeof npcStateSave === 'function'){ npcStateSave(); }
  }

  // ── 启动 ──
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', sectInit);
  } else {
    sectInit();
  }

})();
</script>

</body>
</html>
