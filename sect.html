<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>门派 - 江湖将将胡</title>
<style>
/* ════════════════════════════════════════════════════
   sect.html - 门派总舵（独立页面）
   ════════════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --gold:#f0c060; --gold2:#e08010; --gold3:#ffe8a0;
  --dark:#050410;
  --panel:rgba(8,6,18,.97); --panel2:rgba(12,10,24,.95);
  --border:rgba(240,192,96,.15); --border2:rgba(240,192,96,.25);
  --text:#e8d5a3; --text2:rgba(220,200,160,.75); --text3:rgba(180,160,120,.5);
  --ok:#80e880; --warn:#ffaa40; --danger:#ff6060;
}

body{
  background:var(--dark);color:var(--text);
  font-family:'Courier New','微软雅黑',monospace;
  overflow-x:hidden;min-height:100vh;user-select:none;
  background-image:
    radial-gradient(ellipse at 20% 10%,rgba(30,15,60,.5) 0%,transparent 45%),
    radial-gradient(ellipse at 80% 90%,rgba(40,10,20,.4) 0%,transparent 45%),
    radial-gradient(ellipse at 50% 50%,rgba(5,4,16,1) 0%,rgba(2,1,8,1) 100%);
}

/* 扫描线 */
body::before{
  content:'';position:fixed;top:0;left:0;width:100%;height:100%;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.05) 2px,rgba(0,0,0,.05) 4px);
  pointer-events:none;z-index:1;opacity:.35;
}

/* ── 顶栏 ── */
.sect-title-bar{
  display:flex;align-items:center;gap:10px;
  padding:14px 16px;border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,rgba(4,2,12,1) 0%,rgba(6,4,18,.99) 100%);
  position:relative;z-index:10;
  box-shadow:0 3px 30px rgba(0,0,0,.6), 0 1px 0 rgba(240,192,96,.06);
}
.sect-title-bar h1{
  flex:1;font-size:17px;letter-spacing:6px;
  background:linear-gradient(180deg,#fff8d8 0%,#f0c060 50%,#c87820 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.stb-back{
  background:rgba(30,15,8,.85);border:1px solid rgba(160,100,40,.25);
  color:#c08040;padding:7px 14px;border-radius:6px;
  cursor:pointer;font-size:12px;letter-spacing:1px;
  transition:.2s;text-decoration:none;display:inline-block;
}
.stb-back:hover{background:rgba(60,30,10,.9);color:#e0c060;}
.stb-back:active{transform:scale(.96);}

/* ── 主容器 ── */
#sectRoot{position:relative;z-index:3;padding-bottom:40px;}

/* ── 无门派参数时的提示区 ── */
.sect-browser{max-width:600px;margin:0 auto;padding:40px 20px;}
.sb-header{
  text-align:center;padding:28px 20px 22px;margin-bottom:14px;
  border:1px solid var(--border);border-radius:12px;
  background:linear-gradient(170deg,rgba(240,192,64,.03),transparent);
}
.sb-header h2{font-size:18px;color:var(--gold);letter-spacing:5px;margin-bottom:12px;}
.sb-header p{font-size:13px;color:var(--text3);line-height:2;}

/* ── 已加入门派：总览区 ── */
.sect-hq{max-width:800px;margin:0 auto;padding:14px 12px;}

/* 门派头部横幅 */
.sect-hero{
  border-radius:12px;overflow:hidden;margin-bottom:14px;
  border:1px solid var(--border);
  background:linear-gradient(170deg,var(--hero-bg1,rgba(240,192,64,.06)),var(--hero-bg2,rgba(240,192,64,.02)));
  position:relative;
}
.sect-hero-inner{padding:20px 18px 16px;}
.sect-hero-top{
  display:flex;align-items:center;gap:14px;margin-bottom:14px;
}
.sect-hero-emblem{
  width:64px;height:64px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:32px;
  background:var(--hero-badge,rgba(240,192,64,.08));
  border:1px solid var(--hero-border,rgba(240,192,64,.2));
  flex-shrink:0;
}
.sect-hero-info{flex:1;min-width:0;}
.sect-hero-name{font-size:22px;font-weight:bold;letter-spacing:3px;color:var(--hero-color,#f0c060);}
.sect-hero-title{font-size:12px;color:var(--text2);margin-top:2px;letter-spacing:1px;}
.sect-hero-tag{font-size:10px;color:var(--text3);margin-top:4px;}
.sect-hero-meta{
  display:flex;gap:10px;flex-wrap:wrap;align-self:flex-start;margin-top:4px;
}
.sect-meta-chip{
  font-size:9px;padding:2px 8px;border-radius:4px;letter-spacing:.5px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:var(--text3);
}

/* 阶级 & 贡献条 */
.sect-rank-bar{
  margin-top:14px;padding:14px 16px;background:rgba(0,0,0,.25);
  border-top:1px solid rgba(255,255,255,.05);
  border-radius:0 0 12px 12px;
}
.srb-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.srb-label{font-size:11px;color:var(--text3);letter-spacing:1px;}
.srb-value{font-size:13px;color:var(--gold);font-weight:bold;}
.srb-value .rank-icon{margin-right:4px;}
.srb-progress{
  height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;
}
.srb-progress-fill{
  height:100%;background:linear-gradient(90deg,var(--rank-color1,#80e880),var(--rank-color2,#50c850));
  border-radius:4px;transition:width .5s ease;
  min-width:0;
}
.srb-rank-stages{
  display:flex;justify-content:space-between;margin-top:6px;
  gap:2px;
}
.srb-stage{
  font-size:8px;color:var(--text3);text-align:center;flex:1;opacity:.5;
  transition:opacity .2s;
}
.srb-stage.active{opacity:1;font-weight:bold;color:var(--text2);}
.srb-stage.current{color:var(--gold);}

/* ── Tab 导航 ── */
.sect-tabs{
  display:flex;gap:0;margin-bottom:0;
  border-bottom:2px solid var(--border);
  background:linear-gradient(180deg,rgba(8,6,18,.95),rgba(6,4,16,.98));
  position:relative;z-index:5;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.sect-tabs::-webkit-scrollbar{display:none;}
.sect-tab{
  flex:1;min-width:70px;padding:12px 8px;text-align:center;
  font-size:12px;color:var(--text3);cursor:pointer;letter-spacing:1px;
  border:none;background:none;transition:all .2s;
  white-space:nowrap;position:relative;font-family:inherit;
  border-bottom:2px solid transparent;margin-bottom:-2px;
}
.sect-tab:hover{color:var(--text2);background:rgba(255,255,255,.03);}
.sect-tab.active{
  color:var(--tab-color,var(--gold));font-weight:bold;
  border-bottom-color:var(--tab-color,var(--gold));
  background:linear-gradient(180deg,rgba(240,192,64,.04),transparent);
}
.sect-tab-icon{display:block;font-size:16px;margin-bottom:2px;}
.sect-tab-text{display:block;font-size:10px;letter-spacing:1px;}

/* Tab 内容区 */
.sect-tab-content{display:none;padding:14px 0;}
.sect-tab-content.active{display:block;}

/* ── 总览面板 ── */
.sect-overview-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
}
@media(max-width:520px){.sect-overview-grid{grid-template-columns:1fr;}}

.sect-info-card{
  padding:14px;border:1px solid var(--border);border-radius:10px;
  background:var(--panel2);
}
.sect-card-title{
  font-size:11px;color:var(--gold);letter-spacing:2px;margin-bottom:10px;
  padding-bottom:6px;border-bottom:1px dashed rgba(255,255,255,.06);
}
.sect-card-body{font-size:12px;color:var(--text2);line-height:1.8;}

/* 被动加成 */
.sect-bonus-list{display:flex;flex-wrap:wrap;gap:4px 10px;margin-top:6px;}
.sect-bonus-tag{
  font-size:11px;padding:2px 8px;border-radius:4px;
  background:rgba(128,232,128,.06);border:1px solid rgba(128,232,128,.15);
  color:#90d090;
}
.sect-bonus-inactive{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.08);color:var(--text3);}

/* 关系网 */
.sect-rel-item{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:11px;}
.sect-rel-label{color:var(--text3);min-width:42px;font-size:10px;}
.sect-rel-tags{display:flex;flex-wrap:wrap;gap:4px;}
.sect-rel-tag{
  font-size:10px;padding:1px 7px;border-radius:4px;
}

/* ── 长老殿（加入/退出/掌门）── */
.sect-hall{
  text-align:center;padding:20px 16px;
  border:1px solid var(--border);border-radius:12px;
  background:linear-gradient(170deg,rgba(240,192,64,.02),transparent);
}
.sh-master-avatar{
  font-size:56px;margin-bottom:10px;filter:drop-shadow(0 0 20px rgba(240,192,64,.2));
}
.sh-master-name{font-size:16px;color:var(--gold);letter-spacing:3px;margin-bottom:4px;}
.sh-master-title{font-size:11px;color:var(--text3);margin-bottom:16px;}
.sh-action-btn{
  display:inline-block;padding:12px 32px;border-radius:10px;
  font-size:14px;letter-spacing:3px;cursor:pointer;
  border:1px solid;transition:.2s;font-family:inherit;margin:4px;
}
.sh-join-btn{
  background:linear-gradient(135deg,rgba(200,150,30,.75),rgba(240,180,40,.75));
  border-color:rgba(220,170,50,.5);color:#fff8e0;font-weight:bold;
}
.sh-join-btn:hover{box-shadow:0 0 20px rgba(220,160,30,.4);}
.sh-leave-btn{
  background:linear-gradient(135deg,rgba(180,50,30,.6),rgba(200,70,50,.6));
  border-color:rgba(220,80,60,.4);color:#ffd0d0;
}
.sh-leave-btn:hover{box-shadow:0 0 20px rgba(200,60,40,.3);}
.sh-locked-msg{
  font-size:13px;color:var(--warn);padding:12px;
  background:rgba(255,170,64,.05);border:1px solid rgba(255,170,64,.15);
  border-radius:8px;margin-top:10px;
}
.sh-req-box{
  text-align:left;margin-top:16px;padding:14px;border-radius:8px;
  background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.05);
}
.sh-req-title{font-size:11px;color:var(--gold);margin-bottom:8px;letter-spacing:1px;}
.sh-req-line{font-size:11px;color:var(--text2);line-height:1.9;}

/* ── 藏经阁（功法商店）── */
.sect-library-empty{
  text-align:center;padding:40px 16px;color:var(--text3);
  font-size:13px;letter-spacing:1px;
}
.sl-manual-grid{display:grid;gap:8px;}
.sl-manual-item{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;border:1px solid var(--border);border-radius:10px;
  background:var(--panel2);transition:.15s;cursor:pointer;
}
.sl-manual-item:hover{border-color:var(--border2);background:rgba(240,192,64,.03);}
.sl-manual-icon{font-size:26px;flex-shrink:0;}
.sl-manual-info{flex:1;min-width:0;}
.sl-manual-name{font-size:13px;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sl-manual-desc{font-size:10px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sl-manual-price{
  text-align:right;flex-shrink:0;
}
.sl-manual-cost{font-size:13px;color:var(--ok);font-weight:bold;}
.sl-manual-currency{font-size:9px;color:var(--text3);}
.sl-manual-locked{opacity:.4;cursor:not-allowed;}
.sl-manual-owned{border-color:rgba(128,232,128,.25);background:rgba(128,232,128,.03);}

/* ── 贡献商店 ── */
.cs-shop-section{margin-bottom:16px;}
.cs-shop-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;padding-bottom:8px;
  border-bottom:1px dashed rgba(255,255,255,.06);
}
.cs-shop-title{font-size:13px;color:var(--ok);font-weight:bold;letter-spacing:1px;}
.cs-shop-balance{font-size:12px;color:var(--ok);}
.cs-item{
  display:flex;align-items:center;gap:8px;
  padding:10px 12px;background:rgba(255,255,255,.02);
  border:1px solid transparent;border-radius:8px;margin-bottom:6px;
  transition:.15s;cursor:pointer;
}
.cs-item:hover:not(.cs-locked):not(.cs-cant-afford){
  background:rgba(128,232,128,.04);border-color:rgba(128,232,128,.15);
}
.cs-item.cs-locked{opacity:.4;cursor:not-allowed;}
.cs-item.cs-cant-afford{opacity:.55;}
.cs-item-icon{font-size:20px;flex-shrink:0;}
.cs-item-info{flex:1;min-width:0;}
.cs-item-name{font-size:12px;color:#f0d090;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cs-item-desc{font-size:10px;color:var(--text3);margin-top:1px;}
.cs-item-price{
  text-align:right;flex-shrink:0;
}
.cs-item-cost{font-size:12px;color:var(--ok);font-weight:bold;}
.cs-item-curr{font-size:8px;color:var(--text3);}

/* ── 门派任务链 ── */
.sc-chain-header{
  padding:14px;border:1px solid var(--border);border-radius:10px;
  margin-bottom:14px;background:var(--panel2);
}
.sc-chain-name{font-size:15px;color:var(--gold);font-weight:bold;letter-spacing:2px;}
.sc-chain-theme{font-size:11px;color:var(--text3);margin-top:4px;}

.sc-task-list{}
.sc-task-node{
  display:flex;gap:10px;padding:12px 14px;margin-bottom:8px;
  border:1px solid var(--border);border-radius:10px;
  background:var(--panel2);transition:.15s;
  position:relative;
}
.sc-task-node:hover{border-color:var(--border2);}
.sc-task-status{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:16px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  color:var(--text3);
}
.sc-task-status.done{background:rgba(128,232,128,.08);border-color:rgba(128,232,128,.25);color:var(--ok);}
.sc-task-status.active{background:rgba(240,192,64,.08);border-color:rgba(240,192,64,.25);color:var(--gold);}
.sc-task-status.locked{opacity:.4;}
.sc-task-body{flex:1;min-width:0;}
.sc-task-name{font-size:13px;color:var(--text);font-weight:bold;}
.sc-task-desc{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.5;}
.sc-task-reward{font-size:10px;color:var(--ok);margin-top:4px;}
.sc-task-action{
  align-self:center;flex-shrink:0;
}
.sc-task-btn{
  padding:7px 14px;border-radius:6px;font-size:11px;cursor:pointer;
  border:1px solid rgba(240,192,64,.3);background:rgba(240,192,64,.08);
  color:var(--gold);font-family:inherit;letter-spacing:1px;transition:.15s;
}
.sc-task-btn:hover{background:rgba(240,192,64,.15);}
.sc-task-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── 演武场 ── */
.sa-arena-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;border:1px solid var(--border);border-radius:10px;
  background:var(--panel2);margin-bottom:12px;
}
.sa-arena-title{font-size:14px;color:var(--gold);font-weight:bold;letter-spacing:2px;}
.sa-arena-info{font-size:11px;color:var(--text3);}
.sa-opponent-grid{display:grid;gap:8px;}
.sa-opponent{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;border:1px solid var(--border);border-radius:10px;
  background:var(--panel2);transition:.15s;cursor:pointer;
}
.sa-opponent:hover:not(.sa-locked):not(.sa-defeated){border-color:var(--border2);background:rgba(240,192,64,.03);}
.sa-opponent.sa-locked{opacity:.4;cursor:not-allowed;}
.sa-opponent.sa-defeated{opacity:.5;border-color:rgba(128,232,128,.2);background:rgba(128,232,128,.03);}
.sa-opp-icon{font-size:28px;flex-shrink:0;}
.sa-opp-info{flex:1;min-width:0;}
.sa-opp-name{font-size:13px;color:var(--gold);}
.sa-opp-title{font-size:10px;color:var(--text3);margin-top:2px;}
.sa-opp-level{
  text-align:right;flex-shrink:0;
}
.sa-opp-lv{font-size:12px;color:var(--warn);font-weight:bold;}
.sa-opp-reward{font-size:9px;color:var(--ok);margin-top:2px;}
.sa-arena-result{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;
}
.sa-arena-result.active{display:flex;}
.sa-arena-result-box{
  width:min(420px,90vw);padding:30px 24px;border-radius:14px;
  background:linear-gradient(170deg,#121418,#0e1014);
  border:1px solid rgba(240,192,96,.25);text-align:center;
}
.sa-result-icon{font-size:48px;margin-bottom:12px;}
.sa-result-text{font-size:16px;color:var(--text);line-height:1.6;margin-bottom:8px;}
.sa-result-reward{font-size:13px;color:var(--ok);margin-bottom:16px;}
.sa-result-btn{
  padding:10px 28px;border-radius:8px;font-size:13px;cursor:pointer;
  border:1px solid rgba(240,192,64,.4);background:rgba(240,192,64,.1);
  color:var(--gold);font-family:inherit;letter-spacing:2px;
}

/* ── 炼丹房 ── */
.sc-alchemy-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;border:1px solid var(--border);border-radius:10px;
  background:var(--panel2);margin-bottom:12px;
}
.sc-alchemy-title{font-size:14px;color:#a0d0ff;font-weight:bold;letter-spacing:2px;}
.sc-alchemy-balance{font-size:11px;color:var(--text3);}
.sc-recipe-list{display:grid;gap:8px;}
.sc-recipe-item{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;border:1px solid var(--border);border-radius:10px;
  background:var(--panel2);transition:.15s;cursor:pointer;
}
.sc-recipe-item:hover:not(.sc-locked):not(.sc-cant-craft){border-color:rgba(160,208,255,.25);background:rgba(160,208,255,.04);}
.sc-recipe-item.sc-locked{opacity:.4;cursor:not-allowed;}
.sc-recipe-item.sc-cant-craft{opacity:.55;}
.sc-recipe-icon{font-size:26px;flex-shrink:0;}
.sc-recipe-info{flex:1;min-width:0;}
.sc-recipe-name{font-size:13px;color:#a0d0ff;}
.sc-recipe-desc{font-size:10px;color:var(--text3);margin-top:2px;}
.sc-recipe-mats{font-size:9px;color:var(--warn);margin-top:4px;}
.sc-recipe-mats .has{color:var(--ok);}
.sc-recipe-mats .miss{color:var(--danger);}
.sc-recipe-result{
  text-align:right;flex-shrink:0;
}
.sc-recipe-exp{font-size:11px;color:var(--ok);font-weight:bold;}

/* ── 藏宝阁 ── */
.st-treasury-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;border:1px solid var(--border);border-radius:10px;
  background:linear-gradient(170deg,rgba(255,215,100,.05),transparent);margin-bottom:12px;
}
.st-treasury-title{font-size:14px;color:#ffd700;font-weight:bold;letter-spacing:2px;}
.st-treasury-balance{font-size:12px;color:#ffd700;}
.st-treasury-cat{font-size:11px;color:var(--gold2);letter-spacing:1px;margin:14px 0 8px;padding-left:4px;border-bottom:1px dashed rgba(255,215,100,.15);padding-bottom:4px;}
.st-treasure-item{
  display:flex;align-items:center;gap:10px;
  padding:11px 13px;background:rgba(255,215,100,.02);
  border:1px solid transparent;border-radius:9px;margin-bottom:6px;
  transition:.15s;cursor:pointer;
}
.st-treasure-item:hover:not(.st-locked):not(.st-cant-afford){
  background:rgba(255,215,100,.06);border-color:rgba(255,215,100,.18);
}
.st-treasure-item.st-locked{opacity:.35;cursor:not-allowed;}
.st-treasure-item.st-cant-afford{opacity:.5;}
.st-treasure-icon{font-size:22px;flex-shrink:0;}
.st-treasure-info{flex:1;min-width:0;}
.st-treasure-name{font-size:12px;color:#f0d080;}
.st-treasure-desc{font-size:10px;color:var(--text3);margin-top:1px;}
.st-treasure-price{text-align:right;flex-shrink:0;}
.st-treasure-cost{font-size:13px;color:#ffd700;font-weight:bold;}
.st-treasure-curr{font-size:9px;color:var(--text3);}

/* ── 公告栏 ── */
.sb-board-header{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;border:1px solid var(--border);border-radius:10px;
  background:var(--panel2);margin-bottom:12px;
}

.sb-daily-card.sb-done{opacity:.55;border-color:rgba(128,232,128,.2);}
.sb-daily-card.sb-locked{opacity:.4;cursor:not-allowed;}
.sb-daily-icon{font-size:22px;flex-shrink:0;}
.sb-daily-info{flex:1;min-width:0;}

.sb-daily-action{flex-shrink:0;}
.sb-daily-btn{

  border:1px solid rgba(240,192,64,.3);background:rgba(240,192,64,.08);
  color:var(--gold);font-family:inherit;transition:.15s;
}
.sb-daily-btn:hover{background:rgba(240,192,64,.15);}
.sb-daily-btn:disabled{opacity:.4;cursor:not-allowed;}
.sb-daily-status{font-size:11px;color:var(--ok);font-weight:bold;}
.sb-bounty-section{margin-top:16px;}
.sb-bounty-empty{

}

/* 任务叙事弹窗 */
.sc-narrative-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.82);display:none;align-items:center;justify-content:center;
  animation:fadeIn .18s ease;
}
.sc-narrative-overlay.active{display:flex;}
.sc-narrative-box{
  width:min(520px,94vw);max-height:80vh;border-radius:12px;
  background:linear-gradient(170deg,#121418,#0e1014);
  border:1px solid rgba(240,192,96,.2);
  box-shadow:0 0 60px rgba(0,0,0,.7);
  overflow-y:auto;display:flex;flex-direction:column;
}
.sc-narrative-scene{
  text-align:center;padding:18px 16px 12px;
  font-family:'Courier New',monospace;font-size:11px;
  color:var(--gold2);line-height:1.6;white-space:pre;
  border-bottom:1px solid rgba(255,255,255,.06);
  background:rgba(240,192,64,.02);
}
.sc-narrative-lines{padding:18px 20px;}
.sc-narrative-line{
  font-size:13px;color:var(--text2);line-height:1.9;margin-bottom:6px;
}
.sc-narrative-footer{
  padding:14px 20px;display:flex;gap:10px;
  border-top:1px solid rgba(255,255,255,.06);flex-shrink:0;
}
.sc-narrative-btn{
  flex:1;padding:11px 0;border-radius:8px;font-size:13px;
  cursor:pointer;font-family:inherit;letter-spacing:2px;transition:.15s;
}
.sc-narrative-confirm{
  background:linear-gradient(135deg,rgba(200,150,30,.8),rgba(240,180,40,.8));
  border:1px solid rgba(220,170,50,.5);color:#fff8e0;font-weight:bold;
}
.sc-narrative-cancel{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:#aaa;
}

/* ── Toast ── */
.sect-toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  padding:10px 22px;border-radius:8px;font-size:13px;z-index:9999;
  pointer-events:none;animation:stToastIn .25s ease;
  max-width:90vw;text-align:center;letter-spacing:.5px;
}
@keyframes stToastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}


/* ═══ 动画 ═══ */
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* ── 门派入场动画全屏覆盖层 ── */
.sect-entry-overlay{
  position:fixed;inset:0;z-index:99999;
  background:linear-gradient(180deg, #0a0612 0%, #0d0818 50%, #080410 100%);
  display:none;align-items:center;justify-content:center;
  flex-direction:column;text-align:center;
  pointer-events:auto;
}
.sect-entry-overlay.active{display:flex!important;}

/* ASCII 大画容器 */
.sect-entry-art{
  font-family:'Courier New',monospace;font-size:15px;line-height:1.4;
  color:var(--entry-color,#f0c060);white-space:pre;overflow-x:auto;
  max-width:96vw;max-height:58vh;margin:0 auto;padding:16px 12px;
  opacity:0;transform:scale(.88) translateY(20px);
  transition:opacity .8s ease, transform .9s cubic-bezier(.2,.8,.2,1);
  text-shadow:0 0 14px var(--entry-glow,rgba(240,192,96,.35));
  filter:drop-shadow(0 0 18px var(--entry-glow,rgba(240,192,96,.2)));
}
.sect-entry-art.show{opacity:1;transform:scale(1) translateY(0);}

/* 入场门派名称 */
.sect-entry-name{
  margin-top:20px;font-size:30px;font-weight:bold;
  letter-spacing:8px;color:var(--entry-color,#f0c060);
  opacity:0;transform:translateY(15px);
  transition:opacity .6s ease .7s, transform .6s ease .7s;
  text-shadow:0 0 24px var(--entry-glow,rgba(240,192,96,.4)), 0 0 60px var(--entry-glow,rgba(240,192,96,.15));
}
.sect-entry-name.show{opacity:1;transform:translateY(0);}

/* 入场副标题 */
.sect-entry-sub{
  margin-top:8px;font-size:14px;color:rgba(255,255,255,.55);
  letter-spacing:4px;opacity:0;
  transition:opacity .5s ease 1.2s;
}
.sect-entry-sub.show{opacity:1;}

/* 跳过按钮 */
.sect-entry-skip{
  position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
  padding:8px 22px;border-radius:6px;font-size:11px;cursor:pointer;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  color:var(--text3);letter-spacing:1px;transition:.2s;opacity:0;
  transition:opacity .3s ease 1.2s, background .2s;
}
.sect-entry-skip.show{opacity:1;}
.sect-entry-skip:hover{background:rgba(255,255,255,.12);color:var(--text);}

/* 粒子飘落效果（门派特色） */
.entry-particle{
  position:absolute;width:3px;height:3px;border-radius:50%;
  pointer-events:none;opacity:0;
  animation:epFall linear forwards;
}
@keyframes epFall{
  0%{opacity:0;transform:translateY(-10px) scale(.5);}
  15%{opacity:.7;}
  85%{opacity:.4;}
  100%{opacity:0;transform:translateY(100vh) scale(.2);}
}

/* Hero区内的ASCII形象画 */
.sect-hero-ascii{
  text-align:center;padding:14px 8px 6px;
  font-family:'Courier New',monospace;font-size:12.5px;line-height:1.35;
  color:var(--hero-color,#f0c060);white-space:pre;overflow-x:auto;
  opacity:0;animation:saFadeIn .7s ease .15s forwards;
  border-bottom:1px solid rgba(255,255,255,.05);
  margin-bottom:8px;background:rgba(0,0,0,.2);
  border-radius:8px;letter-spacing:.08em;
  filter:drop-shadow(0 0 8px var(--hero-glow,rgba(240,192,96,.12)));
}
@keyframes saFadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* 打字光标闪烁 */
.sect-type-cursor{
  display:inline-block;width:2px;height:1em;background:var(--entry-color,#f0c060);
  animation:typeBlink .7s step-end infinite;vertical-align:text-bottom;margin-left:2px;
}
@keyframes typeBlink{50%{transparent;}}

/* ── 入场动画阶段控制 ── */
.sect-entry-overlay.entry-phase-fadein .entry-ascii{opacity:1;transform:scale(1) translateY(0);animation:asciiShimmer 2.5s ease-out forwards;}
.sect-entry-overlay.entry-phase-exit{opacity:0;transition:opacity .45s ease;pointer-events:none;}

@keyframes asciiShimmer{
  0%{opacity:0;transform:scale(.92) translateY(18px);filter:brightness(.5);}
  30%{opacity:1;transform:scale(.98) translateY(4px);filter:brightness(1.1);}
  60%{transform:scale(1) translateY(0);filter:brightness(1);}
  100%{opacity:1;transform:scale(1) translateY(0);filter:brightness(1);}
}

/* 标题/副标题文字渐显 */
.entry-text-show{opacity:1 !important;transform:translateY(0) !important;transition:opacity .6s cubic-bezier(.2,.8,.2,1), transform .6s cubic-bezier(.2,.8,.2,1) !important;}
.entry-title{opacity:0;transform:translateY(12px);transition:opacity .5s ease, transform .5s ease;}
.entry-sub{opacity:0;transform:translateY(8px);transition:opacity .4s ease .15s, transform .4s ease .15s;}

/* 分隔线从中心向两边展开 */
.entry-bar{
  width:0;height:1px;background:linear-gradient(90deg, transparent, var(--sect-glow,#f0c060), transparent);
  margin:10px auto;transition:width .7s cubic-bezier(.2,.8,.2,1) .6s;
}
.entry-bar-grow{width:min(320px,70vw) !important;}

/* 脉冲提示 */
@keyframes entryPulse{
  0%,100%{opacity:.5;}
  50%{opacity:1;text-shadow:0 0 12px currentColor;}
}

/* ═══ 手机适配 ═══ */
@media(max-width:640px){

    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
//  sect.html — 门派总舵
// ════════════════════════════════════════════════════════════════

(function(){
  'use strict';

  // ── 状态 ──
  let currentSectId = null;   // 当前查看/加入的门派ID
  let isJoined = false;       // 是否已加入当前门派
  let currentTab = 'overview';

  // ── 门派规模 → 功能开关表 ──
  // supreme=超级门派(全功能) / major=大型门派(大部分) / minor=小型/新兴势力(基础)
  const SECT_TIER_FEATURES = {
    supreme: {
      library: true,    // 藏经阁：完整功法列表
      shop: true,       // 贡献商店：完整商品
      missions: true,   // 门派要务：完整任务链(3-4节)
      hallFull: true,   // 长老殿：完整版（掌门对话+多选项）
      arena: true,      // 演武场：全部对手
      alchemy: true,    // 炼丹房：完整配方
      treasury: true,   // 藏宝阁：稀有装备/道具
      board: true,      // 公告栏：日常+悬赏
      realm: true,      // 秘境：全部3难度
      building: true,   // 建筑：升级系统
      talent: true,     // 天赋：天赋树
      npc: true,        // 弟子：NPC成长
      events: true,     // 动态：随机事件
      war: true,        // 战争：阵营战争
      economy: true,    // 经济：资金库+悬赏
    },
    major: {
      library: true,
      shop: true,
      missions: true,
      hallFull: false,
      arena: true,      // 演武场：有（3个对手）
      alchemy: true,    // 炼丹房：基础配方
      treasury: true,   // 藏宝阁：有（商品少）
      board: true,      // 公告栏：日常有，悬赏无
      realm: true,      // 秘境：全部3难度
      building: true,   // 建筑：升级系统
      talent: true,     // 天赋：天赋树
      npc: true,        // 弟子：NPC成长
      events: true,     // 动态：随机事件
      war: true,        // 战争：阵营战争
      economy: true,    // 经济：资金库+悬赏
    },
    minor: {
      library: true,
      shop: false,
      missions: false,
      hallFull: false,
      arena: false,     // 演武场：无
      alchemy: false,   // 炼丹房：无
      treasury: false,  // 藏宝阁：无
      board: true,      // 公告栏：仅日常
      realm: true,      // 秘境：全部3难度
      building: true,   // 建筑：升级系统
      talent: true,     // 天赋：天赋树
      npc: true,        // 弟子：NPC成长
      events: true,     // 动态：随机事件
      war: true,        // 战争：阵营战争
      economy: true,    // 经济：资金库+悬赏
    },
  };

  /**
   * 获取当前门派的功能开关
   */
  function getSectFeatures(sect){
    const tier = (sect && sect.tier) || 'minor';
    return SECT_TIER_FEATURES[tier] || SECT_TIER_FEATURES.minor;
  }

  // ── 工具函数 ──
  function qs(s){ return document.querySelector(s); }
  function qsa(s){ return document.querySelectorAll(s); }
  function showToast(msg, type){
    type = type || 'info';
    const colors = { info:'#f0c060', warn:'#ffaa40', error:'#ff6060', ok:'#80e880' };
    const el = document.createElement('div');
    el.className = 'sect-toast';
    el.style.background = colors[type] || colors.info;
    el.style.color = '#000';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 2500);
  }

  // ── ASCII 转义工具 ──
  function _escapeAscii(art){
    return (art||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\n/g,'<br>').replace(/ /g,'&nbsp;');
  }

  // ══════════════════════════════════════
  //  🎬 门派入场动画系统
  // ══════════════════════════════════════
  function playEntryAnimation(sect){
    var overlay = qs('#sectEntryOverlay');
    var artBox = overlay ? document.getElementById('sectEntryArt') : null;
    var titleEl = overlay ? document.getElementById('sectEntryName') : null;
    var subEl = overlay ? document.getElementById('sectEntrySub') : null;

    if(!overlay){ console.warn('[entry] no overlay'); _skipEntry(); return; }
    if(!artBox){ console.warn('[entry] no artBox'); _skipEntry(); return; }
    if(!sect){ console.warn('[entry] no sect data'); _skipEntry(); return; }

    // 设置 ASCII 大画
    var artContent = (sect.asciiArt || sect.ascii || '');
    if(!artContent){
      console.warn('[entry] no ascii art for', sect.id);
      _skipEntry(); return;
    }

    artBox.innerHTML = '<pre style="margin:0;color:inherit;font-size:.72em;line-height:1.15;text-shadow:0 0 8px ' + (sect.color||'#f0c060') + '66;white-space:pre-wrap;word-break:break-all">' + _escapeAscii(artContent) + '</pre>';
    artBox.style.setProperty('--entry-color', sect.color || '#f0c060');
    artBox.style.setProperty('--entry-glow', (sect.color||'#f0c060') + '44');

    // 标题
    if(titleEl){
      titleEl.textContent = sect.name || '门派总舵';
      titleEl.style.setProperty('--entry-color', sect.color || '#f0c060');
      titleEl.style.setProperty('--entry-glow', (sect.color||'#f0c060') + '33');
    }
    // 副标题
    if(subEl) subEl.textContent = '「' + (sect.tag || '') + '」·' + ({supreme:'超级',major:'大型',minor:'小型'}[sect.tier]||'' ) + '门派';

    // 强制显示 overlay
    overlay.className = 'sect-entry-overlay active entry-phase-fadein';
    void overlay.offsetWidth;

    // 阶段1：ASCII画渐显
    setTimeout(function(){ if(artBox) artBox.classList.add('show'); }, 80);

    // 阶段2：标题
    setTimeout(function(){
      if(titleEl) titleEl.classList.add('show');
    }, 700);

    // 阶段3：副标题
    setTimeout(function(){
      if(subEl) subEl.classList.add('show');
    }, 1200);

    // 阶段4：提示（更醒目）
    setTimeout(function(){
      // 检查是否已关闭
      if(!overlay || !overlay.parentNode) return;
      var hint = document.createElement('div');
      hint.className = 'sect-entry-skip show';
      hint.innerHTML = '👆 点击任意处进入总舵 →';
      hint.style.cssText = 'position:absolute;bottom:30px;left:50%;transform:translateX(-50%);padding:10px 28px;border-radius:8px;font-size:13px;cursor:pointer;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#ccc;letter-spacing:2px;z-index:100;';
      overlay.appendChild(hint);
    }, 1800);

    // 点击关闭
    var closed = false;
    function closeEntry(){
      if(closed) return;
      closed = true;
      overlay.classList.add('entry-phase-exit');
      setTimeout(function(){
        if(!overlay) return;
        overlay.style.display = 'none';
        overlay.className = 'sect-entry-overlay';
        if(artBox) artBox.classList.remove('show');
        if(titleEl) titleEl.classList.remove('show');
        if(subEl) subEl.classList.remove('show');
        // 清除动态添加的提示
        var hints = overlay.querySelectorAll('.sect-entry-skip');
        for(var i=0;i<hints.length;i++){
          if(hints[i].parentNode && i > 0 || hints[i].innerHTML.indexOf('点击任意处')>=0)
            hints[i].remove();
        }
      }, 500);
    }

    // 绑定点击事件（多种方式确保能触发）
    function _onEntryClick(e){
      e.preventDefault();
      e.stopPropagation();
      closeEntry();
    }
    overlay.addEventListener('click', _onEntryClick);
    overlay.addEventListener('touchend', _onEntryClick, {once:true});
    // 双击也触发
    overlay.addEventListener('dblclick', function(e){
      e.preventDefault();
      closeEntry();
    });
  }

  function _skipEntry(){
    // 无动画时直接隐藏
    var o = qs('#sectEntryOverlay');
    if(o){
      o.style.display = 'none';
      o.className = 'sect-entry-overlay';
    }
  }

  // ── 初始化入口 ──
  function sectInit(){
    // DEBUG: 确认初始化被调用
    console.log('[sect] sectInit called, readyState:', document.readyState);
    
    // fallback: 如果 edS 未定义，尝试从 localStorage 恢复基础数据
    if(typeof edS === 'undefined'){
      try{
        var _saved = JSON.parse(localStorage.getItem('wuxia_editor') || '{}');
        if(_saved && _saved.name){
          window.edS = _saved;
        } else {
          // 完全无存档时创建一个最小化的假 edS 以便浏览
          window.edS = { name:'侠客', sect:null, level:1, silver:0, contribution:0 };
        }
      }catch(e){
        window.edS = { name:'侠客', sect:null, level:1, silver:0, contribution:0 };
      }
    }

    // 从 URL 参数或 sessionStorage 获取目标门派
    const urlParams = new URLSearchParams(window.location.search);
    const targetSect = urlParams.get('sect') || sessionStorage.getItem('wuxia_target_sect') || null;
    const returnCity = sessionStorage.getItem('wuxia_return_city') || 'luoyang';

    // 返回按钮
    qs('#sectBackBtn').addEventListener('click', function(){
      if(typeof clearGameAudio === 'function') clearGameAudio();
      sessionStorage.setItem('pendingTravelTo', returnCity);
      window.location.href = 'town.html';
    });

    // 决定显示哪个视图
    const playerSect = edS.sect || null;

    if(targetSect){
      // 指定了目标门派 → 总舵界面
      currentSectId = targetSect;
      isJoined = (playerSect === targetSect);
      console.log('[sect] calling showHqView for:', targetSect, 'SECTS exists:', typeof SECTS !== 'undefined');
      showHqView();
      if(typeof BgmManager !== 'undefined') BgmManager.play('townMellow');

      // 门派演武场战斗结果检查
      _checkSectArenaResult();
    } else {
      // 无门派参数 → 显示提示
      showNoSectView();
    }

    // 绑定 Tab 切换
    qsa('.sect-tab').forEach(function(tab){
      tab.addEventListener('click', function(){
        const t = this.getAttribute('data-tab');
        switchTab(t);
      });
    });
  }

  // ── 无门派参数时显示提示 ──
  function showNoSectView(){
    qs('#sectBrowserView').style.display = '';
    qs('#sectHqView').style.display = 'none';
    qs('#sectPageTitle').textContent = '🏯 门派总舵';
    // 隐藏 Tab 导航
    const tabsNav = qs('#sectTabsNav');
    if(tabsNav) tabsNav.style.display = 'none';
  }

  // ── 显示门派总舵（指定门派的完整页面）──
  function showHqView(){
    qs('#sectBrowserView').style.display = 'none';
    qs('#sectHqView').style.display = '';
    // 确保 Tab 导航可见
    const tabsNav = qs('#sectTabsNav');
    if(tabsNav) tabsNav.style.display = '';

    const sect = (typeof SECTS !== 'undefined') ? SECTS.find(function(s){return s.id === currentSectId;}) : null;
    if(!sect){
      // 延迟重试：可能数据还未加载完
      console.warn('[sect] 门派数据未找到:', currentSectId, 'SECTS:', typeof SECTS !== 'undefined' ? SECTS.length : 'undefined');
      setTimeout(function(){ showHqView(); }, 300);
      return;
    }

    // 更新标题栏颜色主题
    document.documentElement.style.setProperty('--tab-color', sect.color);

    // 🎬 播放入场动画（每次进入门派总舵时播放，可点击跳过）
    window._entryPlayed = false;
    if(!window._entryPlayed){
      window._entryPlayed = true;
      setTimeout(function(){ playEntryAnimation(sect); }, 200);
    }
    console.log('[sect] showHqView completed for:', sect.id, 'SECTS count:', (typeof SECTS !== 'undefined' ? SECTS.length : 'undefined'));

    // ── 根据门派规模动态调整可用功能 ──
    const feats = getSectFeatures(sect);
    applyTierTabs(sect, feats);

    // 渲染各区域
    renderHero(sect);
    renderOverview(sect);
    renderHall(sect);
    renderLibrary(sect);
    renderShop(sect);
    renderMissions(sect);
    renderArena(sect);     // 演武场
    renderAlchemy(sect);   // 炼丹房
    renderTreasury(sect);  // 藏宝阁
    renderRealmPanel(sect); // 秘境
    renderSectBuildingPanel(sect); // 建筑
    renderSectTalentPanel(sect);  // 天赋
    renderSectNpcPanel(sect);      // 弟子成长
    renderSectEventsPanel(sect); // 动态事件
    renderSectWarPanel(sect);    // 阵营战争
    renderSectEconomyPanel(sect); // 门派经济
    renderBoard(sect);            // 公告栏

    // 更新页面标题
    const joinMark = isJoined ? '✦' : '🔍';
    qs('#sectPageTitle').textContent = joinMark + ' ' + sect.name;
  }

  /**
   * 根据门派规模隐藏/锁定 Tab
   * - 功能不可用 → 隐藏 Tab 按钮 + 内容区显示锁定提示
   */
  function applyTierTabs(sect, feats){
    // Tab ID → 功能开关 的映射
    const tabMap = {
      'library':   { feat:'library',   label:'藏经阁',   icon:'📖', lockMsg:'🔒 本门派规模较小，暂无藏经阁' },
      'shop':      { feat:'shop',      label:'贡献商店', icon:'⚔',  lockMsg:'🔒 本门派暂无贡献商店' },
      'missions':  { feat:'missions',  label:'门派要务', icon:'📜', lockMsg:'🔒 本门派暂无要务发布' },
      'arena':     { feat:'arena',     label:'演武场',   icon:'⚔️', lockMsg:'🏚 本门派规模较小，暂无演武场' },
      'alchemy':   { feat:'alchemy',   label:'炼丹房',   icon:'🧪', lockMsg:'🏚 本门派暂无炼丹设施' },
      'treasury':  { feat:'treasury',  label:'藏宝阁',   icon:'💰', lockMsg:'🏚 本门派暂无藏宝阁' },
      'realm':     { feat:'realm',     label:'秘境',     icon:'🏰', lockMsg:'🏚 本门派暂无秘境' },
      'building':  { feat:'building',  label:'建筑',     icon:'🏗', lockMsg:'🏚 本门派暂无建筑系统' },
      'talent':    { feat:'talent',    label:'天赋',     icon:'🌟', lockMsg:'🏚 本门派暂无天赋系统' },
      'npc':       { feat:'npc',       label:'弟子',     icon:'👥', lockMsg:'🏚 本门派暂无弟子系统' },
      'events':    { feat:'events',    label:'动态',     icon:'📜', lockMsg:'🏚 本门派暂无动态' },
      'war':       { feat:'war',       label:'战争',     icon:'⚔️', lockMsg:'🏚 本门派暂无战争' },
      'economy':   { feat:'economy',   label:'经济',     icon:'💰', lockMsg:'🏚 本门派暂无经济系统' },
    };

    Object.keys(tabMap).forEach(function(tabId){
      const cfg = tabMap[tabId];
      const tabBtn = qs('.sect-tab[data-tab="' + tabId + '"]');
      const tabContent = qs('#tab-' + tabId);

      if(!feats[cfg.feat]){
        // 功能不可用 → 隐藏 Tab 按钮
        if(tabBtn) tabBtn.style.display = 'none';
        // 内容区显示锁定提示（如果当前正在查看这个 tab）
        if(tabContent){
          tabContent.innerHTML =
            '<div class="sect-library-empty" style="padding:30px 16px">' +
            '<div style="font-size:28px;margin-bottom:10px">🏚</div>' +
            '<div style="font-size:13px;color:var(--text3);letter-spacing:1px">' + cfg.lockMsg + '</div>' +
            '<div style="font-size:11px;color:var(--text3);margin-top:8px;opacity:.6">「' + (sect.tag||'') + '」— ' + ({supreme:'超级',major:'大型',minor:'新兴'}[sect.tier]||'小型') + '势力</div>' +
            '</div>';
        }
      } else {
        // 功能可用 → 确保显示
        if(tabBtn) tabBtn.style.display = '';
      }
    });

    // 如果当前激活的 tab 被隐藏了，切回 overview
    if(!feats[currentTab] && currentTab !== 'overview' && currentTab !== 'hall'){
      switchTab('overview');
    }
  }

  // ── Tab 切换 ──
  function switchTab(tab){
    currentTab = tab;
    qsa('.sect-tab').forEach(function(t){ t.classList.toggle('active', t.getAttribute('data-tab') === tab); });
    qsa('.sect-tab-content').forEach(function(c){ c.classList.toggle('active', c.id === 'tab-' + tab); });
  }


  // ════════════════════════════════════════
  //   区域渲染函数
  // ════════════════════════════════════════

  // ── 英雄横幅 + 阶级条 + ASCII形象画 ──
  function renderHero(sect){
    const ed = edS || {};
    const rank = ed.sectRank || 'disciple';
    const contrib = ed.sectContrib || 0;
    const rankCfg = (typeof SECT_RANK_CFG !== 'undefined') ? SECT_RANK_CFG[rank] : null;

    // 注入门派颜色变量
    const hero = qs('#sectHeroArea');
    hero.style.setProperty('--hero-bg1', sect.bg1 || 'rgba(240,192,64,.06)');
    hero.style.setProperty('--hero-bg2', sect.bg2 || 'rgba(240,192,64,.02)');
    hero.style.setProperty('--hero-border', sect.border || 'rgba(240,192,64,.2)');
    hero.style.setProperty('--hero-badge', sect.color + '15');
    hero.style.setProperty('--hero-color', sect.color);
    hero.style.setProperty('--hero-glow', sect.glow || 'rgba(240,192,96,.2)');

    var tierLabel = {supreme:'✦ 超级门派',major:'◆ 大型门派',minor:'◇ 新兴势力'}[sect.tier]||'';
    var alignMap = {righteous:'#80d0ff',neutral:'#888',chaotic:'#ffaa40',evil:'#ff6060'};
    var alignLabel = {righteous:'⚖ 正道', neutral:'〇 中立', chaotic:'⚡ 混乱', evil:'☠ 邪道'}[sect.alignment||'neutral']||'〇 中立';

    // ── 构建ASCII大画（嵌入Hero区顶部）──
    var artHtml = (sect.asciiArt ?
      '<div class="sect-hero-ascii" style="color:' + sect.color + ';--hero-glow:' + (sect.glow||'rgba(240,192,96,.15)') + '">' +
        _escapeAscii(sect.asciiArt) +
      '</div>' : '');

    qs('#sectHeroInner').innerHTML =
      artHtml +
      '<div class="sect-hero-top">' +
        '<div class="sect-hero-emblem" style="border-color:' + (sect.color||'#f0c060') + '44;background:' + (sect.color||'#f0c060') + '12">' + sect.emblem + '</div>' +
        '<div class="sect-hero-info">' +
          '<div class="sect-hero-name" style="color:' + sect.color + '">' + sect.name + '</div>' +
          '<div class="sect-hero-title">' + sect.title + '</div>' +
          '<div class="sect-hero-tag">「' + sect.tag + '」</div>' +
          '<div class="sect-hero-meta">' +
            '<span class="sect-meta-chip">' + tierLabel + '</span>' +
            '<span class="sect-meta-chip" style="color:' + (alignMap[sect.alignment]||'#888') + '">' + alignLabel + '</span>' +
            '<span class="sect-meta-chip">⚔ ' + sect.members + '</span>' +
            (isJoined ? '<span class="sect-meta-chip" style="color:var(--ok);border-color:rgba(128,232,128,.2)">' + (rankCfg?rankCfg.icon+rankCfg.name:'弟子') + '</span>' : '') +
          '</div>' +
        '</div>' +
      '</div>';

    // 阶级进度条（仅已加入时显示）
    const rankBar = qs('#sectRankBar');
    if(isJoined && typeof SECT_RANK_CFG !== 'undefined'){
      rankBar.style.display = '';
      const ranks = ['disciple','elite','elder','grand','grandmaster'];
      const currIdx = ranks.indexOf(rank);
      const isMaxRank = currIdx >= ranks.length - 1;
      const nextIdx = isMaxRank ? currIdx : currIdx + 1;
      const nextRank = isMaxRank ? null : SECT_RANK_CFG[ranks[nextIdx]];
      const prevContrib = currIdx > 0 ? SECT_RANK_CFG[ranks[currIdx-1]].minContrib : 0;
      const nextContrib = nextRank ? nextRank.minContrib : contrib + 1;
      const pct = isMaxRank ? 100 : (nextContrib > prevContrib ? Math.min(100, ((contrib - prevContrib) / (nextContrib - prevContrib)) * 100) : 100);

      const rankColors = {
        disciple:{c1:'#a0a0a0',c2:'#808080'},
        elite:{c1:'#60c0e0',c2:'#3080b0'},
        elder:{c1:'#e0a040',c2:'#c08020'},
        grand:{c1:'#ffe060',c2:'#d0a010'},
        grandmaster:{c1:'#ff9020',c2:'#e06010'},
      };
      const rc = rankColors[rank] || rankColors.disciple;

      rankBar.innerHTML =
        '<div class="srb-row"><span class="srb-label">当前阶级</span><span class="srb-value"><span class="rank-icon">' + (rankCfg?rankCfg.icon:'📜') + '</span>' + (rankCfg?rankCfg.name:'弟子') + '</span></div>' +
        '<div class="srb-row"><span class="srb-label">贡献值</span><span class="srb-value" style="color:var(--ok)">⚔ ' + contrib + (nextRank ? ' / ' + nextRank.minContrib + ' → ' + nextRank.name : '') + '</span></div>' +
        '<div class="srb-progress"><div class="srb-progress-fill" style="width:' + pct + '%;--rank-color1:' + rc.c1 + ';--rank-color2:' + rc.c2 + '"></div></div>' +
        '<div class="srb-rank-stages">' + ranks.map(function(r,i){
          const sc = SECT_RANK_CFG[r];
          const isActive = i <= currIdx;
          const isCurrent = i === currIdx;
          return '<div class="srb-stage' + (isActive?' active':'') + (isCurrent?' current':'') + '">' + sc.icon + sc.name + '</div>';
        }).join('') + '</div>';
    } else {
      rankBar.style.display = 'none';
    }
  }

  // ── 门派综合实力评分 ──
  // 基于门派等级、弟子数、建筑、声望等多维综合计算
  function _calcSectPower(sect){
    if(!sect) return 0;
    var bd = _calcSectPowerBreakdown(sect);
    var total = 0;
    for(var i=0;i<bd.length;i++) total += bd[i].val;
    return total;
  }
  function _calcSectPowerBreakdown(sect){
    if(!sect) return [];
    var tierBase = { supreme:300, major:200, minor:100 };
    var base = tierBase[sect.tier] || 100;
    // 弟子数（每100人=10分，上限60）
    var memberScore = Math.min(60, Math.round((sect.members||100) / 100 * 10));
    // 门派建筑总分（如果有建筑数据）
    var buildingScore = 0;
    if(typeof sbGetAllEffects === 'function'){
      var effects = sbGetAllEffects();
      if(effects){
        var keys = Object.keys(effects);
        for(var i=0;i<keys.length;i++){
          // 每种建筑效果=5分，总上限50
          buildingScore += 5;
        }
        buildingScore = Math.min(50, buildingScore);
      }
    }
    // NPC实力（从 NPC_DB 查找门派NPC）
    var npcScore = 0;
    if(typeof NPC_DB !== 'undefined' && NPC_DB.length){
      var sectNpcs = NPC_DB.filter(function(n){ return n.sect === sect.id; });
      if(sectNpcs.length){
        var avgLvl = sectNpcs.reduce(function(s,n){ return s + (n.level||1); },0) / sectNpcs.length;
        npcScore = Math.min(40, Math.round(sectNpcs.length * 3 + avgLvl * 0.3));
      }
    }
    // 资金实力（如果有经济数据）
    var econScore = 0;
    if(typeof seGetFund === 'function'){
      var fund = seGetFund();
      if(fund > 0) econScore = Math.min(30, Math.round(Math.log10(fund+1) * 8));
    }
    // 声望加成（与其他门派平均好感值）
    var repScore = 0;
    if(typeof swLoadRelations === 'function'){
      var rels = swLoadRelations();
      var sum = 0, count = 0;
      for(var key in rels){
        if(key.indexOf(sect.id) === 0 && rels.hasOwnProperty(key)){
          sum += rels[key]; count++;
        }
      }
      if(count > 0) repScore = Math.min(20, Math.round((sum/count+100)/10));
    }
    return [
      { label:'门派底蕴', val:base, color:'#f0c060' },
      { label:'弟子规模', val:memberScore, color:'#60d0e0' },
      { label:'建筑设施', val:buildingScore, color:'#80c0ff' },
      { label:'弟子实力', val:npcScore, color:'#d0a0ff' },
      { label:'资金储备', val:econScore, color:'#a0e080' },
      { label:'江湖声望', val:repScore, color:'#ff9060' },
    ];
  }

  // ── 声望奖励渲染（基于门派间好感值解锁跨门派奖励）──
  // 存档 key：wuxia_sect_rep_rewards = { sectId_targetId_rewardKey: true }
  var REP_REWARD_SAVE = 'wuxia_sect_rep_rewards';

  // 声望奖励配置：每个好感等级对应的奖励
  var REP_REWARDS = {
    friendly: { minRel: 20, label:'友好互惠', icon:'😊',
      desc:'友好关系带来的互惠',
      rewards: [
        { key:'silver_gift', label:'银两馈赠', icon:'💰', desc:'对方门派赠送银两', action:'silver', value:200 },
        { key:'exp_book',    label:'武学交流', icon:'📖', desc:'获得少量经验', action:'exp', value:100 },
      ]
    },
    close: { minRel: 50, label:'亲密同盟', icon:'🤝',
      desc:'亲密同盟的深厚情谊',
      rewards: [
        { key:'rare_material', label:'稀有材料', icon:'💎', desc:'对方赠送稀有材料', action:'material', value:1 },
        { key:'sect_manual',   label:'功法秘籍', icon:'📜', desc:'获赠对方门派入门功法', action:'manual', value:1 },
      ]
    },
    sworn: { minRel: 80, label:'生死之交', icon:'❤',
      desc:'过命的交情',
      rewards: [
        { key:'legendary_recipe', label:'传奇丹方', icon:'✨', desc:'获赠传奇炼丹丹方', action:'recipe', value:1 },
        { key:'power_boost',      label:'内力灌顶', icon:'🔮', desc:'获得大量内力', action:'mp', value:200 },
      ]
    }
  };

  function _repRewardLoad(){
    try { return JSON.parse(localStorage.getItem(REP_REWARD_SAVE) || '{}'); } catch(e){ return {}; }
  }
  function _repRewardSave(data){
    try { localStorage.setItem(REP_REWARD_SAVE, JSON.stringify(data)); } catch(e){}
  }
  function _isRepRewardClaimed(sectId, targetId, rewardKey){
    var data = _repRewardLoad();
    return !!data[sectId + '_' + targetId + '_' + rewardKey];
  }
  function _claimRepRewardInner(sectId, targetId, rewardKey, reward){
    var data = _repRewardLoad();
    var rk = sectId + '_' + targetId + '_' + rewardKey;
    if(data[rk]) return { ok:false, msg:'已经领取过了' };
    data[rk] = true;
    _repRewardSave(data);
    // 实际发放奖励
    var ed = typeof edS !== 'undefined' ? edS : null;
    if(ed && reward.action === 'silver'){
      if(typeof addSilver === 'function') addSilver(reward.value);
      else if(ed.silver !== undefined) ed.silver = (ed.silver||0) + reward.value;
    } else if(ed && reward.action === 'exp'){
      ed.exp = (ed.exp||0) + reward.value;
    } else if(ed && reward.action === 'mp'){
      ed.mp = (ed.mp||0) + reward.value;
    }
    if(typeof saveEditorState === 'function') saveEditorState();
    return { ok:true, msg:reward.icon + ' ' + reward.label + ' 领取成功！' };
  }

  function _renderRepRewards(sect){
    if(!sect.relations) return '';
    var allIds = [];
    if(sect.relations.allies) allIds = allIds.concat(sect.relations.allies);
    if(sect.relations.rivals) allIds = allIds.concat(sect.relations.rivals);
    if(sect.relations.enemies) allIds = allIds.concat(sect.relations.enemies);
    // 去重
    allIds = allIds.filter(function(id,i){ return allIds.indexOf(id)===i; });
    if(!allIds.length) return '';

    var getSectName = function(id){
      var s = SECTS.find(function(x){ return x.id === id; });
      return s ? s.name : id;
    };

    var html = '<div style="margin-top:10px">';
    var hasAny = false;

    // 按好感等级分组显示
    var relLevels = ['sworn','close','friendly'];
    relLevels.forEach(function(levelKey){
      var cfg = REP_REWARDS[levelKey];
      var matchedSects = allIds.filter(function(id){ return swGetRelation(sect.id, id) >= cfg.minRel; });
      if(!matchedSects.length) return;
      hasAny = true;

      html += '<div style="margin-bottom:10px">' +
        '<div style="font-size:11px;color:'+({sworn:'#ff6090',close:'#60d0a0',friendly:'#60d060'}[levelKey])+';margin-bottom:4px;letter-spacing:1px">' +
        cfg.icon + ' ' + cfg.label + '（好感≥' + cfg.minRel + '）</div>';

      matchedSects.forEach(function(targetId){
        var relVal = swGetRelation(sect.id, targetId);
        html += '<div style="background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:6px;padding:6px 8px;margin-bottom:4px">';
        html += '<div style="font-size:11px;color:rgba(220,210,190,.8);margin-bottom:4px">' + getSectName(targetId) + ' <span style="font-size:10px;color:var(--text3)">好感 ' + relVal + '</span></div>';

        cfg.rewards.forEach(function(rw){
          var claimed = _isRepRewardClaimed(sect.id, targetId, rw.key);
          if(claimed){
            html += '<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3);margin-top:2px"><span>' + rw.icon + '</span><span style="opacity:.6">' + rw.label + '</span><span style="margin-left:auto;font-size:9px;color:#60d060">✓ 已领取</span></div>';
          } else {
            html += '<div style="display:flex;align-items:center;gap:4px;font-size:10px;margin-top:2px">' +
              '<span>' + rw.icon + '</span>' +
              '<span style="color:rgba(220,210,190,.9)">' + rw.label + '</span>' +
              '<span style="font-size:9px;color:var(--text3)">' + rw.desc + '</span>' +
              '<button onclick="window._claimRepReward(\'' + sect.id + '\',\'' + targetId + '\',\'' + rw.key + '\')" ' +
                'style="margin-left:auto;padding:2px 8px;border:1px solid #60d06044;background:#60d06015;color:#60d060;border-radius:4px;font-size:10px;cursor:pointer;font-family:inherit">领取</button>' +
              '</div>';
          }
        });

        html += '</div>';
      });

      html += '</div>';
    });

    if(!hasAny) return '';
    html += '</div>';
    return '<div class="sect-info-card"><div class="sect-card-title">🎁 声望奖励</div>' +
      '<div class="sect-card-body"><div style="font-size:10px;color:var(--text3);margin-bottom:6px">提升门派间好感值，解锁跨门派奖励</div>' + html + '</div></div>';
  }

  // 暴露给 onclick
  window._claimRepReward = function(sectId, targetId, rewardKey){
    // 找到对应的 reward 配置
    var reward = null;
    var levels = ['sworn','close','friendly'];
    for(var i=0;i<levels.length;i++){
      var cfg = REP_REWARDS[levels[i]];
      for(var j=0;j<cfg.rewards.length;j++){
        if(cfg.rewards[j].key === rewardKey){ reward = cfg.rewards[j]; break; }
      }
      if(reward) break;
    }
    if(!reward) return;
    var result = _claimRepRewardInner(sectId, targetId, rewardKey, reward);
    if(result.ok && typeof showToast === 'function') showToast(result.msg, 'success');
    // 刷新总览
    if(typeof SECTS !== 'undefined'){
      var sect = SECTS.find(function(s){ return s.id === sectId; });
      if(sect) renderOverview(sect);
    }
  };

  // ── 总览面板 ──
  function renderOverview(sect){
    const grid = qs('#sectOverviewGrid');

    // 门派简介
    const descCard =
      '<div class="sect-info-card">' +
        '<div class="sect-card-title">📜 门派简介</div>' +
        '<div class="sect-card-body">' + sect.desc + '<br><br><i style="color:var(--text3);font-size:11px">「' + sect.motto + '」</i></div>' +
      '</div>';

    // 被动加成
    let bonusHtml = '';
    if(typeof _renderSectPassiveBonus === 'function'){
      bonusHtml = _renderSectPassiveBonus(sect.id, isJoined);
    }
    const bonusCard = bonusHtml ?
      '<div class="sect-info-card">' + bonusHtml + '</div>' : '';

    // 关系网
    let relHtml = '';
    if(typeof renderSectRelations === 'function'){
      relHtml = renderSectRelations(sect);
    }
    const relCard = relHtml ?
      '<div class="sect-info-card"><div class="sect-card-title">🌐 江湖关系</div>' + relHtml + '</div>' : '';

    // ── 声望奖励卡 ──

    if(typeof swGetRelation === 'function' && typeof SECTS !== 'undefined'){
      repRewardCard = _renderRepRewards(sect);
    }

    // 修炼功法系别
    let schoolHtml = '';
    if(sect.schools && typeof SK_SCHOOL_INFO !== 'undefined'){
      schoolHtml = sect.schools.map(function(k){
        const sc = SK_SCHOOL_INFO[k];
        return sc ? '<span style="font-size:11px;color:'+sc.color+';border:1px solid '+sc.color+'44;background:'+sc.color+'0d;padding:2px 8px;border-radius:4px">'+sc.label+'</span>' : '';
      }).filter(Boolean).join(' ');

    const schoolCard = schoolHtml ?
      '<div class="sect-info-card"><div class="sect-card-title">⚡ 修炼体系</div><div class="sect-card-body" style="display:flex;flex-wrap:wrap;gap:6px">' + schoolHtml + '</div></div>' : '';

    // ── 门派综合实力评分 ──

      var powerScore = _calcSectPower(sect);
      var rankAll = SECTS.map(function(s){ return { id:s.id, name:s.name, icon:s.emblem||s.icon, score:_calcSectPower(s), tier:s.tier, align:s.alignment }; })
        .sort(function(a,b){ return b.score - a.score; });
      var myRank = rankAll.findIndex(function(r){ return r.id === sect.id; }) + 1;

      // 门派综合信息条
      var statsHtml = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px">';
      statsHtml += '<div style="background:rgba(255,255,255,.03);padding:6px 8px;border-radius:6px"><span style="font-size:10px;color:var(--text3)">📊 综合实力</span><div style="font-size:18px;font-weight:bold;color:#f0c060;margin-top:2px">' + powerScore + '</div></div>';
      statsHtml += '<div style="background:rgba(255,255,255,.03);padding:6px 8px;border-radius:6px"><span style="font-size:10px;color:var(--text3)">🏆 江湖排名</span><div style="font-size:18px;font-weight:bold;color:' + (myRank<=3?'#ffd700':'#e8d090') + ';margin-top:2px">第' + myRank + '名</div></div>';
      statsHtml += '<div style="background:rgba(255,255,255,.03);padding:6px 8px;border-radius:6px"><span style="font-size:10px;color:var(--text3)">👥 门派弟子</span><div style="font-size:14px;color:#c0d8e8;margin-top:2px">' + (sect.members||0) + '人</div></div>';
      statsHtml += '<div style="background:rgba(255,255,255,.03);padding:6px 8px;border-radius:6px"><span style="font-size:10px;color:var(--text3)">⚖ 阵营</span><div style="font-size:14px;color:' + ({righteous:'#60d060',neutral:'#b0b0b0',chaotic:'#ff8040',evil:'#ff4040'}[sect.alignment]||'#b0b0b0') + ';margin-top:2px">' + ({righteous:'正道',neutral:'中立',chaotic:'混乱',evil:'邪道'}[sect.alignment]||'中立') + '</div></div>';
      statsHtml += '</div>';

      // 实力评分构成
      var breakdown = _calcSectPowerBreakdown(sect);
      var bkHtml = breakdown.map(function(b){
        var pct = powerScore > 0 ? Math.round(b.val / powerScore * 100) : 0;
        return '<div style="display:flex;align-items:center;gap:6px;font-size:10px;margin-top:3px">' +
          '<span style="width:50px;color:var(--text3);text-align:right">' + b.label + '</span>' +
          '<div style="flex:1;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden"><div style="width:'+pct+'%;height:100%;background:'+b.color+';border-radius:2px"></div></div>' +
          '<span style="width:28px;color:'+b.color+';text-align:right">' + b.val + '</span></div>';
      }).join('');

      // 江湖排行 TOP 10
      var topHtml = '<div style="margin-top:10px"><div style="font-size:10px;color:rgba(200,170,100,.5);letter-spacing:1px;margin-bottom:4px">▸ 江湖门派排行</div>';
      var top10 = rankAll.slice(0, 10);
      top10.forEach(function(r, idx){
        var isMe = r.id === sect.id;
        var medal = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : (idx+1);
        var tierTag = {supreme:'⚡',major:'🗡',minor:'🔰'}[r.tier]||'';
        var alignColor = {righteous:'#60d060',neutral:'#b0b0b0',chaotic:'#ff8040',evil:'#ff4040'}[r.align]||'#b0b0b0';
        topHtml += '<div style="display:flex;align-items:center;gap:6px;padding:3px 0;' + (isMe?'background:rgba(240,192,96,.08);border-radius:4px;padding:3px 6px;margin:1px -6px;':'') + '">' +

          '<span style="width:16px;text-align:center;font-size:11px">' + tierTag + '</span>' +
          '<span style="flex:1;font-size:11px;color:' + (isMe?'#f0d090':'rgba(220,210,190,.8)') + ';font-weight:' + (isMe?'bold':'normal') + '">' + r.name + '</span>' +
          '<span style="font-size:11px;color:' + alignColor + ';opacity:.6">' + ({righteous:'正',neutral:'中',chaotic:'乱',evil:'邪'}[r.align]||'') + '</span>' +
          '<span style="width:30px;text-align:right;font-size:11px;color:#f0c060;font-weight:bold">' + r.score + '</span></div>';

      topHtml += '</div>';

      powerCard = '<div class="sect-info-card"><div class="sect-card-title">📊 门派实力</div>' +
        '<div class="sect-card-body">' + statsHtml +
        '<div style="margin-top:8px;padding-top:6px;border-top:1px solid rgba(255,255,255,.06)"><div style="font-size:10px;color:var(--text3);margin-bottom:2px">实力构成</div>' + bkHtml + '</div>' +
        topHtml + '</div></div>';
    }

    grid.innerHTML = descCard + bonusCard + relCard + repRewardCard + schoolCard + powerCard;
  }

  // ── 长老殿（加入/退出/掌门对话）──
  function renderHall(sect){
    const el = qs('#sectHallContent');
    const ed = edS || {};
    const playerLevel = ed.level || 1;
    const playerSect = ed.sect || null;

    if(!isJoined){
      // 未加入 → 显示申请加入界面
      const cfg = (typeof SECT_TRIAL_CFG !== 'undefined') ? SECT_TRIAL_CFG[sect.tier] : null;
      const trialName = cfg ? cfg.name : '试炼';
      const canJoin = playerLevel >= 5;

      // 冷却期检查
      let cooldownHtml = '';
      if(ed.sectLeaveCooldown && ed.sectLeaveCooldown > Date.now()){
        const remaining = Math.ceil((ed.sectLeaveCooldown - Date.now()) / (86400000));
        cooldownHtml = '<div class="sh-locked-msg">⏳ 冷却中：需等待 ' + remaining + ' 天才能重新申请</div>';
      }
      // 已有门派
      let switchHtml = '';
      if(playerSect && playerSect !== sect.id){
        const oldName = (SECTS.find(function(s){return s.id === playerSect}) || {}).name || playerSect;
        switchHtml = '<p style="color:var(--warn);font-size:12px;margin-bottom:10px">⚠ 你当前属于「' + oldName + '」，申请加入将自动脱离旧门派。</p>';
      }

      el.innerHTML =
        '<div class="sh-master-avatar">' + sect.emblem + '</div>' +
        '<div class="sh-master-name" style="color:' + sect.color + '">' + sect.name + '</div>' +
        '<div class="sh-master-title">「' + sect.title + '」</div>' +
        switchHtml + cooldownHtml +
        (canJoin && !cooldownHtml ?
          '<button class="sh-action-btn sh-join-btn" onclick="window._startSectTrial && _startSectTrial(\'' + sect.id + '\')">📜 ' + trialName + ' · 申请加入</button>'
          :
          (!canJoin ? '<div class="sh-locked-msg">🔒 需要 Lv5 才能申请加入门派</div>' : '')
        ) +

  function renderLibrary(sect){
    const listEl = qs('#sectLibraryList');
    const ed = edS || {};

    if(!isJoined){
      listEl.innerHTML = '<div class="sect-library-empty">🔒 加入「<b style="color:'+sect.color+'">' + sect.name + '</b>」后方可查阅藏经阁</div>';
      return;

          manuals.push({id:mid, data:m});

      return;
    }

    const ownedManuals = JSON.parse(localStorage.getItem('wuxia_manuals') || '[]');

    listEl.innerHTML = manuals.map(function(item){
      const m = item.data;
      const owned = ownedManuals.includes(item.id);
      const lvReq = m.reqLv || 1;
      const playerLv = ed.level || 1;
      const locked = playerLv < lvReq;

      const silver = ed.silver || 0;

      return '<div class="sl-manual-item ' + (owned?'sl-manual-owned':'') + (locked?' sl-manual-locked':'') + '" ' +

  // ── 门派任务链 ──
  function renderMissions(sect){
    const el = qs('#sectMissionContent');
    const feats = getSectFeatures(sect);

    // 规模不够 → 显示锁定提示（与 applyTierTabs 保持一致）
    if(!feats.missions){
      return; // 已由 applyTierTabs 填充锁定提示
    }

    const ed = edS || {};

    if(!isJoined){
      el.innerHTML = '<div class="sect-library-empty">📜 加入门派后方可接取门派要务</div>';
      return;
    }

    const chain = (typeof SECT_CHAINS !== 'undefined') ? SECT_CHAINS[sect.id] : null;
    if(!chain || !chain.chain || !chain.chain.length){
      el.innerHTML = '<div class="sect-library-empty">📜 本门暂无要务发布……</div>';
      return;
    }

    // 读取任务进度
    let progress = {};
    if(typeof getSectChainProgress === 'function'){
      progress = getSectChainProgress();
    }

    const chainProgress = progress[sect.id] || {};

    // 头部
    let html =
      '<div class="sc-chain-header">' +
        '<div class="sc-chain-name">' + sect.emblem + ' ' + chain.name + '</div>' +
        '<div class="sc-chain-theme">' + (chain.theme||'') + '</div>' +
      '</div><div class="sc-task-list">';

    // 记录第一个 active 节点之前的都是 done
    let foundActive = false;

    chain.chain.forEach(function(node, idx){
      const nodeState = chainProgress[node.id] || (foundActive ? 'locked' : 'available');
      // 自动推断状态：如果后续节点已有进度则前面已完成
      if(nodeState === 'available' && idx > 0){
        const prevNode = chain.chain[idx-1];
        if(chainProgress[prevNode.id] === 'done'){ /* keep available */ }
        else if(Object.keys(chainProgress).some(function(k){return chain.chain.slice(0,idx).some(function(n){return n.id===k;}) && chainProgress[k]==='done';})){
          foundActive = true;
        }
      }
      if(nodeState === 'done') foundActive = true;

      const statusClass = nodeState === 'done' ? 'done' : (nodeState === 'active' || nodeState === 'available' ? 'active' : 'locked');
      const statusIcon = nodeState === 'done' ? '✅' : (nodeState === 'active' ? '🔶' : (nodeState === 'available' ? '⬜' : '🔒'));
      const canAccept = (nodeState === 'available' || nodeState === 'active');

      html +=
        '<div class="sc-task-node" data-node-id="' + node.id + '">' +
          '<div class="sc-task-status ' + statusClass + '">' + statusIcon + '</div>' +
          '<div class="sc-task-body">' +
            '<div class="sc-task-name">' + node.icon + ' ' + node.name + '</div>' +
            '<div class="sc-task-desc">' + node.desc + '</div>' +
            (node.rewardText ? '<div class="sc-task-reward">🎁 ' + node.rewardText + '</div>' : '') +
          '</div>' +
          (canAccept ?
            '<div class="sc-task-action"><button class="sc-task-btn" onclick="window._acceptSectMission && _acceptSectMission(\'' + sect.id + '\',\'' + node.id + '\')">接取</button></div>'
            : ''
          ) +
        '</div>';
    });

    html += '</div>';
    el.innerHTML = html;
  }

  function renderArena(sect){
    const el = qs('#sectArenaContent');
    const feats = getSectFeatures(sect);
    if(!feats.arena) return; // applyTierTabs 已填充锁定提示

    const ed = edS || {};

      el.innerHTML = '<div class="sb-board-empty">⚔️ 加入「<b style="color:'+sect.color+'">' + sect.name + '</b>」后方可使用演武场</div>';
      return;
    }

    // 读取今日已击败记录
    let defeatedToday = [];
    try{ defeatedToday = JSON.parse(localStorage.getItem('wuxia_arena_defeated_'+sect.id+'_'+_todayStr()) || '[]'); }catch(e){}

    const opponents = SECT_ARENA_OPPONENTS[sect.id] || [];
    if(!opponents.length){
      el.innerHTML = '<div class="sb-board-empty">🏟 本门演武场暂无对手……</div>';
      return;
    }

    // 过滤：根据阶级解锁不同难度
    const playerRank = ed.sectRank || 'disciple';
    const maxUnlockIdx = {disciple:2, elite:3, elder:4, grand:5}[playerRank] || 2;

    let html =
      '<div class="sa-arena-header">' +
        '<span class="sa-arena-title">⚔️ ' + sect.name + ' · 演武场</span>' +

      '</div><div class="sa-opponent-grid">';

    opponents.forEach(function(opp, idx){
      const isDefeated = defeatedToday.includes(opp.id);

      html +=
        '<div class="sa-opponent' + (isLocked?' sa-locked':'') + (isDefeated?' sa-defeated':'') + '" ' +

  // 演武场战斗

  function _checkSectArenaResult(){
    try{
      const raw = sessionStorage.getItem('wuxia_arena_battle_result');
      if(!raw) return;
      const result = JSON.parse(raw);
      sessionStorage.removeItem('wuxia_arena_battle_result');
      sessionStorage.removeItem('wuxia_arena_from_sect');

      if(!result.sectArena) return; // 不是门派演武场，跳过
      const { won, sectId, oppIdx, reward, fled } = result;
      const opponents = SECT_ARENA_OPPONENTS[sectId] || [];
      const opp = opponents[oppIdx] || {};
      const npcName = (typeof SECTS !== 'undefined') ?
        (SECTS.find(s => s.id === sectId) || {}).name + '·' + opp.name : opp.name;

      _showArenaResult(won, sectId, oppIdx, { name: npcName, id: opp.id }, !!fled);
    }catch(e){ console.warn('[sect] _checkSectArenaResult error:', e); }
  }

        drops: [],
        _sectArena: true,
        _sectId: sectId,

      }
    };
    sessionStorage.setItem('wuxia_arena_battle_context', JSON.stringify(arenaContext));

  function _doSimpleArenaFight(sectId, oppIdx, npc){
    const ed = edS || {};
    const playerLevel = ed.level || 1;
    const winRate = Math.max(0.22, Math.min(0.80,
      0.50 + (playerLevel-npc.level)*0.035 + (ed.atk||0)*0.004 - (npc.atk||0)*0.0018
    ));
    const won = Math.random() < winRate;
    _showArenaResult(won, sectId, oppIdx, npc);
  }

  function _showArenaResult(won, sectId, oppIdx, npc, fled){
    const overlay = document.createElement('div');
    overlay.className = 'sa-arena-result active';
    const opponents = SECT_ARENA_OPPONENTS[sectId] || [];
    const opp = opponents[oppIdx] || {};
    var resultText;
    if(won){
      resultText = '你战胜了「' + npc.name + '」！<br>切磋中展现了精湛的' + ((npc.schoolTag||'')+'功夫'||'武功');
    } else if(fled){
      resultText = '你逃离了与「' + npc.name + '」的切磋<br>临阵脱逃，有失侠者风范！';
    } else {
      resultText = '你惜败于「' + npc.name + '」<br>再练些时日，下次一定能赢！';
    }
    overlay.innerHTML =
      '<div class="sa-arena-result-box">' +
        '<div class="sa-result-icon">' + (won ? '🏆' : '💫') + '</div>' +
        '<div class="sa-result-text">' + resultText + '</div>' +
        (won ? '<div class="sa-result-reward">🎁 贡献 +' + (opp.rewardContrib||10) + ' · 银两 +' + (opp.rewardSilver||30) + '</div>' : '') +
        '<button class="sa-result-btn" onclick="this.closest(\'.sa-arena-result\').classList.remove(\'active\');setTimeout(function(){var e=document.querySelector(\'.sa-arena-result\');if(e)e.remove();},300)">确定</button>' +
      '</div>';
    document.body.appendChild(overlay);

    if(won){
      const ed = edS || {};
      ed.sectContrib = (ed.sectContrib||0) + (opp.rewardContrib||10);
      ed.silver = (ed.silver||0) + (opp.rewardSilver||30);
      if(typeof saveGameState==='function') saveGameState();
      try{ localStorage.setItem('wuxia_editor', JSON.stringify(ed)); }catch(e){}

      // 记录今日击败
      let defeatedToday = [];
      try{ defeatedToday = JSON.parse(localStorage.getItem('wuxia_arena_defeated_'+sectId+'_'+_todayStr())||'[]'); }catch(e){}
      if(!defeatedToday.includes(npc.id)){
        defeatedToday.push(npc.id);
        localStorage.setItem('wuxia_arena_defeated_'+sectId+'_'+_todayStr(), JSON.stringify(defeatedToday));
      }
      if(typeof checkSectRankUp==='function') checkSectRankUp(ed);

      // 刷新
      const sect = SECTS.find(function(s){return s.id===sectId;});
      if(sect) renderArena(sect);
    }
  }

  function renderAlchemy(sect){
    const el = qs('#sectAlchemyContent');
    const feats = getSectFeatures(sect);
    if(!feats.alchemy) return;

    const ed = edS || {};
    if(!isJoined){
      el.innerHTML = '<div class="sb-board-empty">🧪 加入门派后方可使用炼丹房</div>';
      return;
    }

    const recipes = SECT_ALCHEMY_RECIPES[sect.id] || [];
    if(!recipes.length){
      el.innerHTML = '<div class="sb-board-empty">🧪 本门炼丹房暂无可用配方……</div>';
      return;
    }

    // 读取背包材料（简化检查）
    var bag = [];
    try{ bag = JSON.parse(localStorage.getItem('wuxia_bag')||'[]'); }catch(e){}

    var hasMaterial = function(itemId){
      if(!itemId) return false;
      var item = bag.find(function(b){return b.id===itemId;});
      return item && item.qty > 0;
    };
    var getMatQty = function(itemId){
      var item = bag.find(function(b){return b.id===itemId;});
      return item ? item.qty : 0;
    };

    const playerLv = ed.level || 1;

    let html =
      '<div class="sc-alchemy-header">' +
        '<span class="sc-alchemy-title">🧪 ' + sect.name + ' · 炼丹房</span>' +
        '<span class="sc-alchemy-balance">炼制等级 Lv' + playerLv + '</span>' +
      '</div><div class="sc-recipe-list">';

    recipes.forEach(function(r){
      const locked = playerLv < (r.reqLv||1);
      // 检查材料是否足够
      let matsHtml = '';
      let allMatsReady = true;
      (r.materials||[]).forEach(function(m){
        const qty = getMatQty(m.id);
        const enough = qty >= m.qty;
        if(!enough) allMatsReady = false;
        matsHtml += '<span class="'+(enough?'has':'miss')+'">'+(m.name||m.id)+'×'+m.qty+(enough?'('+qty+')':'')+'</span> ';
      });

      html +=
        '<div class="sc-recipe-item' + (locked?' sc-locked':'') + (!locked&&allMatsReady?' sc-craftable':'') + (locked||!allMatsReady?' sc-cant-craft':'') + '"' +
        ' data-sect-id="' + sect.id + '"' +
        ' data-recipe-id="' + r.id + '"' +
        ' title="' + (locked?'需要Lv'+r.reqLv:(allMatsReady?'点击炼制':'材料不足')) + '">' +
        '<div class="sc-recipe-icon">' + r.icon + '</div>' +
        '<div class="sc-recipe-info">' +
          '<div class="sc-recipe-name">' + r.name + (locked?' 🔒':'') + '</div>' +
          '<div class="sc-recipe-desc">' + r.desc + '</div>' +
          '<div class="sc-recipe-mats">材料：' + matsHtml + '</div>' +
        '</div>' +
        '<div class="sc-recipe-result"><div class="sc-recipe-exp">+' + r.exp + 'exp</div></div></div>';
    });

    html += '</div>';
    el.innerHTML = html;

    // 事件委托：点击炼制
    qsa('.sc-recipe-item.sc-craftable').forEach(function(item){
      item.addEventListener('click', function(){
        var sid = this.getAttribute('data-sect-id');
        var rid = this.getAttribute('data-recipe-id');
        if(window._onAlchemyCraft) window._onAlchemyCraft(sid, rid);
      });
    });
  }

  window._onAlchemyCraft = function(sectId, recipeId){
    const recipes = SECT_ALCHEMY_RECIPES[sectId] || [];
    const r = recipes.find(function(x){return x.id===recipeId;});
    if(!r) return;
    var bag = [];
    try{ bag = JSON.parse(localStorage.getItem('wuxia_bag')||'[]'); }catch(e){}

    // 扣除材料
    (r.materials||[]).forEach(function(m){
      for(var i=0;i<bag.length;i++){
        if(bag[i].id===m.id){
          bag[i].qty -= m.qty;
          if(bag[i].qty<=0) bag.splice(i,1);
          break;
        }
      }
    });
    try{ localStorage.setItem('wuxia_bag', JSON.stringify(bag)); }catch(e){}

    // 发放产物效果（简化：给银两/经验作为奖励）
    const ed = edS || {};
    // 给经验
    if(typeof addExp === 'function'){
      addExp(r.exp||0);
    }
    showToast('🧪 炼制成功：「' + r.name + '」！+' + (r.exp||0) + ' 经验','ok');
    const sect = SECTS.find(function(s){return s.id===sectId;});
    if(sect) renderAlchemy(sect);
  };

      categories[it.category].push(it);
    });

  window._onTreasuryBuy = function(sectId, itemId){
    const items = SECT_TREASURY[sectId] || [];
    const it = items.find(function(x){return x.id===itemId;});
    if(!it) return;
    const ed = edS || {};
    if((ed.sectContrib||0) < it.cost){
      showToast('贡献不足！需要 '+it.cost,'warn');return;
    }
    // 扣贡献
    ed.sectContrib -= it.cost;
    // 发放奖励
    if(itemId.indexOf('silver')>=0 || itemId.indexOf('box')>=0){
      var silverGain = Math.floor(Math.random()*301)+200;
      ed.silver = (ed.silver||0) + silverGain;
      showToast('📦 获得「'+it.name+'」，开出 '+silverGain+' 银两！','ok');
    } else if(itemId.indexOf('exp')>=0){
      if(typeof addExp === 'function') addExp(100);
      showToast('🧪 使用了「'+it.name+'」，+100经验！','ok');
    } else if(itemId.indexOf('hp')>=0 || itemId.indexOf('mp')>=0){
      showToast('🎁 获得「'+it.name+'」！已放入背包','ok');
    } else {
      showToast('🎁 兌换成功：「'+it.name+'」！','ok');
    }
    if(typeof saveGameState==='function') saveGameState();
    try{ localStorage.setItem('wuxia_editor', JSON.stringify(ed)); }catch(e){}
    const sect = SECTS.find(function(s){return s.id===sectId;});
    if(sect) renderTreasury(sect);
  };
