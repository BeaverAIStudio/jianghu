<title>战斗 - 江湖将将胡</title>

<style>

/* ════════════════════════════════════════════════════

   battle.html - 独立战斗页面

   ════════════════════════════════════════════════════ */

*{margin:0;padding:0;box-sizing:border-box}

html,body{margin:0;padding:0;height:100%;color:#e8d5a3;font-family:'Courier New','微软雅黑',monospace;overflow-x:hidden;user-select:none;}

body{

  background:var(--dark);

  background-image:

    radial-gradient(ellipse at 15% 15%,rgba(28,12,80,.55) 0%,transparent 45%),

    radial-gradient(ellipse at 85% 80%,rgba(50,5,28,.5) 0%,transparent 45%),

    radial-gradient(ellipse at 50% 0%,rgba(12,6,40,.4) 0%,transparent 40%),

    radial-gradient(ellipse at 50% 100%,rgba(8,2,16,.6) 0%,transparent 40%),

    radial-gradient(ellipse at 50% 50%,rgba(5,4,16,1) 0%,rgba(2,1,8,1) 100%);

  min-height:100vh;

}

/* 粒子背景canvas */

#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.55;}

/* 全局扫描线叠层 */

body::before{

  content:'';position:fixed;top:0;left:0;width:100%;height:100%;

  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);

  pointer-events:none;z-index:1;opacity:.4;

}

/* 全局噪点叠层 */

body::after{

  content:'';position:fixed;top:0;left:0;width:100%;height:100%;

  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");

  pointer-events:none;z-index:1;opacity:.15;

}



/* CSS变量 */

:root{

  --gold:#f0c060; --gold2:#e08010; --gold3:#ffe8a0; --dark:#050410;

  --panel:rgba(5,4,16,.97); --border:rgba(240,192,96,.18);

  --glow:rgba(240,192,96,.3); --glow2:rgba(240,192,96,.5);

  --cyan:#40d4ff; --cyan2:#00aadd; --cyan-glow:rgba(64,212,255,.25);

  --red:#ff4455; --red-glow:rgba(255,68,85,.3);

  --purple:#c060ff; --purple-glow:rgba(192,96,255,.25);

}



/* 闪光效果 */

.red-flash{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;background:radial-gradient(ellipse at center,rgba(255,20,20,.5) 0%,transparent 65%);opacity:0;transition:opacity .06s;}

.red-flash.on{opacity:1;}

.green-flash{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;background:radial-gradient(ellipse at center,rgba(20,255,80,.3) 0%,transparent 65%);opacity:0;transition:opacity .06s;}

.green-flash.on{opacity:1;}

.blue-flash{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;background:radial-gradient(ellipse at center,rgba(40,140,255,.4) 0%,transparent 65%);opacity:0;transition:opacity .06s;}

.blue-flash.on{opacity:1;}

.gold-flash{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;background:radial-gradient(ellipse at center,rgba(255,200,0,.5) 0%,transparent 65%);opacity:0;transition:opacity .06s;}
.gold-flash.on{opacity:1;}



/* 技能大字 */

.skill-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .08s;}

.skill-overlay.on{opacity:1;}

.skill-big-text{font-size:48px;font-weight:bold;letter-spacing:12px;text-shadow:0 0 2px rgba(255,255,255,0.5);animation:skillBoom .9s ease forwards;}

@keyframes skillBoom{0%{transform:scale(.15) rotate(-10deg);opacity:0}30%{transform:scale(1.3) rotate(2deg);opacity:1}60%{transform:scale(1) rotate(0);opacity:1}100%{transform:scale(1.1);opacity:0}}



/* 伤害数字 */

.dmg-float{position:absolute;font-weight:bold;pointer-events:none;z-index:60;text-shadow:0 2px 12px rgba(0,0,0,.95);animation:floatUp 1.1s ease forwards;}

@keyframes floatUp{0%{transform:translateY(0) scale(.5);opacity:1}15%{transform:translateY(-12px) scale(1.4);opacity:1}100%{transform:translateY(-75px) scale(.7);opacity:0}}

.dn{color:#ffee44;font-size:19px;text-shadow:0 0 10px #ffaa00!important;}

.dc{color:#ff4422;font-size:28px;font-style:italic;text-shadow:0 0 15px #ff4422!important;}

.ds{color:#ee66ff;font-size:32px;text-shadow:0 0 16px #aa33ee,0 0 30px #8800cc!important;}

.dm{color:rgba(100,90,70,.5);font-size:12px;}

.dh{color:#44ff88;font-size:18px;text-shadow:0 0 10px #00ff66!important;}

.dp{color:#88ff44;font-size:16px;}

.dd{color:#80ffcc;font-size:22px;font-style:italic;text-shadow:0 0 12px #40ffaa,0 0 20px #00cc88!important;letter-spacing:2px;}



/* 火花 */

.spark{position:absolute;font-size:16px;animation:sparkOut .7s ease forwards;pointer-events:none;}

@keyframes sparkOut{0%{transform:translate(0,0) scale(1.3) rotate(0deg);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(.05) rotate(180deg);opacity:0}}



/* 页面抖动 */

@keyframes shake{0%{transform:translate(0,0)}10%{transform:translate(-7px,-5px) rotate(-1.5deg)}20%{transform:translate(7px,5px) rotate(1.5deg)}30%{transform:translate(-5px,4px)}40%{transform:translate(5px,-4px)}60%{transform:translate(-3px,2px)}100%{transform:translate(0,0)}}

@keyframes bigShake{0%{transform:translate(0,0)}8%{transform:translate(-15px,-10px) rotate(-2deg)}16%{transform:translate(15px,10px) rotate(2deg)}24%{transform:translate(-11px,7px)}32%{transform:translate(11px,-7px)}50%{transform:translate(-6px,3px)}100%{transform:translate(0,0)}}

body.shake{animation:shake .35s ease;}

body.big-shake{animation:bigShake .55s ease;}
/* death anim */
@keyframes fallL{0%{transform:rotate(0) translateY(0)}100%{transform:rotate(-85deg) translateY(30px) translateX(-20px)}}
@keyframes fallR{0%{transform:rotate(0) translateY(0)}100%{transform:rotate(85deg) translateY(30px) translateX(20px)}}
.fighter.fall-l{animation:fallL .35s ease-out forwards;transform-origin:top center;}
.fighter.fall-r{animation:fallR .35s ease-out forwards;transform-origin:top center;}
.fighter.downed{opacity:.85;filter:grayscale(.3);transition:filter .5s,opacity .5s;}



/* 胜负弹窗 */

.win-layer{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.93);z-index:200;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(4px);}

.win-layer.on{display:flex;}

.win-box{text-align:center;animation:winPop .7s cubic-bezier(.175,.885,.32,1.275);}

@keyframes winPop{0%{transform:scale(.12) rotate(-18deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}

.win-title{font-size:44px;letter-spacing:14px;text-shadow:0 0 50px currentColor,0 0 100px currentColor;margin-bottom:16px;}

.win-sub{font-size:14px;color:#c0a070;letter-spacing:6px;margin-bottom:10px;}

.win-data{font-size:12px;color:rgba(120,90,40,.6);letter-spacing:3px;margin-bottom:32px;}

.win-btn{

  background:rgba(5,3,10,.95);border:1px solid rgba(80,55,20,.7);color:#b09060;

  padding:14px 32px;border-radius:8px;cursor:pointer;

  font-size:13px;letter-spacing:5px;font-family:inherit;

  transition:all .22s;margin:0 8px;position:relative;overflow:hidden;

}

.win-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(240,192,96,.08),transparent);transition:left .4s;}

.win-btn:hover::before{left:100%;}

.win-btn:hover{border-color:var(--gold);color:var(--gold);box-shadow:0 0 10px var(--glow);}



/* 顶部导航 */

.top-bar{

  display:flex;align-items:center;gap:10px;

  padding:10px 14px;

  background:rgba(20,10,4,.7);

  border-bottom:1px solid rgba(180,100,40,.2);

  position:relative;z-index:10;

}

.back-btn{

  background:rgba(40,20,8,.8);border:1px solid rgba(180,100,40,.3);color:#c08040;

  padding:6px 14px;border-radius:5px;cursor:pointer;font-size:12px;letter-spacing:1px;

  transition:all .2s;

}

.back-btn:hover{background:rgba(80,40,10,.8);color:#e0c060;}

.title{flex:1;text-align:center;font-size:14px;color:#d0a050;letter-spacing:4px;}



/* 战斗页面 */

#pageFight{position:relative;z-index:2;}

.fight-wrap{max-width:920px;margin:0 auto;padding:20px 18px;position:relative;}





.hp-bar{

  height:16px;background:rgba(2,1,6,.98);border-radius:8px;

  border:1px solid rgba(240,192,96,.1);overflow:hidden;position:relative;

  box-shadow:inset 0 2px 6px rgba(0,0,0,.7);

}

.hp-bar::after{

  content:'';position:absolute;top:0;left:0;right:0;height:1px;

  background:rgba(255,255,255,.1);pointer-events:none;

}

@keyframes hpScan{0%{left:-40%}100%{left:110%}}

.hp-inner{

  height:100%;border-radius:8px;transition:width .25s ease;

  position:relative;overflow:hidden;

}

.hp-inner::before{

  content:'';position:absolute;top:0;width:30%;height:100%;

  background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);

  animation:hpScan 2.5s linear infinite;pointer-events:none;

}

.hp-inner::after{

  content:'';position:absolute;top:0;left:0;right:0;height:45%;

  background:rgba(255,255,255,.15);border-radius:8px;

}

.hp-l{background:linear-gradient(90deg,#062a80,#1060c0,#2898e8,#50c0ff);box-shadow:0 0 12px rgba(40,150,255,.35) inset;}

.hp-r{background:linear-gradient(270deg,#880808,#b81818,#e03232,#ff6060);float:right;box-shadow:0 0 12px rgba(220,40,40,.35) inset;}

.hp-num{font-size:10px;color:rgba(120,100,40,.7);margin-top:3px;letter-spacing:.5px;}

.hp-num.r{text-align:right;}

.vs-box{

  min-width:44px;text-align:center;font-size:22px;color:#f0c060;

  text-shadow:0 0 16px #e08010,0 0 30px rgba(240,128,0,.4);

  font-weight:bold;letter-spacing:2px;position:relative;

  animation:vsPulse 2s ease-in-out infinite;

}

@keyframes vsPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}



/* 内力条 */

.mp-bar-wrap{

  position:relative;height:8px;background:rgba(2,1,8,.95);border-radius:4px;

  border:1px solid rgba(80,160,255,.14);overflow:hidden;margin-top:4px;

  box-shadow:inset 0 1px 4px rgba(0,0,0,.6);

}

.mp-bar-wrap::after{

  content:'';position:absolute;top:0;left:0;right:0;height:1px;

  background:rgba(255,255,255,.07);pointer-events:none;

}

.mp-bar-inner{

  height:100%;border-radius:4px;overflow:hidden;position:relative;

  background:linear-gradient(90deg,#0a2870,#1460b0,#2090d8,#40c0ff);

  box-shadow:0 0 8px rgba(60,180,255,.45) inset;

  transition:width .3s ease;

}

.mp-bar-inner::before{

  content:'';position:absolute;top:0;width:35%;height:100%;

  background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);

  animation:hpScan 3s linear infinite;pointer-events:none;

}

.mp-bar-num{

  position:absolute;right:4px;top:50%;transform:translateY(-50%);

  font-size:8px;color:rgba(100,180,255,.65);letter-spacing:.5px;

  font-family:'Courier New',monospace;pointer-events:none;

}

.mp-bar-num.r{left:4px;right:auto;}



/* 迷你属性 */

.fight-stats-mini{display:flex;gap:8px;font-size:9px;color:rgba(180,150,100,.6);margin-top:4px;}





.sti{

  font-size:10px;padding:3px 10px;border-radius:10px;border:1px solid;

  animation:stiBlink 1.2s infinite alternate;letter-spacing:1px;

  box-shadow:0 0 6px currentColor;

}

@keyframes stiBlink{from{opacity:1}to{opacity:.4}}



/* 连击条 */

.combo-bar{

  text-align:center;height:38px;font-size:22px;font-weight:bold;

  color:#ffee44;text-shadow:0 0 20px #ffaa00,0 0 40px #ff8800,0 0 60px rgba(255,136,0,.3);

  letter-spacing:6px;opacity:0;transition:opacity .2s;

}

.combo-bar.on{opacity:1;}

@keyframes cPop{0%{transform:scale(.3) rotate(-8deg);opacity:0}50%{transform:scale(1.4);opacity:1}100%{transform:scale(1);opacity:1}}

.combo-bar.pop{animation:cPop .22s ease forwards;}



/* 战场 */

.arena-wrap{

  position:relative;

  background:linear-gradient(180deg,rgba(2,2,8,.0) 0%,rgba(4,3,10,.8) 100%);

  border-radius:12px;border:1px solid rgba(240,192,96,.06);

  padding:12px 12px 0;overflow:hidden;

}

.arena-wrap::before{

  content:'';position:absolute;top:0;left:0;right:0;height:1px;

  background:linear-gradient(90deg,transparent,rgba(240,192,96,.06),rgba(240,192,96,.12),rgba(240,192,96,.06),transparent);

  pointer-events:none;

}

.arena-bg{

  position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;

  background:

    radial-gradient(ellipse at 20% 90%,rgba(64,112,255,.04) 0%,transparent 40%),

    radial-gradient(ellipse at 80% 90%,rgba(255,64,64,.04) 0%,transparent 40%),

    radial-gradient(ellipse at 50% 80%,rgba(240,160,32,.06) 0%,transparent 55%);

}

.arena-scenery{

  position:absolute;top:0;left:0;right:0;bottom:0;

  pointer-events:none;z-index:0;overflow:hidden;

}

.scenery-mountains{

  position:absolute;bottom:18px;left:0;right:0;

  font-size:9px;font-family:'Courier New',monospace;

  color:rgba(60,40,15,.08);letter-spacing:1px;

  text-align:center;line-height:1.3;white-space:pre;

}

.scenery-clouds{

  position:absolute;top:8px;left:0;right:0;

  font-size:9px;font-family:'Courier New',monospace;

  color:rgba(80,60,20,.06);letter-spacing:4px;

  text-align:center;white-space:pre;

  animation:cloudDrift 8s ease-in-out infinite alternate;

}

@keyframes cloudDrift{0%{transform:translateX(-8px)}100%{transform:translateX(8px)}}

.arena-deco-l,.arena-deco-r{

  position:absolute;top:50%;transform:translateY(-50%);

  font-size:8px;color:rgba(240,192,96,.04);letter-spacing:0;

  line-height:1.4;font-family:'Courier New',monospace;

  pointer-events:none;

}

.arena-deco-l{left:2px;}

.arena-deco-r{right:2px;}



/* 竞技场 */

.arena{display:flex;justify-content:space-between;align-items:flex-end;min-height:230px;position:relative;padding:0 8px;z-index:200;}

.ground{

  text-align:center;color:rgba(60,40,15,.3);font-size:11px;letter-spacing:2px;

  padding:5px 0 8px;

  background:linear-gradient(90deg,transparent,rgba(240,160,32,.05),rgba(240,160,32,.08),rgba(240,160,32,.05),transparent);

  position:relative;

}

.ground::before{

  content:'';position:absolute;top:0;left:0;right:0;height:1px;

  background:linear-gradient(90deg,transparent,rgba(240,160,32,.08),rgba(240,160,32,.2),rgba(240,160,32,.08),transparent);

}



/* 角色样式 */

.fighter{

  font-size:15px;white-space:pre;line-height:1.55;text-align:center;

  font-family:'Courier New',monospace;position:relative;

  width:240px;transition:transform .06s;

  letter-spacing:.06em;

  text-shadow:0 0 16px currentColor,0 0 32px currentColor,0 0 60px currentColor,0 0 5px rgba(255,255,255,.25);

  filter:drop-shadow(0 0 12px currentColor) drop-shadow(0 0 24px currentColor) drop-shadow(0 0 3px rgba(255,255,255,.15));

}

.fighter.flip{transform:scaleX(-1);}

@keyframes hitBlink{0%,100%{filter:none}25%{filter:brightness(10) saturate(0) drop-shadow(0 0 10px white)}60%{filter:brightness(4) saturate(.2)}}

.fighter.hit{animation:hitBlink .28s ease;}



/* 冲刺动画 */

.fighter.kb-l{animation:kbL .3s ease!important;}

.fighter.flip.kb-l{animation:kbLf .3s ease!important;}

.fighter.kb-r{animation:kbR .3s ease!important;}

.fighter.flip.kb-r{animation:kbRf .3s ease!important;}

@keyframes kbL{0%{transform:translateX(0)}45%{transform:translateX(-48px)}100%{transform:translateX(0)}}

@keyframes kbLf{0%{transform:scaleX(-1)}45%{transform:scaleX(-1) translateX(-48px)}100%{transform:scaleX(-1)}}

@keyframes kbR{0%{transform:translateX(0)}45%{transform:translateX(48px)}100%{transform:translateX(0)}}

@keyframes kbRf{0%{transform:scaleX(-1)}45%{transform:scaleX(-1) translateX(48px)}100%{transform:scaleX(-1)}}

/* 冲刺关键帧：角色向右冲入 */

@keyframes rushR{0%{transform:translateX(0) scaleX(1)}35%{transform:translateX(52px) scaleX(1.1)}55%{transform:translateX(54px) scaleX(1.12)}72%{transform:translateX(20px) scaleX(.93)}100%{transform:translateX(0) scaleX(1)}}

/* 冲刺关键帧：角色向左冲入 */

@keyframes rushL{0%{transform:translateX(0) scaleX(1)}35%{transform:translateX(-52px) scaleX(1.1)}55%{transform:translateX(-54px) scaleX(1.12)}72%{transform:translateX(-20px) scaleX(.93)}100%{transform:translateX(0) scaleX(1)}}

/* 冲刺动画作用于wrap容器，与fighter内层的knockback/blink完全隔离 */

#fLwrap.rush-r{animation:rushR .46s cubic-bezier(.15,.85,.35,1);}

#fRwrap.rush-r{animation:rushL .46s cubic-bezier(.15,.85,.35,1);}



/* 倒地动画 */

.fighter.fall-l{animation:fallL .6s ease forwards;}

.fighter.fall-r{animation:fallR .6s ease forwards;}

@keyframes fallL{0%{transform:rotate(0) translateY(0)}100%{transform:rotate(-90deg) translateY(30px);opacity:.3}}

@keyframes fallR{0%{transform:rotate(0) translateY(0)}100%{transform:rotate(-90deg) translateY(30px);opacity:.3}}



/* 护盾 */

.fighter.shielded{animation:shieldPulse 1s infinite;border-radius:4px;}

@keyframes shieldPulse{0%,100%{box-shadow:0 0 0 2px rgba(64,212,255,.3),0 0 16px rgba(64,212,255,.15)}50%{box-shadow:0 0 0 8px rgba(64,212,255,.4),0 0 28px rgba(64,212,255,.25)}}



/* 中毒 */

.fighter.poisoned-anim{animation:poisonShake .3s infinite;}

.fighter.flip.poisoned-anim{animation:none;}

@keyframes poisonShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-2px)}75%{transform:translateX(2px)}}



/* 角色部件动画系统 */

.ft-aura,.ft-head,.ft-body,.ft-arm-l,.ft-arm-r,.ft-legs{transition:transform .15s}



/* ══════════════════════════════════════

   武器悬浮层（从ascii-heroes.html复制）

   ══════════════════════════════════════ */

.wep-float{

  position:relative;

  display:flex;flex-direction:column;align-items:center;gap:3px;

  pointer-events:none;z-index:10;

}

.wep-float-icon{

  width:44px;height:44px;

  border-radius:8px;overflow:hidden;

  display:flex;align-items:center;justify-content:center;

  background:linear-gradient(135deg,rgba(0,0,0,.6),rgba(20,16,40,.75));

  border:1px solid var(--wf-border,rgba(255,208,96,.35));

  box-shadow:0 0 8px var(--wf-glow,rgba(255,208,96,.4)),inset 0 0 6px rgba(0,0,0,.5);

  animation:wepFloat 2.4s ease-in-out infinite;

  --wc-glow:var(--wf-glow,rgba(255,208,96,.6));

}

.wep-float-icon .wep-ascii-art{

  font-size:5.5px;line-height:1.1;padding:1px;letter-spacing:.3px;

}

.wep-float-name{

  font-size:8px;letter-spacing:1px;

  color:var(--wf-color,#ffd060);

  text-shadow:0 0 6px var(--wf-glow);

  background:rgba(3,2,10,.75);

  border:1px solid var(--wf-border,rgba(255,208,96,.2));

  border-radius:6px;padding:1px 5px;

  white-space:nowrap;

}

.wep-float-rarity{

  font-size:7px;letter-spacing:1px;

  color:var(--wf-color,#ffd060);

  opacity:.65;

}

@keyframes wepFloat{

  0%,100%{transform:translateY(0);}

  50%{transform:translateY(-5px);}

}

@keyframes wepFloatIcon{

  0%,100%{transform:translateY(0) scale(1);}

  50%{transform:translateY(-4px) scale(1.08);}

}

.wep-float.legendary .wep-float-icon{

  animation:wepFloatLeg 2s ease-in-out infinite;

}

@keyframes wepFloatLeg{

  0%,100%{transform:translateY(0) scale(1);box-shadow:0 0 6px var(--wf-glow),0 0 12px var(--wf-glow);}

  50%{transform:translateY(-7px) scale(1.08);box-shadow:0 0 10px var(--wf-glow),0 0 20px var(--wf-glow);}

}

.fight-wep-tag{

  font-size:9px;text-align:center;margin-top:3px;

/* ══════════════════════════════════════

   战斗内自定义角色分部件动画

   .fighter.ft-animated 时激活

   ══════════════════════════════════════ */

/* 覆盖父级 white-space:pre，让 div 子结构正常排布 */

.fighter.ft-animated {

  white-space:normal;

  font-size:13px;

  line-height:1;

}

/* 各子部件通用：pre文字 + 零外边距 + 固定行高 */

.ft-animated .ft-head,

.ft-animated .ft-body,

.ft-animated .ft-legs,

.ft-animated .ft-aura {

  display:block;

  white-space:pre;

  line-height:1.25;

  margin:0; padding:0;

  text-align:center;

  text-shadow:0 0 6px currentColor;

}

.ft-animated .ft-head {

  animation:pvHead 3.2s ease-in-out infinite;

  animation-delay:-.5s;

}

.ft-animated .ft-body {

  animation:pvBody 2.8s ease-in-out infinite;

  animation-delay:-.2s;

  text-shadow:0 0 10px currentColor, 0 0 20px currentColor, 0 0 3px rgba(255,255,255,.15);

  letter-spacing:.06em;

  font-weight:bold;

  white-space:pre;

  display:block;

  text-align:center;

}

.ft-animated .ft-legs {

  white-space:pre;

  display:block;

  text-align:center;

}

/* 躯干横排容器 */

.ft-torso-row {

  display:flex;flex-direction:row;align-items:center;justify-content:center;

  margin:0;padding:0;line-height:1.3;

  gap:0;

}

/* 服装叠加层：绝对定位叠在默认体型上，不挤占布局 */

.ft-body-wrap {

  position:relative;display:inline-block;

}

.ft-cos-overlay {

  position:absolute;top:0;left:0;right:0;bottom:0;

  display:flex;align-items:center;justify-content:center;

  pointer-events:none;white-space:pre;font-family:inherit;font-size:inherit;line-height:inherit;

}

.ft-animated .ft-arm-l {

  display:inline-block;

  white-space:pre;

  transform-origin:top right;

  animation:pvArmL 2.2s ease-in-out infinite;

  animation-delay:-.3s;

}

.ft-animated .ft-arm-r {

  display:inline-block;

  white-space:pre;

  transform-origin:top left;

  animation:pvArmR 2.2s ease-in-out infinite;

  animation-delay:-.9s;

}

.ft-animated .ft-legs {

  animation:pvLegs 2.6s ease-in-out infinite;

  animation-delay:-.8s;

}

.ft-animated .ft-aura {

  animation:pvAura 2.4s ease-in-out infinite;

}



/* 待机动画关键帧 */

/* 头部：轻微点头（上下）+ 微转 */

@keyframes pvHead{

  0%  {transform:translateY(0)   rotate(-1deg)}

  30% {transform:translateY(-4px) rotate(0deg)}

  60% {transform:translateY(-2px) rotate(1deg)}

  100%{transform:translateY(0)   rotate(-1deg)}

}

/* 身体：呼吸缩放（+微微上下浮动），适配2行宽躯干 */

@keyframes pvBody{

  0%,100%{transform:scaleY(1)    scaleX(1)    translateY(0)}

  25%    {transform:scaleY(1.01) scaleX(1.005) translateY(-1px)}

  50%    {transform:scaleY(1.02) scaleX(1)    translateY(0)}

  75%    {transform:scaleY(1.01) scaleX(1.005) translateY(-1px)}

}

/* 手臂：左右微摆（像挥袖/持武器） */

@keyframes pvArmL{

  0%  {transform:rotate(12deg)  translateX(-1px)}

  50% {transform:rotate(-8deg)  translateX(-3px)}

  100%{transform:rotate(12deg)  translateX(-1px)}

}

@keyframes pvArmR{

  0%  {transform:rotate(-12deg) translateX(1px)}

  50% {transform:rotate( 8deg)  translateX(3px)}

  100%{transform:rotate(-12deg) translateX(1px)}

}

/* 腿部：上下弹跳 + 微缩 + 重心偏移，适配2行腿部 */

@keyframes pvLegs{

  0%,100%{transform:translateY(0)   scaleX(1)   rotate(0)}

  35%    {transform:translateY(2px) scaleX(1.04) rotate(-1deg)}

  60%    {transform:translateY(1px) scaleX(.98)  rotate(.5deg)}

  80%    {transform:translateY(2px) scaleX(1.03) rotate(-.5deg)}

}

@keyframes pvAura{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}



/* 称号牌动画 */

.ft-titleplate{

  animation:pvTitle 3s ease-in-out infinite;

}

@keyframes pvTitle{0%,100%{opacity:.85}50%{opacity:1}}



/* 普攻动画 */

.fighter.pv-atk  .ft-arm-l { animation:pvAtk_armL .55s ease forwards!important; }

.fighter.pv-atk  .ft-arm-r { animation:pvAtk_armR .55s ease forwards!important; }

.fighter.pv-atk  .ft-body  { animation:pvAtk_body .55s ease forwards!important; }

.fighter.pv-atk  .ft-head  { animation:pvAtk_head .55s ease forwards!important; }

.fighter.pv-atk  .ft-legs  { animation:pvAtk_legs .55s ease forwards!important; }

/* 普攻：左臂向左前冲，右臂向右前冲 */

@keyframes pvAtk_armL{

  0%  {transform:rotate(12deg)  translateX(-1px)}

  20% {transform:rotate(-35deg) translateX(-22px) scaleX(1.3)}

  50% {transform:rotate(-18deg) translateX(-12px)}

  75% {transform:rotate(-5deg)  translateX(-4px)}

  100%{transform:rotate(12deg)  translateX(-1px)}

}

@keyframes pvAtk_armR{

  0%  {transform:rotate(-12deg) translateX(1px)}

  20% {transform:rotate(35deg)  translateX(22px) scaleX(1.3)}

  50% {transform:rotate(18deg)  translateX(12px)}

  75% {transform:rotate(5deg)   translateX(4px)}

  100%{transform:rotate(-12deg) translateX(1px)}

}

/* 普攻：身体前倾，适配4字符宽新躯干 */

@keyframes pvAtk_body{

  0%,100%{transform:scaleY(1) scaleX(1) translateX(0)}

  25%    {transform:scaleY(.96) scaleX(1.05) translateX(3px)}

  55%    {transform:scaleY(1.01) scaleX(.99) translateX(1px)}

}

/* 普攻：头部前冲 */

@keyframes pvAtk_head{

  0%,100%{transform:translateY(0) rotate(-1deg)}

  30%    {transform:translateY(-2px) rotate(6deg) translateX(4px)}

  60%    {transform:translateY(-1px) rotate(2deg)}

}

/* 普攻：腿部蹬地 */

@keyframes pvAtk_legs{

  0%,100%{transform:translateY(0) scaleX(1)}

  20%    {transform:translateY(-6px) scaleX(.9)}

  50%    {transform:translateY(4px) scaleX(1.1)}

  75%    {transform:translateY(1px) scaleX(1.02)}

}



/* 重击动画 */

.fighter.pv-heavy .ft-arm-l { animation:pvHvy_armL .65s ease forwards!important; }

.fighter.pv-heavy .ft-arm-r { animation:pvHvy_armR .65s ease forwards!important; }

.fighter.pv-heavy .ft-body  { animation:pvHvy_body .65s ease forwards!important; }

.fighter.pv-heavy .ft-head  { animation:pvHvy_head .65s ease forwards!important; }

.fighter.pv-heavy .ft-legs  { animation:pvHvy_legs .65s ease forwards!important; }

.fighter.pv-heavy .ft-aura  { animation:pvHvy_aura .65s ease forwards!important; }

/* 重击：左臂大幅后拉再猛冲，右臂同步 */

@keyframes pvHvy_armL{

  0%  {transform:rotate(12deg)  translateX(-1px)}

  15% {transform:rotate(30deg)  translateX(12px)  scaleX(.8)}

  40% {transform:rotate(-45deg) translateX(-32px) scaleX(1.5)}

  65% {transform:rotate(-22deg) translateX(-16px)}

  100%{transform:rotate(12deg)  translateX(-1px)}

}

@keyframes pvHvy_armR{

  0%  {transform:rotate(-12deg) translateX(1px)}

  15% {transform:rotate(-30deg) translateX(-12px) scaleX(.8)}

  40% {transform:rotate(45deg)  translateX(32px)  scaleX(1.5)}

  65% {transform:rotate(22deg)  translateX(16px)}

  100%{transform:rotate(-12deg) translateX(1px)}

}

@keyframes pvHvy_body{

  0%,100%{transform:scaleY(1) scaleX(1) translateX(0)}

  20%    {transform:scaleY(1.1) scaleX(.85) translateX(-3px)}

  45%    {transform:scaleY(.90) scaleX(1.10) translateX(6px)}

  70%    {transform:scaleY(1.03) scaleX(.97) translateX(2px)}

}

@keyframes pvHvy_head{

  0%,100%{transform:translateY(0) rotate(-1deg)}

  25%    {transform:translateY(3px) rotate(-8deg) translateX(-4px)}

  50%    {transform:translateY(-4px) rotate(12deg) translateX(6px)}

  75%    {transform:translateY(-2px) rotate(5deg)}

}

@keyframes pvHvy_legs{

  0%,100%{transform:translateY(0) scaleX(1)}

  15%    {transform:translateY(-10px) scaleX(.85)}

  40%    {transform:translateY(7px) scaleX(1.18)}

  65%    {transform:translateY(2px) scaleX(1.05)}

}

@keyframes pvHvy_aura{

  0%  {transform:translateX(-4px) scale(.95);opacity:.6}

  30% {transform:translateX(0) scale(1.6);opacity:1;filter:drop-shadow(0 0 18px currentColor)}

  60% {transform:translateX(6px) scale(1.2);opacity:.9}

  100%{transform:translateX(-4px) scale(.95);opacity:.6}

}



/* 攻击时发光爆闪（keyframe保留，实际由 fighter 元素本身触发） */

@keyframes pvFlash{0%,100%{opacity:1}40%{opacity:1;filter:brightness(2.5) drop-shadow(0 0 20px currentColor)}70%{filter:brightness(1.5)}}

.fighter.pv-atk  { animation:pvFlash .55s ease !important; }

.fighter.pv-heavy { animation:pvFlash .65s ease !important; }

/* 技能特效动画 */

@keyframes pvSkill_body{0%,100%{transform:scaleY(1) scaleX(1)}30%{transform:scaleY(1.15) scaleX(.88)}55%{transform:scaleY(.92) scaleX(1.1)}}

@keyframes pvSkill_aura{0%{opacity:.5;transform:scale(1)}35%{opacity:1;transform:scale(2.2);filter:drop-shadow(0 0 28px currentColor)}70%{opacity:.8;transform:scale(1.4)}100%{opacity:.5;transform:scale(1)}}

.fighter.pv-skill .ft-body{animation:pvSkill_body .7s ease forwards!important;}

.fighter.pv-skill .ft-aura{animation:pvSkill_aura .7s ease forwards!important;}



/* 平台 */

.fighter-wrap{position:relative;display:inline-block;}

.fighter-platform{

  position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);

  width:60px;height:4px;background:rgba(180,140,80,.3);border-radius:2px;

}

/* 入场动画 */

@keyframes fighterEnterR{0%{opacity:0;transform:translateX(60px) scaleX(-1) scale(.8)}100%{opacity:1;transform:translateX(0) scaleX(-1) scale(1)}}

/* ══════════════════════════════════════

   待机跳舞动画 - 长时间不操作触发

   ══════════════════════════════════════ */

/* 跳舞状态：动态舞步由JavaScript通过style属性设置 */

/* 基础样式确保跳舞时覆盖默认动画 */

#fL.ft-dancing .ft-head,

#fR.ft-dancing .ft-head,

.fighter.ft-dancing .ft-head,

#fL.ft-dancing .ft-body,

#fR.ft-dancing .ft-body,

.fighter.ft-dancing .ft-body,

#fL.ft-dancing .ft-arm-l,

#fR.ft-dancing .ft-arm-l,

.fighter.ft-dancing .ft-arm-l,

#fL.ft-dancing .ft-arm-r,

#fR.ft-dancing .ft-arm-r,

.fighter.ft-dancing .ft-arm-r,

#fL.ft-dancing .ft-legs,

#fR.ft-dancing .ft-legs,

.fighter.ft-dancing .ft-legs,

#fL.ft-dancing .ft-aura,

#fR.ft-dancing .ft-aura,

.fighter.ft-dancing .ft-aura {

  animation-duration: 0.6s !important;

  animation-timing-function: ease-in-out !important;

  animation-iteration-count: infinite !important;

}



/* ══════════════════════════════════════

   舞步1: 迪斯科 (disco) - 原地摇摆

   ══════════════════════════════════════ */

@keyframes dance1Head {

  0%, 100% { transform: translateY(0) rotate(-3deg) scale(1); }

  25% { transform: translateY(-6px) rotate(3deg) scale(1.05); }

  50% { transform: translateY(-2px) rotate(-5deg) scale(1.02); }

  75% { transform: translateY(-8px) rotate(2deg) scale(1.08); }

}

@keyframes dance1Body {

  0%, 100% { transform: scaleY(1) scaleX(1) rotate(0deg); }

  25% { transform: scaleY(1.08) scaleX(0.95) rotate(-2deg); }

  50% { transform: scaleY(0.95) scaleX(1.05) rotate(2deg); }

  75% { transform: scaleY(1.1) scaleX(0.92) rotate(-1deg); }

}

@keyframes dance1ArmL {

  0%, 100% { transform: rotate(20deg) translateX(-2px) translateY(0); }

  25% { transform: rotate(-30deg) translateX(-8px) translateY(-4px); }

  50% { transform: rotate(45deg) translateX(-4px) translateY(2px); }

  75% { transform: rotate(-15deg) translateX(-6px) translateY(-6px); }

}

@keyframes dance1ArmR {

  0%, 100% { transform: rotate(-20deg) translateX(2px) translateY(0); }

  25% { transform: rotate(30deg) translateX(8px) translateY(-4px); }

  50% { transform: rotate(-45deg) translateX(4px) translateY(2px); }

  75% { transform: rotate(15deg) translateX(6px) translateY(-6px); }

}

@keyframes dance1Legs {

  0%, 100% { transform: translateY(0) scaleX(1) rotate(0deg); }

  25% { transform: translateY(-8px) scaleX(0.9) rotate(-3deg); }

  50% { transform: translateY(4px) scaleX(1.1) rotate(3deg); }

  75% { transform: translateY(-6px) scaleX(0.95) rotate(-2deg); }

}

@keyframes dance1Aura {

  0%, 100% { opacity: 0.8; transform: scale(1) rotate(0deg); filter: hue-rotate(0deg); }

  25% { opacity: 1; transform: scale(1.15) rotate(5deg); filter: hue-rotate(30deg); }

  50% { opacity: 0.9; transform: scale(1.08) rotate(-5deg); filter: hue-rotate(-20deg); }

  75% { opacity: 1; transform: scale(1.2) rotate(3deg); filter: hue-rotate(45deg); }

}



/* ══════════════════════════════════════

   舞步2: 街舞 (hiphop) - 左右移动+旋转

   ══════════════════════════════════════ */

@keyframes dance2Head {

  0%, 100% { transform: translateX(0) translateY(0) rotate(0deg); }

  20% { transform: translateX(-15px) translateY(-5px) rotate(-10deg); }

  40% { transform: translateX(15px) translateY(-3px) rotate(10deg); }

  60% { transform: translateX(-10px) translateY(-8px) rotate(-5deg); }

  80% { transform: translateX(10px) translateY(-2px) rotate(5deg); }

}

@keyframes dance2Body {

  0%, 100% { transform: translateX(0) scale(1) rotate(0deg); }

  25% { transform: translateX(-20px) scale(1.05) rotate(-8deg); }

  50% { transform: translateX(20px) scale(0.95) rotate(8deg); }

  75% { transform: translateX(-10px) scale(1.02) rotate(-4deg); }

}

@keyframes dance2ArmL {

  0%, 100% { transform: rotate(0deg) translateX(0); }

  25% { transform: rotate(-60deg) translateX(-25px) translateY(-10px); }

  50% { transform: rotate(30deg) translateX(-5px) translateY(5px); }

  75% { transform: rotate(-45deg) translateX(-15px) translateY(-5px); }

}

@keyframes dance2ArmR {

  0%, 100% { transform: rotate(0deg) translateX(0); }

  25% { transform: rotate(60deg) translateX(25px) translateY(-10px); }

  50% { transform: rotate(-30deg) translateX(5px) translateY(5px); }

  75% { transform: rotate(45deg) translateX(15px) translateY(-5px); }

}

@keyframes dance2Legs {

  0%, 100% { transform: translateX(0) translateY(0); }

  25% { transform: translateX(-15px) translateY(-5px) scaleY(0.9); }

  50% { transform: translateX(15px) translateY(0) scaleY(1.1); }

  75% { transform: translateX(-8px) translateY(-8px) scaleY(0.95); }

}

@keyframes dance2Aura {

  0%, 100% { opacity: 0.7; transform: scale(1) translateX(0); filter: hue-rotate(0deg); }

  25% { opacity: 1; transform: scale(1.2) translateX(-20px); filter: hue-rotate(60deg); }

  50% { opacity: 0.8; transform: scale(1.1) translateX(20px); filter: hue-rotate(-40deg); }

  75% { opacity: 1; transform: scale(1.25) translateX(-10px); filter: hue-rotate(90deg); }

}



/* ══════════════════════════════════════

   舞步3: 太极 (taiji) - 缓慢圆周运动

   ══════════════════════════════════════ */

@keyframes dance3Head {

  0%, 100% { transform: translate(0, 0) rotate(0deg); }

  25% { transform: translate(8px, -5px) rotate(5deg); }

  50% { transform: translate(0, -10px) rotate(0deg); }

  75% { transform: translate(-8px, -5px) rotate(-5deg); }

}

@keyframes dance3Body {

  0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }

  33% { transform: translate(12px, -8px) scale(1.03) rotate(3deg); }

  66% { transform: translate(-12px, -8px) scale(1.03) rotate(-3deg); }

}

@keyframes dance3ArmL {

  0%, 100% { transform: rotate(10deg) translateX(0) translateY(0); }

  33% { transform: rotate(-20deg) translateX(15px) translateY(-15px); }

  66% { transform: rotate(40deg) translateX(-10px) translateY(-10px); }

}

@keyframes dance3ArmR {

  0%, 100% { transform: rotate(-10deg) translateX(0) translateY(0); }

  33% { transform: rotate(20deg) translateX(-15px) translateY(-15px); }

  66% { transform: rotate(-40deg) translateX(10px) translateY(-10px); }

}

@keyframes dance3Legs {

  0%, 100% { transform: translate(0, 0) scale(1); }

  50% { transform: translate(0, -12px) scale(1.05); }

}

@keyframes dance3Aura {

  0%, 100% { opacity: 0.9; transform: scale(1) rotate(0deg); filter: hue-rotate(0deg) blur(0px); }

  50% { opacity: 1; transform: scale(1.3) rotate(180deg); filter: hue-rotate(180deg) blur(2px); }

}



/* ══════════════════════════════════════

   舞步4: 机械舞 (robot) - 顿挫定格

   ══════════════════════════════════════ */

@keyframes dance4Head {

  0%, 10%, 20%, 100% { transform: translateY(0) rotate(0deg); }

  5% { transform: translateY(-10px) rotate(-15deg); }

  15% { transform: translateY(-5px) rotate(15deg); }

}

@keyframes dance4Body {

  0%, 20%, 40%, 60%, 80%, 100% { transform: scale(1) rotate(0deg); }

  10% { transform: scale(1.1) rotate(-5deg); }

  30% { transform: scale(0.95) rotate(5deg); }

  50% { transform: scale(1.05) rotate(-3deg); }

  70% { transform: scale(0.98) rotate(3deg); }

}

@keyframes dance4ArmL {

  0%, 15%, 35%, 55%, 100% { transform: rotate(0deg) translateX(0); }

  7% { transform: rotate(-70deg) translateX(-20px); }

  25% { transform: rotate(20deg) translateX(-5px); }

  45% { transform: rotate(-45deg) translateX(-15px); }

}

@keyframes dance4ArmR {

  0%, 15%, 35%, 55%, 100% { transform: rotate(0deg) translateX(0); }

  7% { transform: rotate(70deg) translateX(20px); }

  25% { transform: rotate(-20deg) translateX(5px); }

  45% { transform: rotate(45deg) translateX(15px); }

}

@keyframes dance4Legs {

  0%, 20%, 50%, 100% { transform: translateY(0) scaleY(1); }

  10% { transform: translateY(-15px) scaleY(0.8); }

  35% { transform: translateY(-8px) scaleY(1.1); }

  70% { transform: translateY(-5px) scaleY(0.95); }

}

@keyframes dance4Aura {

  0%, 25%, 50%, 75%, 100% { opacity: 0.6; transform: scale(1); filter: hue-rotate(0deg); }

  12%, 37%, 62%, 87% { opacity: 1; transform: scale(1.3); filter: hue-rotate(90deg); }

}



/* ══════════════════════════════════════

   舞步5: 弹跳 (bounce) - 上下蹦跳

   ══════════════════════════════════════ */

@keyframes dance5Head {

  0%, 100% { transform: translateY(0) scale(1); }

  25% { transform: translateY(-20px) scale(1.1); }

  50% { transform: translateY(5px) scale(0.95); }

  75% { transform: translateY(-15px) scale(1.05); }

}

@keyframes dance5Body {

  0%, 100% { transform: translateY(0) scale(1); }

  25% { transform: translateY(-25px) scale(1.05); }

  50% { transform: translateY(10px) scale(0.9); }

  75% { transform: translateY(-20px) scale(1.02); }

}

@keyframes dance5ArmL {

  0%, 100% { transform: rotate(0deg) translateY(0); }

  25% { transform: rotate(-50deg) translateY(-20px); }

  50% { transform: rotate(10deg) translateY(5px); }

  75% { transform: rotate(-30deg) translateY(-15px); }

}

@keyframes dance5ArmR {

  0%, 100% { transform: rotate(0deg) translateY(0); }

  25% { transform: rotate(50deg) translateY(-20px); }

  50% { transform: rotate(-10deg) translateY(5px); }

  75% { transform: rotate(30deg) translateY(-15px); }

}

@keyframes dance5Legs {

  0%, 100% { transform: translateY(0) scaleY(1); }

  25% { transform: translateY(-10px) scaleY(0.7); }

  50% { transform: translateY(15px) scaleY(1.2); }

  75% { transform: translateY(-5px) scaleY(0.85); }

}

@keyframes dance5Aura {

  0%, 100% { opacity: 0.8; transform: scale(1) translateY(0); }

  25% { opacity: 1; transform: scale(1.4) translateY(-30px); }

  50% { opacity: 0.7; transform: scale(0.9) translateY(10px); }

  75% { opacity: 1; transform: scale(1.2) translateY(-20px); }

}



/* ══════════════════════════════════════

   舞步6: 摇摆 (swing) - 左右大幅度摇摆

   ══════════════════════════════════════ */

@keyframes dance6Head {

  0%, 100% { transform: translateX(0) rotate(0deg); }

  25% { transform: translateX(-20px) rotate(-20deg); }

  75% { transform: translateX(20px) rotate(20deg); }

}

@keyframes dance6Body {

  0%, 100% { transform: translateX(0) rotate(0deg) scale(1); }

  25% { transform: translateX(-30px) rotate(-15deg) scale(1.05); }

  75% { transform: translateX(30px) rotate(15deg) scale(1.05); }

}

@keyframes dance6ArmL {

  0%, 100% { transform: rotate(0deg) translateX(0); }

  25% { transform: rotate(-80deg) translateX(-30px); }

  75% { transform: rotate(60deg) translateX(10px); }

}

@keyframes dance6ArmR {

  0%, 100% { transform: rotate(0deg) translateX(0); }

  25% { transform: rotate(-60deg) translateX(-10px); }

  75% { transform: rotate(80deg) translateX(30px); }

}

@keyframes dance6Legs {

  0%, 100% { transform: translateX(0); }

  25% { transform: translateX(-20px) rotate(-10deg); }

  75% { transform: translateX(20px) rotate(10deg); }

}

@keyframes dance6Aura {

  0%, 100% { opacity: 0.8; transform: scale(1) translateX(0); filter: hue-rotate(0deg); }

  25% { opacity: 1; transform: scale(1.3) translateX(-40px); filter: hue-rotate(-60deg); }

  75% { opacity: 1; transform: scale(1.3) translateX(40px); filter: hue-rotate(60deg); }

}



/* 跳舞时的音符特效 */

.ft-dance-note {

  position: absolute;

  font-size: 14px;

  pointer-events: none;

  animation: danceNoteFloat 1.2s ease-out forwards;

  z-index: 100;

}

@keyframes danceNoteFloat {

  0% { opacity: 1; transform: translateY(0) scale(0.5) rotate(0deg); }

  50% { opacity: 0.8; transform: translateY(-30px) scale(1) rotate(180deg); }

  100% { opacity: 0; transform: translateY(-60px) scale(0.8) rotate(360deg); }

}



/* 跳舞提示文字 */

.ft-dance-hint {

  position: absolute;

  bottom: -25px;

  left: 50%;

  transform: translateX(-50%);

  font-size: 10px;

  color: #ff69b4;

  text-shadow: 0 0 8px #ff69b4, 0 0 4px #fff;

  white-space: nowrap;

  opacity: 0;

  animation: danceHintPop 0.5s ease forwards;

  pointer-events: none;

}

@keyframes danceHintPop {

  0% { opacity: 0; transform: translateX(-50%) scale(0.5) translateY(10px); }

  50% { opacity: 1; transform: translateX(-50%) scale(1.1) translateY(-2px); }

  100% { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }

}

  display:flex;gap:14px;justify-content:center;

    conic-gradient(rgba(255,120,60,.5) var(--ppct,0deg), transparent var(--ppct,0deg));
  pointer-events:none;
  display:none;
  filter:drop-shadow(0 0 4px rgba(255,120,60,.4));
}

  position:absolute;top:0;left:0;width:100%;height:100%;

  font-size:14px;font-weight:900;color:#ff9060;
  box-shadow:inset 0 0 10px rgba(255,80,40,.3);
}

@keyframes pet-skill-ready{

}

.btn:hover::before{left:100%;}

/* ═══════════════════════════════════════════════════════════════
   ✦ 战法手牌系统样式
═══════════════════════════════════════════════════════════════ */

/* 手牌区域 — 底部悬浮毛玻璃浮层 */
.card-hand-wrap{
  display:none;
  position:fixed; left:50%; transform:translateX(-50%);
  bottom:12px; z-index:1000;
  width:min(96vw, 540px);
  padding:10px 14px 12px;
  background:linear-gradient(135deg,rgba(15,10,28,.92),rgba(25,18,45,.92));
  border:1px solid rgba(255,200,80,.25);
  border-radius:14px;
  box-shadow:0 4px 30px rgba(0,0,0,.7), 0 0 60px rgba(120,80,20,.12);
  backdrop-filter:blur(6px);
  transition:opacity .3s, transform .3s;
}
.card-hand-wrap.active{
  display:block; animation:cardWrapSlideUp .35s ease;
}
/* 出牌后隐藏 */
.card-hand-wrap.card-hand-hidden{
  opacity:0; pointer-events:none;
  transform:translateX(-50%) translateY(20px);
}
@keyframes cardWrapSlideUp{
  from{opacity:0;transform:translateX(-50%) translateY(30px);}
  to{opacity:1;transform:translateX(-50%) translateY(0);}
}

/* 手牌头部 */
.card-hand-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:8px;
  font-size:11px;
  color:rgba(255,200,80,.7);
  letter-spacing:1px;
}

.card-hand-title{
  display:flex;
  align-items:center;
  gap:6px;
}

.card-hand-title .hu-icon{
  font-size:16px;
  filter:drop-shadow(0 0 4px rgba(255,200,80,.6));
}

.card-count{
  color:#ffd700;
  font-weight:bold;
}

.card-hand-actions{
  display:flex;
  gap:6px;
}

/* 操作按钮 */
.card-action-btn{
  padding:4px 8px;
  font-size:9px;
  color:rgba(255,220,150,.8);
  background:rgba(40,30,20,.7);
  border:1px solid rgba(255,180,60,.3);
  border-radius:6px;
  cursor:pointer;
  transition:all .2s;
  letter-spacing:1px;
}

.card-action-btn:hover{
  background:rgba(60,45,30,.9);
  border-color:rgba(255,200,80,.5);
  color:#ffd700;
}

.card-action-btn:active{
  transform:scale(.95);
}

.card-action-btn.disabled{
  opacity:.4;
  cursor:not-allowed;
}

/* 手牌列表 */
.card-hand-list{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  justify-content:center;
}

/* 单张手牌 */
.card-item{
  position:relative;
  width:80px;
  cursor:pointer;
  transition:all .2s;
  animation:cardFadeIn .3s ease;
}

@keyframes cardFadeIn{
  from{opacity:0;transform:translateY(10px) scale(.9);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

.card-item:hover:not(.sealed){
  transform:translateY(-4px);
}

/* 流光边框：多层 box-shadow 由内向外扩散，产生流光感 */
.card-item.selected .card-face{
  background:linear-gradient(145deg,rgba(15,10,25,.98),rgba(25,18,40,.98));
  border-color:#ffd700;
  animation:cardFlowGlow 1s ease-in-out infinite;
}

@keyframes cardFlowGlow{
  0%{
    box-shadow:
      0 0 4px  #ffd700,
      0 0 8px  #ffd700,
      0 0 16px rgba(255,215,0,.8),
      0 0 32px rgba(255,180,0,.5),
      inset 0 0 6px rgba(255,215,0,.2);
  }
  40%{
    box-shadow:
      0 0 6px  #fff8a0,
      0 0 14px #ffd700,
      0 0 28px rgba(255,248,160,.9),
      0 0 48px rgba(255,200,0,.6),
      inset 0 0 10px rgba(255,248,160,.3);
  }
  70%{
    box-shadow:
      0 0 4px  #ffd700,
      0 0 8px  #ffd700,
      0 0 16px rgba(255,215,0,.8),
      0 0 32px rgba(255,180,0,.5),
      inset 0 0 6px rgba(255,215,0,.2);
  }
  100%{
    box-shadow:
      0 0 4px  #ffd700,
      0 0 8px  #ffd700,
      0 0 16px rgba(255,215,0,.8),
      0 0 32px rgba(255,180,0,.5),
      inset 0 0 6px rgba(255,215,0,.2);
  }
}

.card-item.sealed{
  cursor:not-allowed;
  opacity:.45;
}

.card-item.sealed::after{
  content:'🔒';
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:20px;
  filter:drop-shadow(0 0 4px rgba(255,80,80,.8));
}

/* 卡牌面 */
.card-face{
  width:80px;
  height:112px;
  background:linear-gradient(145deg,rgba(15,10,25,.95),rgba(25,18,40,.95));
  border:2px solid;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:5px 4px;
  position:relative;
  overflow:hidden;
  box-shadow:0 4px 16px rgba(0,0,0,.6);
}

.card-face::before{
  content:'';
  position:absolute;
  top:0;left:-100%;
  width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);
  transition:left .5s;
}

.card-item:hover:not(.sealed) .card-face::before{
  left:100%;
}

/* 稀有度特效 */
.card-face.effect-glow{
  animation:cardGlow 1.5s ease-in-out infinite alternate;
}

@keyframes cardGlow{
  from{box-shadow:0 0 8px rgba(46,204,113,.4);}
  to{box-shadow:0 0 16px rgba(46,204,113,.7);}
}

.card-face.effect-shimmer{
  animation:cardShimmer 2s linear infinite;
}

@keyframes cardShimmer{
  0%{filter:hue-rotate(0deg);}
  50%{filter:hue-rotate(30deg);}
  100%{filter:hue-rotate(0deg);}
}

.card-face.effect-legend{
  animation:none;
  box-shadow:0 0 8px rgba(230,126,34,.35);
}

/* 牌面元素 */
.card-icon{
  font-size:28px;
  margin-top:6px;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,.6));
}

.card-name{
  font-size:11px;
  color:#ffd700;
  margin-top:4px;
  text-align:center;
  letter-spacing:.5px;
  line-height:1.2;
  max-width:74px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.card-divider{
  width:80%;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,200,80,.3),transparent);
  margin:4px 0;
}

.card-school{
  font-size:9px;
  padding:2px 6px;
  border-radius:4px;
  letter-spacing:.5px;
  color:#fff;
  text-shadow:0 1px 2px rgba(0,0,0,.8);
}

.card-mp{
  font-size:10px;
  color:rgba(150,220,255,.9);
  margin-top:4px;
}

.card-rarity{
  position:absolute;
  bottom:3px;
  right:4px;
  font-size:11px;
  opacity:.8;
}

/* 运势爆发提示 */
.card-luck-boost{
  display:none;
  padding:3px 10px;
  font-size:9px;
  color:#ffd700;
  background:linear-gradient(135deg,rgba(255,200,0,.2),rgba(255,140,0,.1));
  border:1px solid rgba(255,200,0,.6);
  border-radius:20px;
  margin-bottom:6px;
  text-align:center;
  letter-spacing:1px;
  text-shadow:0 0 8px rgba(255,200,0,.8);
  box-shadow:0 0 12px rgba(255,200,0,.3),0 0 24px rgba(255,140,0,.15);
  animation:luckBoostPulse .6s ease-in-out infinite;
}
.card-luck-boost.active{display:block;}

@keyframes luckBoostPulse{
  0%,100%{transform:scale(1);box-shadow:0 0 12px rgba(255,200,0,.3),0 0 24px rgba(255,140,0,.15);}
  50%{transform:scale(1.03);box-shadow:0 0 20px rgba(255,200,0,.5),0 0 40px rgba(255,140,0,.25);}
}

@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}

/* 提示信息 */
.card-hint{
  margin-top:6px;
  padding:4px 8px;
  font-size:9px;
  color:rgba(255,220,150,.7);
  background:rgba(40,30,20,.5);
  border-radius:6px;
  line-height:1.4;
  text-align:center;
}

.card-hint:empty{display:none;}

/* 将将胡宣告动画 */
.hu-announce-overlay{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.4);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  opacity:0;
  pointer-events:none;
  transition:opacity .3s;
}

.hu-announce-overlay.active{
  opacity:1;
  pointer-events:auto;
}

.hu-announce-text{
  font-size:36px;
  color:#ffd700;
  text-shadow:0 0 20px rgba(255,215,0,.8),0 0 40px rgba(255,180,0,.5),0 0 60px rgba(255,150,0,.3);
  letter-spacing:8px;
  animation:huFlash .8s ease-in-out;
}

@keyframes huFlash{
  0%{transform:scale(.5);opacity:0;}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);opacity:1;}
}

/* 将将胡横幅 */
.hu-combo-banner{
  position:fixed;
  top:40%;
  left:50%;
  transform:translateX(-50%);
  padding:10px 30px;
  font-size:20px;
  color:#ffd700;
  background:linear-gradient(135deg,rgba(40,30,10,.95),rgba(60,45,15,.95));
  border:2px solid #ffd700;
  border-radius:12px;
  box-shadow:0 0 30px rgba(255,215,0,.5);
  z-index:9998;
  opacity:0;
  pointer-events:none;
  white-space:nowrap;
  letter-spacing:4px;
  animation:huBanner 2s ease forwards;
}

@keyframes huBanner{
  0%{opacity:0;transform:translateX(-50%) scale(.8);}
  20%{opacity:1;transform:translateX(-50%) scale(1.05);}
  30%{transform:translateX(-50%) scale(1);}
  70%{opacity:1;}
  100%{opacity:0;transform:translateX(-50%) translateY(-20px);}
}

/* 牌型提示高亮 */
.card-hint .hint-lianhuan{color:#ffd700;font-weight:bold;}
.card-hint .hint-ning{color:#9b59b6;font-weight:bold;}
.card-hint .hint-shi{color:#3498db;font-weight:bold;}
.card-hint .hint-duizi{color:#2ecc71;font-weight:bold;}

/* 手机端适配（移动端也保持大卡牌，横向滚动可看全） */
@media(max-width:768px){
  /* 手牌区域 - 底部固定，兼容刘海屏 */
  .card-hand-wrap{
    width:min(98vw, 100%);
    padding:8px 10px 10px;
    padding-bottom:calc(10px + env(safe-area-inset-bottom, 0px));
    bottom:0;
    left:0;
    transform:none;
    border-radius:16px 16px 0 0;
    border-bottom:1px solid rgba(255,200,80,.2);
    z-index:1000;
  }
  .card-hand-wrap.active{
    display:block;
    animation:cardWrapSlideUp .35s ease;
  }
  /* 出牌后隐藏 */
  .card-hand-wrap.card-hand-hidden{
    opacity:0;
    pointer-events:none;
    transform:translateY(20px);
  }
  @keyframes cardWrapSlideUp{
    from{opacity:0;transform:translateY(30px);}
    to{opacity:1;transform:translateY(0);}
  }

  /* 手牌列表 - 横向滚动，卡牌大也能一屏滑看 */
  .card-hand-list{
    gap:8px;
    flex-wrap:nowrap;
    overflow-x:auto;
    justify-content:flex-start;
    padding-bottom:4px;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .card-hand-list::-webkit-scrollbar{display:none;}

  /* 单张手牌 - 加大！96×134px 手机上看得清 */
  .card-item{
    width:96px;
    min-width:96px;
    flex-shrink:0;
  }

  /* 卡牌面 */
  .card-face{
    width:96px;
    height:134px;
    padding:6px 5px;
    border-radius:11px;
  }

  /* 牌面元素 - 字号加大 */
  .card-icon{font-size:34px;}
  .card-name{font-size:12px;max-width:82px;letter-spacing:0;font-weight:bold;}
  .card-school{font-size:10px;}
  .card-mp{font-size:11px;font-weight:bold;}
  .card-rarity{font-size:11px;}
  .card-suit{font-size:16px;top:3px;right:4px;}

  /* 头部信息 */
  .card-hand-header{font-size:11px;margin-bottom:6px;}
  .card-hand-title .hu-icon{font-size:16px;}
  .card-count{font-size:11px;}

  /* 操作按钮 */
  .card-action-btn{
    padding:6px 10px;
    font-size:10px;
    min-height:36px;
    min-width:44px;
    border-radius:6px;
  }

  /* 预览区 */
  .card-play-preview{
    padding:6px 8px;
    min-height:40px;
  }
  .preview-count{font-size:10px;}
  .preview-mp{font-size:9px;}
  .preview-combo{font-size:9px;padding:2px 6px;}

  /* 组合提示按钮 */
  .card-combo-hint{font-size:8px;padding:2px 5px;}

  /* 确认/取消/休息按钮 - 增大触摸区域 */
  .card-confirm-btn{
    padding:10px 16px;
    font-size:13px;
    min-height:44px;
    border-radius:10px;
  }
  .card-cancel-btn,.card-rest-btn{
    padding:10px 14px;
    font-size:11px;
    min-height:44px;
    border-radius:10px;
  }

  .card-play-btns{
    gap:6px;
    margin-top:6px;
  }

  /* 组合提示悬浮框 - 上移不被大卡牌遮挡 */
  .card-combo-tip{
    bottom:155px;
    font-size:11px;
    padding:8px 14px;
    max-width:280px;
    min-width:160px;
  }

  .card-hint{font-size:11px;}
  .card-luck-boost{font-size:11px;padding:3px 6px;}

  /* 战场 arena - 压缩给手牌腾空间 */
  .arena-wrap{
    padding:6px 6px 0;
    border-radius:8px;
  }
  .arena{
    min-height:160px;
    padding:0 2px;
  }
  .fighter{
    font-size:12px;
    width:140px;
  }
  .ground{
    font-size:8px;
    padding:2px 0 4px;
  }
  .vs-box{font-size:16px;min-width:32px;}

  /* HP/MP 条 */
  .hp-bar{height:13px;}
  .hp-num{font-size:9px;}
  .mp-bar-wrap{height:6px;margin-top:3px;}
  .mp-bar-num{font-size:7px;}

  .combo-bar{font-size:18px;height:30px;letter-spacing:4px;}

  /* 武器悬浮层 */
  .wep-float-icon{width:36px;height:36px;}
  .wep-float-icon .wep-ascii-art{font-size:4.5px;}
  .wep-float-name{font-size:7px;padding:1px 4px;}
  .wep-float-rarity{font-size:6px;}

  /* 顶部栏 */
  .top-bar{padding:8px 10px;}
  .back-btn{padding:5px 10px;font-size:11px;}
  .title{font-size:12px;letter-spacing:3px;}

  .fight-wrap{
    max-width:100%;
    padding:10px 8px;
  }

  #pageFight{
    max-height:calc(100dvh - 60px);
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }

  .enemy-card-reveal{width:60px;height:76px;}
  .enemy-card-reveal .ecr-icon{font-size:22px;}
  .enemy-card-reveal .ecr-name{font-size:9px;}
  .enemy-card-reveal .ecr-school{font-size:7px;}

  .hu-combo-name{font-size:30px;letter-spacing:2px;}
  .hu-combo-desc{font-size:12px;}
  .hu-combo-card{font-size:22px;padding:4px 8px;}
  .hu-combo-cards{gap:8px;}
}

/* 极小屏幕 (<380px) 才微缩 */
@media(max-width:380px){
  .card-item{width:88px;min-width:88px;}
  .card-face{width:88px;height:123px;}
  .card-icon{font-size:30px;}
  .card-name{max-width:74px;font-size:11px;}
  .card-school{font-size:9px;}
  .card-mp{font-size:10px;}
  .card-rarity{font-size:10px;}
  .card-suit{font-size:15px;}

  .fighter{font-size:11px;width:130px;}
  .arena{min-height:150px;}

  .card-confirm-btn{font-size:13px;padding:10px 16px;}
  .card-cancel-btn,.card-rest-btn{font-size:11px;padding:10px 14px;}

  .card-combo-tip{bottom:140px;font-size:10px;}
}

/* ── 将将胡：选牌组合检测提示（实时悬浮提示）────────────── */
.card-combo-tip{
  position:fixed;
  bottom:160px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(15,10,30,.92);
  border:1px solid rgba(255,220,80,.4);
  border-radius:10px;
  padding:8px 14px;
  font-size:11px;
  color:#ffd700;
  text-align:center;
  z-index:200;
  pointer-events:none;
  animation:comboTipIn .3s ease;
  box-shadow:0 4px 20px rgba(255,180,40,.2);
  max-width:280px;
  min-width:180px;
}
@keyframes comboTipIn{
  from{opacity:0;transform:translateX(-50%) translateY(10px);}
  to{opacity:1;transform:translateX(-50%) translateY(0);}
}
.card-combo-tip.tip-hu{border-color:#ffd700;background:rgba(255,200,0,.15);}
.card-combo-tip.tip-kezi{border-color:#e74c3c;background:rgba(231,76,60,.15);}
.card-combo-tip.tip-shunzi{border-color:#3498db;background:rgba(52,152,219,.15);}
.card-combo-tip.tip-duizi{border-color:#9b59b6;background:rgba(155,89,182,.15);}
.card-combo-tip.tip-scatter{border-color:#7f8c8d;background:rgba(127,140,141,.1);}
.card-combo-tip.tip-normal{border-color:#888;background:rgba(30,30,30,.8);}

/* ── 敌人出牌揭示动画 ────────────────────────────────── */
.enemy-card-reveal{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  width:80px;height:100px;
  background:linear-gradient(135deg,rgba(20,10,30,.95),rgba(40,20,60,.95));
  border:2px solid rgba(200,100,60,.6);
  border-radius:10px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;
  z-index:100;
  pointer-events:none;
  box-shadow:0 0 20px rgba(200,80,40,.5),0 0 40px rgba(200,80,40,.2);
  opacity:0;
}
.enemy-card-reveal.show{
  animation:enemyCardReveal .8s ease-out forwards;
}
@keyframes enemyCardReveal{
  0%{transform:translate(-50%,-50%) scale(0) rotate(-15deg);opacity:0;}
  30%{transform:translate(-50%,-50%) scale(1.15) rotate(5deg);opacity:1;}
  50%{transform:translate(-50%,-50%) scale(1) rotate(0deg);opacity:1;}
  80%{transform:translate(-50%,-50%) scale(1) rotate(0deg);opacity:1;}
  100%{transform:translate(-50%,-50%) scale(.8) rotate(5deg);opacity:0;}
}
.enemy-card-reveal .ecr-icon{font-size:28px;}
.enemy-card-reveal .ecr-name{font-size:10px;color:#e8d090;letter-spacing:1px;text-align:center;}
.enemy-card-reveal .ecr-school{font-size:8px;color:#c08060;letter-spacing:1px;}

/* ── 将将胡：预览区升级（组合预览卡槽）─────────────────── */
.card-play-preview{
  margin-top:6px;
  padding:8px 10px;
  background:rgba(10,8,20,.7);
  border:1px solid rgba(255,180,60,.15);
  border-radius:8px;
  min-height:48px;
  transition:all .3s;
}
.preview-empty{
  font-size:10px;
  color:rgba(255,200,120,.4);
  text-align:center;
  letter-spacing:2px;
}
.preview-info{padding:4px 0;}
.preview-info.preview-ready{
  border-left:3px solid #ffd700;
  padding-left:8px;
  animation:previewPulse .6s ease;
}
@keyframes previewPulse{
  0%{box-shadow:0 0 0 rgba(255,220,80,.8);}
  50%{box-shadow:0 0 12px rgba(255,220,80,.5);}
  100%{box-shadow:none;}
}
.preview-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:4px;
}
.preview-count{font-size:11px;color:#ffd700;font-weight:bold;}
.preview-mp{font-size:10px;color:rgba(200,180,150,.8);}
.preview-mp.mp-free{color:#4ecdc4;font-weight:bold;}
.preview-cards{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-bottom:4px;
}
.preview-mp-item{
  font-size:9px;
  padding:2px 5px;
  background:rgba(40,30,20,.6);
  border-radius:4px;
  color:#c0a060;
  white-space:nowrap;
}
.preview-mp-item.discounted{color:#4ecdc4;}
.preview-combo-row{
  margin-top:4px;
}
.preview-combo{
  display:inline-block;
  font-size:10px;
  padding:3px 8px;
  border-radius:6px;
  font-weight:bold;
  letter-spacing:1px;
}
.preview-combo.preview-hu{
  color:#ffd700;
  background:rgba(255,200,0,.15);
  border:1px solid rgba(255,200,0,.4);
  animation:huGlow 1s ease infinite alternate;
}
@keyframes huGlow{
  from{box-shadow:0 0 4px rgba(255,200,0,.3);}
  to{box-shadow:0 0 12px rgba(255,200,0,.7);}
}
.preview-combo.preview-kezi{
  color:#e74c3c;
  background:rgba(231,76,60,.15);
  border:1px solid rgba(231,76,60,.4);
}
.preview-combo.preview-shunzi{
  color:#3498db;
  background:rgba(52,152,219,.15);
  border:1px solid rgba(52,152,219,.4);
}
.preview-combo.preview-duizi{
  color:#9b59b6;
  background:rgba(155,89,182,.15);
  border:1px solid rgba(155,89,182,.4);
}
.preview-normal{
  font-size:10px;
  color:rgba(180,160,140,.6);
}

/* ── 将将胡：预览区伤害估算 ─────────────────────────────── */
.preview-damage-est{
  font-size:9px;
  color:rgba(180,160,140,.5);
  margin-top:3px;
  padding-top:3px;
  border-top:1px solid rgba(255,180,60,.1);
}
.preview-damage-est .dmg-value{
  color:#ff9966;
  font-weight:bold;
}

/* ── 将将胡：确认按钮升级 ──────────────────────────────── */
.card-play-btns{
  display:flex;
  gap:8px;
  justify-content:center;
  margin-top:8px;
}
.card-confirm-btn{
  flex:1;
  max-width:200px;
  padding:8px 16px;
  font-size:12px;
  font-weight:bold;
  color:#fff;
  background:linear-gradient(135deg,rgba(255,180,40,.8),rgba(255,140,20,.9));
  border:2px solid rgba(255,200,80,.5);
  border-radius:8px;
  cursor:pointer;
  letter-spacing:2px;
  transition:all .25s;
  box-shadow:0 4px 12px rgba(255,150,40,.3);
}
.card-confirm-btn:hover:not(.disabled){
  background:linear-gradient(135deg,rgba(255,200,60,.95),rgba(255,160,40,1));
  box-shadow:0 4px 18px rgba(255,160,40,.5);
  transform:translateY(-1px);
}
.card-confirm-btn:active:not(.disabled){
  transform:translateY(1px);
  box-shadow:0 2px 8px rgba(255,150,40,.3);
}
.card-confirm-btn.disabled{
  opacity:.4;
  cursor:not-allowed;
  background:rgba(80,70,60,.5);
  border-color:rgba(150,130,100,.3);
}
.card-cancel-btn{
  padding:8px 14px;
  font-size:11px;
  color:rgba(200,180,160,.8);
  background:rgba(30,25,20,.7);
  border:1px solid rgba(150,130,100,.3);
  border-radius:8px;
  cursor:pointer;
  transition:all .2s;
  letter-spacing:1px;
}
.card-cancel-btn:hover{
  background:rgba(50,40,30,.9);
  border-color:rgba(200,160,100,.5);
  color:#ffd700;
}
/* 休息按钮 */
.card-rest-btn{
  padding:8px 16px;
  font-size:12px;
  color:#a0c0ff;
  background:linear-gradient(135deg,rgba(40,60,100,.8),rgba(30,50,80,.9));
  border:1px solid rgba(100,140,200,.4);
  border-radius:8px;
  cursor:pointer;
  transition:all .25s;
  letter-spacing:1px;
  box-shadow:0 4px 12px rgba(40,80,160,.2);
}
.card-rest-btn:hover:not(.disabled){
  background:linear-gradient(135deg,rgba(60,90,140,.95),rgba(50,70,120,1));
  border-color:rgba(120,160,220,.6);
  box-shadow:0 4px 18px rgba(60,100,200,.4);
  transform:translateY(-1px);
}
.card-rest-btn:active:not(.disabled){
  transform:translateY(1px);
  box-shadow:0 2px 8px rgba(40,80,160,.2);
}
.card-rest-btn.disabled{
  opacity:.4;
  cursor:not-allowed;
  background:rgba(50,50,70,.5);
  border-color:rgba(100,100,140,.3);
}

/* ── 战法组合宣告动画 ──────────────────────────── */
.combo-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity .3s;
}
.combo-overlay.active{
  opacity:1;
  pointer-events:all;
}
.combo-banner{
  text-align:center;
  animation:comboBannerIn .5s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes comboBannerIn{
  from{transform:scale(.3) rotate(-10deg);opacity:0;}
  to{transform:scale(1) rotate(0deg);opacity:1;}
}
.hu-combo-name{
  font-size:42px;
  font-weight:bold;
  color:#ffd700;
  text-shadow:0 0 20px rgba(255,200,0,.8),0 0 40px rgba(255,150,0,.5);
  letter-spacing:4px;
  animation:comboFlash 2s ease forwards;
}
@keyframes comboFlash{
  0%,60%{text-shadow:0 0 20px rgba(255,200,0,.8),0 0 40px rgba(255,150,0,.5);}
  30%{text-shadow:0 0 40px rgba(255,220,0,1),0 0 80px rgba(255,180,0,.8),0 0 120px rgba(255,150,0,.4);}
  100%{text-shadow:0 0 8px rgba(255,200,0,.4);}
}
.hu-combo-desc{
  font-size:14px;
  color:#ffd700;
  margin-top:8px;
  opacity:0;
  animation:descFadeIn .4s ease .4s forwards;
}
@keyframes descFadeIn{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:.9;transform:translateY(0);}
}
.hu-combo-cards{
  display:flex;
  gap:12px;
  justify-content:center;
  margin-top:12px;
  opacity:0;
  animation:cardsFadeIn .4s ease .6s forwards;
}
@keyframes cardsFadeIn{
  from{opacity:0;transform:translateY(12px);}
  to{opacity:1;transform:translateY(0);}
}
.hu-combo-card{
  font-size:28px;
  background:rgba(20,15,40,.9);
  border:2px solid #ffd700;
  border-radius:8px;
  padding:6px 10px;
  box-shadow:0 0 15px rgba(255,200,0,.5);
}

/* ── 将将胡：组合特效提示（手牌栏内）────────────────────── */
.card-combo-hints{

<script>

// ════════════════════════════════════════════════════

// battle.html - 独立战斗页面脚本

// ════════════════════════════════════════════════════



// 战斗模式：'free' 自由战斗 / 'dungeon' 地下城战斗

let battleMode = 'free';

let dungeonReturnUrl = '';



// 兼容函数：在独立页面中不需要showPage

if (typeof showPage !== 'function') {

  window.showPage = function(page, tab) {

    // 独立页面中不需要切换页面

    console.log('[battle.html] showPage called:', page);

  };

}



function cleanupBattlePageAudio() {

  if (typeof clearGameAudio === 'function') {

    clearGameAudio();

    return;

  }

  if (typeof SoundFX !== 'undefined' && SoundFX.stopAll) SoundFX.stopAll();

  if (typeof cleanupBattleAudio === 'function') cleanupBattleAudio();

}



function battleNavigateTo(url) {

  cleanupBattlePageAudio();

  window.location.href = url;

}



// 返回按钮逻辑

function goBack() {

  // 测试模式：返回测试选择页面
  if (sessionStorage.getItem('battleTestMode') === 'true') {
    sessionStorage.removeItem('battleTestMode');
    sessionStorage.removeItem('battleContext');
    battleNavigateTo('battle-test-select.html');
    return;
  }

  // ★ 修复（2026-05-05）：门派试炼独立处理（不依赖 battleMode）
  //   startBattleInNewPage 会设置 battleContext，导致 battleMode 被强制改为 'npc'，
  //   下面的 arena 分支走不到，试炼结果永远不会写入。
  if (sessionStorage.getItem('wuxia_sect_trial')) {
    try {
      const sectTrialResult = { won: false, timestamp: Date.now(), sectId: sessionStorage.getItem('wuxia_sect_trial'), fled: true };
      sessionStorage.setItem('wuxia_sect_trial_result', JSON.stringify(sectTrialResult));
      sessionStorage.removeItem('wuxia_sect_trial');
      const returnUrl = sessionStorage.getItem('sectTrial_returnUrl') || 'sect.html';
      sessionStorage.setItem('battleReturnUrl', returnUrl);
      console.log('[goBack] 门派试炼逃跑，结果已写入:', JSON.stringify(sectTrialResult));
    } catch(e) { console.warn('[goBack] sect trial error:', e); }
  }

  // ⚠ arena 模式：战斗中途返回 → 算逃跑/判负，写 won:false 结果
  if (typeof battleMode !== 'undefined' && battleMode === 'arena') {
    try {
      const arenaCtx = JSON.parse(sessionStorage.getItem('wuxia_arena_battle_context') || '{}');
      const resultObj = { won: false, timestamp: Date.now(), fled: true };
      // 门派演武场：传递门派战斗信息
      if (arenaCtx.enemy && arenaCtx.enemy._sectArena) {
        resultObj.sectArena = true;
        resultObj.sectId = arenaCtx.enemy._sectId;
        resultObj.oppIdx = arenaCtx.enemy._oppIdx;
        resultObj.reward = arenaCtx.enemy._reward;
      }
      sessionStorage.setItem('wuxia_arena_battle_result', JSON.stringify(resultObj));

      // ★ 门派试炼：额外保存结果（sect.html 会读取）
      if (sessionStorage.getItem('wuxia_sect_trial')) {
        const sectTrialResult = { won: playerWon, timestamp: Date.now(), sectId: sessionStorage.getItem('wuxia_sect_trial') };
        sessionStorage.setItem('wuxia_sect_trial_result', JSON.stringify(sectTrialResult));
        sessionStorage.removeItem('wuxia_sect_trial');
        // ★ 修复：试炼应跳回 sect.html，让 _checkSectTrialResult() 处理结果
        const returnUrl = sessionStorage.getItem('sectTrial_returnUrl') || 'sect.html';
        sessionStorage.setItem('battleReturnUrl', returnUrl);
      }
      sessionStorage.setItem('wuxia_arena_from_battle', 'true');
      // 若未设置返回地址（非试炼），默认跳城镇
      if (!sessionStorage.getItem('battleReturnUrl')) {
        // ★ 修复（2026-05-06）：门派演武场战斗结束应返回门派页面，而非城镇
        if (resultObj.sectArena && resultObj.sectId) {
          sessionStorage.setItem('battleReturnUrl', 'sect.html?sect=' + resultObj.sectId);
        } else {
          sessionStorage.setItem('battleReturnUrl', 'town.html');
        }
      }
    } catch(e) { console.warn('[goBack] arena result error:', e); }
    // 使用 battleReturnUrl，而非硬编码 town.html
    const goBackUrl = sessionStorage.getItem('battleReturnUrl') || 'town.html';
    battleNavigateTo(goBackUrl);
    return;
  }

  // 检查是否有返回地址
  const returnTo = sessionStorage.getItem('battleReturnUrl');

  if (returnTo) {
    battleNavigateTo(returnTo);
  } else if (dungeonReturnUrl) {
    battleNavigateTo(dungeonReturnUrl);
  } else {
    // 默认返回城镇
    battleNavigateTo('town.html');
  }
}

      const playerWon = hpValue > 0;

      let battleRewards = { won: playerWon, timestamp: Date.now() };
      if (playerWon) {

          const enemyDb = (typeof ENEMY_DB !== 'undefined') ? ENEMY_DB : (window.ENEMY_DB || {});
          const enemy = enemyDb[enemyId];
          if (enemy) {

            const mult = tierMult[ctx.enemyTier] || 1;
            const playerLevel = (typeof edS !== 'undefined' && edS && edS.level) ? edS.level : 1;
            battleRewards.exp    = Math.round((enemy.exp    || 0) * mult);
            battleRewards.silver = Math.round((enemy.silver || 0) * mult);
            battleRewards.items  = (enemy.drops && Array.isArray(enemy.drops))
              ? enemy.drops
                  .filter(d => d && typeof d === 'object')           // 只取对象格式（新格式）
                  .map(d => {
                    // 新格式：{ id, chance, minQty, maxQty }
                    if (d.id) {
                      const min = d.minQty || 1;
                      const max = d.maxQty || d.minQty || 1;
                      const qty = min + Math.floor(Math.random() * (max - min + 1));
                      return { id: d.id, qty };
                    }
                    return null;
                  })
                  .filter(Boolean)
              : [];
          }
        } catch(e) { console.warn('[checkWin] 奖励计算失败:', e); }
      }

      sessionStorage.setItem('wuxia_dungeon_battle_result', JSON.stringify(battleRewards));

// 修改胜利弹窗按钮（地下城模式）

function patchWinLayerForDungeon(playerWon) {

  const winLayer = document.getElementById('winLayer');

  if (!winLayer) return;

  

  // 等待弹窗显示

  const observer = new MutationObserver(() => {

    if (winLayer.classList.contains('on')) {

      observer.disconnect();

      

      const btnWrap = winLayer.querySelector('.win-box > div:last-child');

      if (!btnWrap) return;

      

      // 替换按钮为"返回地下城"

      btnWrap.innerHTML = `

        <button class="win-btn" onclick="returnToDungeon(${playerWon})">

          ${playerWon ? '🏃 继续探索' : '💀 返回'}

        </button>

      `;

      

      // 同步血量到存档

      syncHpToSave();

    }

  });

  observer.observe(winLayer, { attributes: true, attributeFilter: ['class'] });

}



// ══ 擂台模式：修改胜利弹窗按钮 ══

function patchWinLayerForArena(playerWon) {

  const winLayer = document.getElementById('winLayer');

  if (!winLayer) return;

  // 擂台切磋败北：立即恢复玩家气血，不再保存 0 血量
  if (!playerWon) {
    const origMaxHp = (typeof LH !== 'undefined' && LH._maxHpFull) ? LH._maxHpFull : (typeof LH !== 'undefined' ? LH.maxHp : 100);
    window.lHp = origMaxHp;
    if (typeof LH !== 'undefined') LH.hp = origMaxHp;
    if (typeof updateBars === 'function') updateBars();
    syncHpToSave();
  }

  const observer = new MutationObserver(() => {

    if (winLayer.classList.contains('on')) {

      observer.disconnect();

      const btnWrap = winLayer.querySelector('.win-box > div:last-child');

      if (!btnWrap) return;

      // 替换按钮：擂台切磋后返回城镇（擂台popup会读取sessionStorage显示结果）
      btnWrap.innerHTML = `
        <button class="win-btn" onclick="returnFromArenaBattle()">
          🏠 返回擂台
        </button>
      `;

      // 胜利时才同步气血（败北已在上面处理）
      if (playerWon) syncHpToSave();
    }

  });

  observer.observe(winLayer, { attributes: true, attributeFilter: ['class'] });

}

// 同步血量到存档

function syncHpToSave() {

  // 使用 window.lHp 获取血量（battle.js 已将血量挂载到 window 对象）

  // 避免使用 lHp 因为它可能被 HTML 元素 ID 覆盖

  const currentHpVal = (typeof window.lHp === 'number') ? window.lHp : null;

  const currentMpVal = (typeof window.lMp === 'number') ? window.lMp : null;

  

  console.log('[syncHpToSave] window.lHp:', window.lHp, 'window.lMp:', window.lMp, 'LH:', LH ? LH.name : 'undefined');

  

  if (currentHpVal === null || typeof LH === 'undefined') {

    console.warn('[syncHpToSave] 无法保存血量：window.lHp 不是数值或 LH 未定义');

    return;

  }

  

  const currentHp = Math.max(1, Math.round(currentHpVal));

  const currentMp = (currentMpVal !== null) ? Math.max(0, Math.round(currentMpVal)) : 0;

  // ★ 修复（2026-05-05）：脏值保护，防止时间戳被写入存档
  // 优先用 LH._maxHpFull（calcFinalStats 计算的正确总值），其次用 LH.maxHp
  // 如果 LH.maxHp 超过 9999，视为脏值，丢弃并使用 equippedMaxHp
  const _MAX_STAT = 9999;
  const _srcMaxHp = (LH._maxHpFull > 0 && LH._maxHpFull <= _MAX_STAT * 10) ? LH._maxHpFull : LH.maxHp;
  const _srcMaxMp = (LH._maxMpFull > 0 && LH._maxMpFull <= _MAX_STAT * 10) ? LH._maxMpFull : LH.maxMp;
  const maxHp = (_srcMaxHp > 0 && _srcMaxHp <= _MAX_STAT) ? _srcMaxHp
    : ((typeof edS !== 'undefined' && edS.equippedMaxHp > 0 && edS.equippedMaxHp <= _MAX_STAT) ? edS.equippedMaxHp : 150);
  const maxMp = (_srcMaxMp > 0 && _srcMaxMp <= _MAX_STAT) ? _srcMaxMp
    : ((typeof edS !== 'undefined' && edS.equippedMaxMp > 0 && edS.equippedMaxMp <= _MAX_STAT) ? edS.equippedMaxMp : 100);
  // 额外保护：如果当前血量/内力超过对应上限的 10 倍，视为脏值
  const safeHp = (currentHp > 0 && currentHp <= maxHp * 10) ? currentHp : maxHp;
  const safeMp = (currentMp >= 0 && currentMp <= maxMp * 10) ? currentMp : maxMp;

  

  // 尝试更新各种存档格式

  try {

    // 1. 更新 wuxia_player_profile（dungeon.html优先加载的存档）

    const profileSave = localStorage.getItem('wuxia_player_profile');

    if (profileSave) {

      const data = JSON.parse(profileSave);

      data.hp = safeHp;

      data.maxHp = maxHp;

      data.mp = safeMp;

      data.maxMp = maxMp;

      // 保留已有的经验值和等级，避免被覆盖

      if (typeof edS !== 'undefined') {

        data.totalExp = edS.totalExp || data.totalExp || 0;

        data.level = edS.level || data.level || 1;

      }

      localStorage.setItem('wuxia_player_profile', JSON.stringify(data));

      console.log('[syncHpToSave] 已更新 wuxia_player_profile');

    }

    

    // 2. 更新 wuxia_save

    const save = localStorage.getItem('wuxia_save');

    if (save) {

      const data = JSON.parse(save);

      data.hp = safeHp;

      data.maxHp = maxHp;

      data.mp = safeMp;

      data.maxMp = maxMp;

      localStorage.setItem('wuxia_save', JSON.stringify(data));

    }

    

    // 3. 更新 wuxia_travel（旅行系统存档，包含 travelPlayerState）

    const travelSave = localStorage.getItem('wuxia_travel');

    if (travelSave) {

      const data = JSON.parse(travelSave);

      if (data.state) {

        // travelPlayerState.hp/mp 是百分比，需要转换

        const hpPercent = maxHp > 0 ? Math.round((currentHp / maxHp) * 100) : 100;

        data.state.hp = hpPercent;
        const mpPercent = maxMp > 0 ? Math.round((currentMp / maxMp) * 100) : 100;
        data.state.mp = mpPercent;

      }

      localStorage.setItem('wuxia_travel', JSON.stringify(data));

      console.log('[syncHpToSave] 已更新 wuxia_travel，HP百分比:', data.state ? data.state.hp : 'N/A');

    }

    

    // 4. 更新 wuxia_editor（town.html 从这里加载 edS）

    const editorSave = localStorage.getItem('wuxia_editor');

    if (editorSave) {

      const data = JSON.parse(editorSave);

      data.hp = safeHp;

      data.maxHp = maxHp;

      data.mp = safeMp;

      data.maxMp = maxMp;

      localStorage.setItem('wuxia_editor', JSON.stringify(data));

      console.log('[syncHpToSave] 已更新 wuxia_editor');

    }

    

    // 5. 保存到 sessionStorage 供地下城页面读取（键名与dungeon.html保持一致）

    sessionStorage.setItem('wuxia_dungeon_player_hp', safeHp);

    sessionStorage.setItem('wuxia_dungeon_player_maxhp', maxHp);

    sessionStorage.setItem('wuxia_dungeon_player_mp', safeMp);

    sessionStorage.setItem('wuxia_dungeon_player_maxmp', maxMp);


    console.log('[syncHpToSave] 状态已保存 - HP:', safeHp, '/', maxHp, 'MP:', safeMp, '/', maxMp);

    

    // 验证保存是否成功

    const verifyHp = sessionStorage.getItem('wuxia_dungeon_player_hp');

    console.log('[syncHpToSave] 验证保存结果 HP:', verifyHp);

  } catch (e) {

    console.error('同步血量失败:', e);

  }

}



// 返回地下城

function returnToDungeon(playerWon) {

  // 关闭弹窗

  const winLayer = document.getElementById('winLayer');

  if (winLayer) winLayer.classList.remove('on');

  // ── 优先读取 checkWin 覆盖器已保存的奖励，避免重复计算 ──
  let battleRewards = null;
  try {
    const saved = sessionStorage.getItem('wuxia_dungeon_battle_result');
    if (saved) {
      const parsed = JSON.parse(saved);
      if (parsed && typeof parsed === 'object') {
        battleRewards = parsed;
        console.log('[returnToDungeon] 使用 checkWin 已保存的奖励:', battleRewards);
      }
    }
  } catch(e) { console.warn('[returnToDungeon] 读取已保存奖励失败:', e); }

  // fallback：如果没读到，再计算一遍（理论上不应进入这里）
  if (!battleRewards) {
    console.warn('[returnToDungeon] 未找到已保存奖励，重新计算...');
    battleRewards = { won: playerWon, timestamp: Date.now() };
    if (playerWon) {
      try {
        const ctx = JSON.parse(sessionStorage.getItem('wuxia_dungeon_battle_context') || '{}');
        const enemyId = ctx.enemyId;
        const enemyDb = (typeof ENEMY_DB !== 'undefined') ? ENEMY_DB : (window.ENEMY_DB || {});
        const enemy = enemyDb[enemyId];
        if (enemy) {
          const tierMult = { battle: 1, normal: 1, major: 1.2, elite: 1.5, boss: 2.0 };
          const mult = tierMult[ctx.enemyTier] || 1;
          battleRewards.exp    = Math.round((enemy.exp    || 0) * mult);
          battleRewards.silver = Math.round((enemy.silver || 0) * mult);
          battleRewards.items  = (enemy.drops && Array.isArray(enemy.drops))
            ? enemy.drops.map(d => ({ id: d[0], qty: d[1] || 1 }))
            : [];
        }
      } catch(e) { console.warn('[returnToDungeon] 奖励计算失败:', e); }
    }
    sessionStorage.setItem('wuxia_dungeon_battle_result', JSON.stringify(battleRewards));
  }

  sessionStorage.setItem('wuxia_dungeon_from_battle', 'true');

  // 同步血量
  syncHpToSave();

  // 跳转回地下城页面
  const returnUrl = dungeonReturnUrl || sessionStorage.getItem('battleReturnUrl') || 'dungeon.html';
  console.log('[returnToDungeon] 跳转回:', returnUrl, '奖励:', battleRewards);
  battleNavigateTo(returnUrl);

}
