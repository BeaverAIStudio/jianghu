      } else {
        window._dungeonPlayerHp = _hp;
        console.log('[battle.html] Loaded dungeon player HP:', window._dungeonPlayerHp);
      }

    }

    if (savedMp !== null && savedMp !== '') {

      let _mp = parseInt(savedMp, 10);
      // ★ 修复（2026-05-05）：验证数值合法性，NaN 或超出范围则丢弃
      if (isNaN(_mp) || _mp < 0 || _mp > 99999) {
        console.warn('[battle.html] savedMp 脏值已丢弃:', savedMp);
        sessionStorage.removeItem('wuxia_dungeon_player_mp');
      } else {
        window._dungeonPlayerMp = _mp;
      }

    }

    if (savedMaxHp !== null && savedMaxHp !== '') {

      let _mhp = parseInt(savedMaxHp, 10);
      if (isNaN(_mhp) || _mhp <= 0 || _mhp > 99999) {
        console.warn('[battle.html] savedMaxHp 脏值已丢弃:', savedMaxHp);
        sessionStorage.removeItem('wuxia_dungeon_player_maxhp');
      } else {
        window._dungeonPlayerMaxHp = _mhp;
      }

    }

    if (savedMaxMp !== null && savedMaxMp !== '') {

      let _mmp = parseInt(savedMaxMp, 10);
      if (isNaN(_mmp) || _mmp <= 0 || _mmp > 99999) {
        console.warn('[battle.html] savedMaxMp 脏值已丢弃:', savedMaxMp);
        sessionStorage.removeItem('wuxia_dungeon_player_maxmp');
      } else {
        window._dungeonPlayerMaxMp = _mmp;
      }

    }

    // 从存档加载经验值到 edS（避免每次战斗经验重置）
    if (typeof edS !== 'undefined') {
      try {
        const progressRaw = localStorage.getItem('wuxia_player_progress');
        if (progressRaw) {
          const progress = JSON.parse(progressRaw);
          if (progress.totalExp !== undefined) {
            edS.totalExp = progress.totalExp;
            console.log('[battle.html] 从存档加载经验值:', edS.totalExp);
          }
          if (progress.level !== undefined) {
            edS.level = progress.level;
          }
        }
      } catch (e) {
        console.warn('[battle.html] 加载经验值失败:', e);
      }
    }

  }



  // ══ 擂台模式（切磋） ══

  if (mode === 'arena') {

    battleMode = 'arena';

    try {

      const ctx = JSON.parse(sessionStorage.getItem('wuxia_arena_battle_context') || '{}');

      if (ctx.player && ctx.enemy) {

        LH = ctx.player;

        RH = ctx.enemy;

        // ── LH.skillIds → LH.skills（resetFight 依赖 skills 数组）──
        if (LH.skillIds && !LH.skills) {
          LH.skills = LH.skillIds.map(id => ({
            id,
            name: id.toUpperCase(),
            icon: '⚔️',
            school: '通用',
            desc: '',
            cd: 0,
            mpCost: 0,
            type: 'damage',
            multiplier: 1.0,
          }));
        }

        // 用 buildEnemyCharForBattle 格式化敌人

        if (typeof buildEnemyCharForBattle === 'function') {

          RH = buildEnemyCharForBattle(RH) || RH;

        }

        // 从存档同步玩家当前血量（arena 模式）
        if (typeof edS !== 'undefined' && edS.hp != null) {
          LH._currentHp = edS.hp;
        }

        // ★ 跟背包页面用完全相同的函数：edStats() 设置基础值
        initLHStats();

        resetFight();

        // 应用当前血量
        if (typeof LH._currentHp === 'number') {
          window.lHp = LH._currentHp;
          updateBars();
        }
        updateMpBars();

      }

    } catch (e) {

      console.error('[battle.html] Arena mode init error:', e);

    }

  }



  // 初始化战斗（地下城/擂台模式下不在这里调用）

  if (mode !== 'dungeon' && mode !== 'arena') {

    resetFight();

  }

  

  // 如果有预选角色，设置它

  if (heroId && typeof CHARS !== 'undefined') {

    const hero = CHARS.find(c => c.id === heroId);

    if (hero) {

      LH = hero;

    }

  }

  
  
  // ══ 防御性检查：如果 battleContext 存在，说明是NPC实战或地下城，
  //   此时若 battleMode 误设为 arena，则强制修正为 npc。
  //   ★ 修复（2026-05-05）：门派试炼会同时设置 battleContext 和 battleMode=arena，
  //      但 arena 模式的正确 context 是 wuxia_arena_battle_context，
  //      所以只有当 arena context 不存在时，才修正 battleMode。
  const _hasArenaCtx = !!sessionStorage.getItem('wuxia_arena_battle_context');
  if (sessionStorage.getItem('battleContext') && battleMode === 'arena' && !_hasArenaCtx) {
    console.warn('[battle.html] 检测到异常：battleContext 存在但 arena context 不存在，battleMode 强制修正为 npc');
    battleMode = 'npc';
  }

  // ══ NPC 实战模式（battleContext，无 mode 参数时） ══
  // startBattleInNewPage() 写入 sessionStorage('battleContext')，town → NPC 动手走此路径
  if (!mode && !dungeonReturnUrl || battleMode === 'npc') {
    if (!battleMode) battleMode = 'npc';
    try {
      const rawCtx = sessionStorage.getItem('battleContext');
      console.log('[battle.html] rawCtx exists:', !!rawCtx, 'length:', rawCtx?.length);
      if (rawCtx) {
        const bCtx = JSON.parse(rawCtx);
        console.log('[battle.html] bCtx.player exists:', !!bCtx.player, 'bCtx.player.name:', bCtx.player?.name);
        console.log('[battle.html] bCtx.player.skills count:', bCtx.player?.skills?.length);
        console.log('[battle.html] bCtx.player.skills ids:', bCtx.player?.skills?.map(s => s?.id || s));
        if (bCtx.player && bCtx.enemy) {
          LH = bCtx.player;
          RH = bCtx.enemy;
          console.log('[battle.html] After LH=bCtx.player, LH.skills:', LH?.skills?.map(s => s?.id || s));
          // 用 buildEnemyCharForBattle 格式化敌人
          if (typeof buildEnemyCharForBattle === 'function') {
            RH = buildEnemyCharForBattle(RH) || RH;
          }
          // 从 sessionStorage 读取当前血量（startBattleInNewPage 已写入）
          const _npcHp = sessionStorage.getItem('wuxia_dungeon_player_hp');
          const _npcMaxHp = sessionStorage.getItem('wuxia_dungeon_player_maxhp');
          if (_npcHp && LH) {
            const _hpVal = parseInt(_npcHp, 10);
            // ★ 修复（2026-05-05）：防止脏值被写入 LH._currentHp
            if (isNaN(_hpVal) || _hpVal < 0 || _hpVal > 99999) {
              console.warn('[battle.html] _npcHp 脏值已丢弃:', _npcHp);
              sessionStorage.removeItem('wuxia_dungeon_player_hp');
            } else {
              LH._currentHp = Math.min(_hpVal, LH.maxHp || 100);
            }
          }
          const _npcMp = sessionStorage.getItem('wuxia_dungeon_player_mp');
          if (_npcMp && LH) {
            const _mpVal = parseInt(_npcMp, 10);
            // ★ 修复（2026-05-05）：防止脏值（>99999）被写入 LH._currentMp
            if (isNaN(_mpVal) || _mpVal < 0 || _mpVal > 99999) {
              console.warn('[battle.html] _npcMp 脏值已丢弃:', _npcMp);
              sessionStorage.removeItem('wuxia_dungeon_player_mp');
            } else {
              LH._currentMp = Math.min(_mpVal, LH.maxMp || 150);
            }
          }
          // ★ 跟背包页面用完全相同的函数：edStats() 设置基础值（必须在 resetFight 前）
          initLHStats();
          resetFight();
        }
      }
    } catch(e) {
      console.warn('[battle.html] Failed to load battleContext:', e);
    }
  }

  // 如果有预选敌人，设置它

  if (enemyId && typeof ENEMY_DB !== 'undefined') {

    // 地下城模式：优先使用 sessionStorage 中已钳制缩放的敌人数据
    let enemy = null;
    if (mode === 'dungeon') {
      try {
        const ctx = JSON.parse(sessionStorage.getItem('wuxia_dungeon_battle_context') || '{}');
        if (ctx.scaledEnemy && ctx.scaledEnemy.id) {
          enemy = ctx.scaledEnemy;
          console.log('[battle.html] 使用钳制后敌人数据：', enemy.name, 'Lv' + enemy.level);
        }
      } catch(e) { /* ignore */ }
    }

    // fallback：从 ENEMY_DB 中找到对应的敌人
    if (!enemy) {
      enemy = ENEMY_DB[enemyId];
    }

    if (enemy) {

      // 使用 _buildEnemyChar 格式转换敌人

      console.log('[battle.html] Building enemy char for:', enemy.name, 'Lv' + (enemy.level || '?'));

      RH = buildEnemyCharForBattle(enemy);

      console.log('[battle.html] RH set, title:', RH.title);

    }

  }

  

  // ═══════════════════════════════════════════════════════
  //  ⭐ 统一初始化 LH 属性（跟背包页面用完全相同的计算方式）
  // ═══════════════════════════════════════════════════════
  //   基础值 = edStats()       → 对应 LH.maxHp / LH.maxMp
  //   总值   = getTotalStats() → 由 calcFinalStats() 写入 LH._maxHpFull / LH._maxMpFull
  //   不管什么模式、不管之前被设成什么，这里一律强制覆盖
  // ═══════════════════════════════════════════════════════
  function initLHStats() {
    if (!LH || LH.id !== 'cp_self') return;
    // ★ 改造（2026-05-05）：从 edS 缓存读取所有属性（已含所有加成）
    const _MAX_STAT = 9999;
    if (typeof edS !== 'undefined') {
      const eqHp = (edS.equippedMaxHp > 0 && edS.equippedMaxHp <= _MAX_STAT) ? edS.equippedMaxHp : null;
      const eqMp = (edS.equippedMaxMp > 0 && edS.equippedMaxMp <= _MAX_STAT) ? edS.equippedMaxMp : null;
      if (eqHp && LH.maxHp !== eqHp) LH.maxHp = eqHp;
      if (eqMp && LH.maxMp !== eqMp) LH.maxMp = eqMp;
      // ★ 新增：从缓存写入攻击/防御/暴击/闪避/速度（已含全部加成）
      if (edS.equippedAtk != null)   LH.atk     = edS.equippedAtk;
      if (edS.equippedDef != null)   LH.def     = edS.equippedDef;
      if (edS.equippedCrit != null)  LH.crit    = edS.equippedCrit;
      if (edS.equippedDodge != null) LH.dodge   = edS.equippedDodge;
      if (edS.equippedSpd != null)   LH.speedN  = edS.equippedSpd;
    }
  }

  // 地下城模式：先应用保存的玩家血量，再初始化战斗
  if (mode === 'dungeon') {

    // 读取 sessionStorage 中保存的战斗前血量/内力
    const _sHp   = sessionStorage.getItem('wuxia_dungeon_player_hp');
    const _sMp   = sessionStorage.getItem('wuxia_dungeon_player_mp');
    const _sMaxHp = sessionStorage.getItem('wuxia_dungeon_player_maxhp');
    const _sMaxMp = sessionStorage.getItem('wuxia_dungeon_player_maxmp');

    // 有效性检查
    const hasValidHp   = _sHp   !== null && !isNaN(parseInt(_sHp,  10));
    const hasValidMp   = _sMp   !== null && !isNaN(parseInt(_sMp,  10));
    const hasValidMaxHp = _sMaxHp !== null && !isNaN(parseInt(_sMaxHp, 10));
    const hasValidMaxMp = _sMaxMp !== null && !isNaN(parseInt(_sMaxMp, 10));

    // ★ 跟背包页面用完全相同的函数：基础值 = edStats()
    initLHStats();

    // 调用 resetFight → calcFinalStats() 会计算正确总值到 _maxHpFull / _maxMpFull
    resetFight();

    // 用保存的当前血量/内力覆盖 resetFight 的满血设置（按比例换算到新总值）
    if (hasValidHp && hasValidMaxHp && LH._maxHpFull > 0) {
      const hpRatio = parseInt(_sHp, 10) / parseInt(_sMaxHp, 10);
      lHp = Math.min(LH._maxHpFull, Math.max(0, Math.round(hpRatio * LH._maxHpFull)));
    } else {
      lHp = (typeof edS !== 'undefined' && edS.hp != null) ? edS.hp : LH.maxHp;
    }
    if (hasValidMp && hasValidMaxMp && LH._maxMpFull > 0) {
      const mpRatio = parseInt(_sMp, 10) / parseInt(_sMaxMp, 10);
      // ★ 修复（2026-05-05）：clamp 比例到 [0, 1]，防止 sessionStorage 脏值导致 lMp 溢出
      const clampedRatio = Math.min(1, Math.max(0, mpRatio));
      lMp = Math.round(clampedRatio * LH._maxMpFull);
    } else {
      lMp = (typeof edS !== 'undefined' && edS.mp != null) ? edS.mp : (LH.maxMp || 150);
    }

    window.lHp = lHp; window.lMp = lMp;
    updateBars(); updateMpBars();
    console.log('[battle.html] Dungeon done: lHp='+lHp+'/'+LH._maxHpFull, 'lMp='+lMp+'/'+LH._maxMpFull);


  } else {

    // 非地下城模式：重新初始化战斗以应用预选角色

    console.log('[battle.html] Calling resetFight, RH.title:', RH ? RH.title : 'RH undefined');

    

    // ★ 优先从 sessionStorage 读取玩家当前血量（startBattleInNewPage 写入的）
    const _savedHp2 = sessionStorage.getItem('wuxia_dungeon_player_hp');
    const _savedMaxHp2 = sessionStorage.getItem('wuxia_dungeon_player_maxhp');
    const _savedMp2 = sessionStorage.getItem('wuxia_dungeon_player_mp');
    const _savedMaxMp2 = sessionStorage.getItem('wuxia_dungeon_player_maxmp');
    const _hasHp2 = _savedHp2 !== null && _savedHp2 !== '' && !isNaN(parseInt(_savedHp2, 10));
    const _hasMaxHp2 = _savedMaxHp2 !== null && _savedMaxHp2 !== '' && !isNaN(parseInt(_savedMaxHp2, 10));

    if (_hasHp2 && LH) {
      resetFight();
      // ★ 修复（2026-05-05）：防止脏值进入比例计算，clamp 比例到 [0, 1]
      const _rawHp2 = parseInt(_savedHp2, 10);
      const _hpVal2 = (_rawHp2 > 99999) ? 0 : _rawHp2;
      const _denomHp = _hasMaxHp2 ? parseInt(_savedMaxHp2, 10) : (LH._maxHpFull || 100);
      const hpRatio = Math.min(1, Math.max(0, _hpVal2 / _denomHp));
      lHp = Math.round(hpRatio * LH._maxHpFull);
      if (_savedMp2 !== null && _savedMp2 !== '' && !isNaN(parseInt(_savedMp2, 10))) {
        const _rawMp2 = parseInt(_savedMp2, 10);
        const _mpVal2 = (_rawMp2 > 99999) ? 0 : _rawMp2;
        const _denomMp = (_savedMaxMp2 !== null && _savedMaxMp2 !== '' && !isNaN(parseInt(_savedMaxMp2, 10))) ? parseInt(_savedMaxMp2, 10) : (LH._maxMpFull || 150);
        const mpRatio = Math.min(1, Math.max(0, _mpVal2 / _denomMp));

        lMp = Math.round(mpRatio * LH._maxMpFull);
      }
      window.lHp = lHp; window.lMp = lMp;
      updateBars(); updateMpBars();
      console.log('[battle.html] Normal (session): lHp='+lHp+'/'+LH._maxHpFull+' lMp='+lMp+'/'+LH._maxMpFull);

    } else if (typeof edS !== 'undefined' && LH) {
      // ★ 修复（2026-05-05）：edS.hp/edS.mp 脏值检查
      const _edHp = (typeof edS.hp === 'number' && edS.hp >= 0 && edS.hp <= 99999) ? edS.hp : (LH.maxHp || 100);
      const _edMp = (typeof edS.mp === 'number' && edS.mp >= 0 && edS.mp <= 99999) ? edS.mp : (LH.maxMp || 150);
      resetFight();
      lHp = Math.min(_edHp, LH.maxHp);
      lMp = Math.min(_edMp, LH.maxMp);
      window.lHp = lHp; window.lMp = lMp;
      updateBars(); updateMpBars();
      console.log('[battle.html] Normal (edS): lHp='+lHp+'/'+LH._maxHpFull+' lMp='+lMp+'/'+LH._maxMpFull);

    } else {

      resetFight();

    }

  }

  // ── 境界数据初始化（战斗中需实时更新境界状态）──
  if (typeof loadRealmState === 'function') loadRealmState();
};

// ═══════════════════════════════════════════════════════════════
//  ✦ 战法手牌系统 - UI渲染与事件
// ═══════════════════════════════════════════════════════════════

/**
 * 全局手牌渲染函数（供 CardSystem.render() 调用）
 */
window.renderCardHand = function(cardSystem) {
  const SCHOOL_COLORS = {
    '剑系': '#c0c0e0', '佛系': '#ffd700', '道系': '#80d0ff',
    '力系': '#ff6040', '暗系': '#a040c0', '毒系': '#40c040',
    '冰系': '#a0e0ff', '火系': '#ff8030', '雷系': '#ffe040',
    '风系': '#90d090', '拳系': '#d09050', '通用': '#a0a0a0',
  };
  const RARITY_BORDER = {
    common: '#888', rare: '#2ecc71', epic: '#9b59b6', legend: '#e67e22', artifact: '#e74c3c'
  };
  if (!cardSystem || !cardSystem.active) {
    const wrap = document.getElementById('cardHandWrap');
    if (wrap) wrap.classList.remove('active');
    return;
  }

  const wrap = document.getElementById('cardHandWrap');
  if (!wrap) return;
  wrap.classList.add('active');

  // 更新手牌数量
  const countEl = document.getElementById('cardCount');
  if (countEl) countEl.textContent = `(${cardSystem.hand.length}/${cardSystem.handLimit})`;

  // 更新运势爆发状态
  const luckEl = document.getElementById('cardLuckBoost');
  if (luckEl) {
    if (cardSystem.fate.luckBoost) {
      luckEl.classList.add('active');
      luckEl.textContent = `🌟 运势爆发！必摸${cardSystem.fate.pitySchool}系`;
    } else {
      luckEl.classList.remove('active');
    }
  }

  // 更新定向换牌按钮
  const swapBtn = document.getElementById('cardSwapBtn');
  if (swapBtn) {
    if (cardSystem.selectedCards.length > 0) {
      const cost = cardSystem.selectedCards.length * (window.CARD_BALANCE?.selectiveSwapCost || 10);
      swapBtn.textContent = `🎯 换牌(-${cost}气)`;
      swapBtn.classList.remove('disabled');
    } else {
      swapBtn.textContent = '🎯 换牌';
      swapBtn.classList.add('disabled');
    }
  }

  // 更新全换牌按钮
  const fullSwapBtn = document.getElementById('cardFullSwapBtn');
  if (fullSwapBtn) {
    const fullCost = window.CARD_BALANCE?.fullSwapCost || 30;
    const momentumOk = typeof momentum !== 'undefined' && momentum >= fullCost;
    const hasCards = cardSystem.hand.length > 0;
    if (momentumOk && hasCards && !cardSystem.isAnimating) {
      fullSwapBtn.textContent = `🔄 全换(-${fullCost}气)`;
      fullSwapBtn.classList.remove('disabled');
    } else {
      fullSwapBtn.textContent = '🔄 全换';
      fullSwapBtn.classList.add('disabled');
    }
  }

  // 渲染手牌列表
  const listEl = document.getElementById('cardHandList');
  if (!listEl) return;

  listEl.innerHTML = '';

  cardSystem.hand.forEach(card => {
    const isSealed = cardSystem.sealedCards.some(s => s.uid === card.uid);
    const isSelected = cardSystem.selectedCards.includes(card.uid);
    const schoolColor = SCHOOL_COLORS[card.school] || '#a0a0a0';
    const rarityBorder = RARITY_BORDER[card.rarity] || '#888';
    const effectClass = card.rarityEffect ? `effect-${card.rarityEffect}` : '';

    const cardEl = document.createElement('div');
    cardEl.className = `card-item${isSealed ? ' sealed' : ''}${isSelected ? ' selected' : ''}`;
    cardEl.dataset.uid = card.uid;

    cardEl.innerHTML = `
      <div class="card-face" style="border-color:${rarityBorder};${isSealed ? 'filter:grayscale(0.8)brightness(0.6);' : ''}">
        <div class="card-icon">${card.icon}</div>
        <div class="card-name">${card.name}</div>
        <div class="card-divider"></div>
        <div class="card-school" style="background:${schoolColor}">${card.school}</div>
        <div class="card-mp">${card.mpCost}气</div>
        <div class="card-suit" style="color:${card.suitColor || '#fff'};font-size:14px;font-weight:bold;">${card.suitSymbol || ''}</div>
        <div class="card-rarity">${card.rarityIcon || ''}</div>
      </div>
    `;

    // 点击事件（选牌/取消选择，不再自动出牌）
    if (!isSealed) {
      cardEl.addEventListener('click', () => {
        if (cardSystem.isAnimating) return;
        if (cardSystem.playedThisTurn >= (window.CARD_BALANCE?.maxPlayPerTurn || 3)) return;

        const idx = cardSystem.selectedCards.indexOf(card.uid);
        if (idx !== -1) {
          // 取消选中
          cardSystem.selectedCards.splice(idx, 1);
        } else if (cardSystem.selectedCards.length < (window.CARD_BALANCE?.maxPlayPerTurn || 3)) {
          // 选中
          cardSystem.selectedCards.push(card.uid);
        }

        // 更新预览和按钮
        renderCardHand(cardSystem);
        updateCardPlayPreview(cardSystem);
      });
    }

    listEl.appendChild(cardEl);
  });

  // ── 将将胡：选牌组合提示（实时显示可凑组合）──
  const selectedCount = cardSystem.selectedCards.length;
  let comboHintsHtml = '';

  if (selectedCount > 0) {
    const selectedCards = cardSystem.selectedCards
      .map(uid => cardSystem.hand.find(c => c.uid === uid))
      .filter(Boolean);

    if (selectedCards.length > 0 && typeof CardSystem.ComboResolver !== 'undefined') {
      const resolved = CardSystem.ComboResolver.resolve(selectedCards, cardSystem, true); // isPreview = true

      // 显示当前选牌的组合类型
      comboHintsHtml = `<div class="card-combo-hints">
        <span class="card-combo-hint ${resolved.hintClass}">${resolved.hintText}</span>`;

      // 若不足3张，额外显示"差X张凑成XX"的提示
      if (selectedCount === 1) {
        // 差2张 → 检测能凑什么
        const sc = {}; selectedCards.forEach(c => { sc[c.school] = (sc[c.school]||0)+1; sc[c.skillId] = (sc[c.skillId]||0)+1; });
        if (sc[selectedCards[0].skillId] >= 2) {
          comboHintsHtml += `<span class="card-combo-hint hint-ning">✦ 差2张凑凝</span>`;
        }
        comboHintsHtml += `<span class="card-combo-hint hint-lianhuan">💥 差2张凑连环</span>`;
      } else if (selectedCount === 2) {
        // 差1张
        const skillDup = selectedCards[0].skillId === selectedCards[1].skillId;
        if (skillDup) {
          comboHintsHtml += `<span class="card-combo-hint hint-ning">✦ 差1张凑凝！</span>`;
        }
        if (selectedCards[0].school === selectedCards[1].school) {
          const uniqSkills = new Set(selectedCards.map(c => c.skillId)).size;
          if (uniqSkills >= 2) {
            comboHintsHtml += `<span class="card-combo-hint hint-shi">⚡ 差1张凑势！</span>`;
          }
          comboHintsHtml += `<span class="card-combo-hint hint-lianhuan">💥 差1张凑连环！</span>`;
        }
      }

      comboHintsHtml += `</div>`;
    }
  } else {
    // 未选牌时显示手牌提示
    const hints = cardSystem.getHint();
    if (hints && hints.length > 0) {
      comboHintsHtml = hints.map(h => {
        if (h.includes('连环')) return `<span class="hint-lianhuan">${h}</span>`;
        if (h.includes('凝')) return `<span class="hint-ning">${h}</span>`;
        if (h.includes('势')) return `<span class="hint-shi">${h}</span>`;
        if (h.includes('对子')) return `<span class="hint-duizi">${h}</span>`;
        return h;
      }).join('<br>');
    }
  }

  const hintEl = document.getElementById('cardHint');
  if (hintEl) {
    hintEl.innerHTML = comboHintsHtml;
  }

  // ── 同步更新出牌预览区（回合切换/摸牌后必须重置组合效果显示）──
  updateCardPlayPreview(cardSystem);
};

/**
 * 休息（跳过此回合，敌人正常出手，恢复气力）
 */
window.CardRestAction = function() {
  if (typeof CardSystem === 'undefined' || !CardSystem.active) return;
  if (CardSystem.isAnimating) return;

  // 清除选牌
  CardSystem.selectedCards = [];

  // 恢复气力（按最大气力的30%恢复，上限100点）
  const REST_MP_RATIO = 0.3; // 恢复30%的最大气力
  const maxMp = (typeof LH !== 'undefined' && LH._maxMpFull) ? LH._maxMpFull : 150;
  const restMpGain = Math.min(Math.round(maxMp * REST_MP_RATIO), 100); // 上限100点
  if (typeof lMp !== 'undefined') {
    lMp = Math.min(lMp + restMpGain, maxMp);
    window.lMp = lMp; // 同步到 window 对象
    if (typeof updateMpBars === 'function') updateMpBars();
  }

  // 气势略减（休息会被敌人看穿）
  if (typeof changeMomentum === 'function') {
    changeMomentum(-5);
  }

  // 日志提示
  log(`💤 ${LH.name} 静心休息，恢复${restMpGain}点气力`,'lm');

  // 显示休息动画效果
  const lEl = document.getElementById('fL');
  if (lEl) {
    lEl.style.filter = 'brightness(0.7)';
    setTimeout(() => { lEl.style.filter = ''; }, 500);
  }

  // 标记本回合已出牌（阻止再次出牌）
  CardSystem.playedThisTurn = CardSystem.playedThisTurn || 0;
  CardSystem.hasRested = true;

  // 禁用休息按钮（每回合只能休息一次）
  const restBtn = document.getElementById('cardRestBtn');
  if (restBtn) {
    restBtn.classList.add('disabled');
    restBtn.disabled = true;
  }

  // 更新UI
  renderCardHand(CardSystem);
  updateCardPlayPreview(CardSystem);

  // 触发敌人行动（回合结束）
  if (typeof raidTick === 'function') {
    setTimeout(() => raidTick(), 300);
  }
};

/**
 * 更新出牌预览区（升级版：使用ComboResolver展示组合效果+伤害估算）
 */
window.updateCardPlayPreview = function(cardSystem) {
  const previewEl = document.getElementById('cardPlayPreview');
  const confirmBtn = document.getElementById('cardConfirmBtn');
  const restBtn = document.getElementById('cardRestBtn');
  if (!previewEl || !confirmBtn || !restBtn) return;

  const selected = cardSystem.selectedCards;
  const count = selected.length;

  // 如果已经休息过，禁用休息按钮
  if (cardSystem.hasRested) {
    restBtn.classList.add('disabled');
    restBtn.disabled = true;
  }

  if (count === 0) {
    previewEl.innerHTML = '<div class="preview-empty">点击手牌选择（1~3张）</div>';
    confirmBtn.classList.add('disabled');
    confirmBtn.disabled = true;
    return;
  }

  const selectedCards = selected
    .map(uid => cardSystem.hand.find(c => c.uid === uid))
    .filter(Boolean);

  // 使用 ComboResolver 获取详细预览
  let resolved = null;
  if (typeof CardSystem.ComboResolver !== 'undefined' && selectedCards.length > 0) {
    resolved = CardSystem.ComboResolver.resolve(selectedCards, cardSystem, true); // isPreview = true
  }

  const preview = cardSystem.previewSelectedCards(selected);

  if (!preview.canPlay) {
    previewEl.innerHTML = `
      <div class="preview-info preview-error">
        <span class="preview-count">${count}张</span>
        <span class="preview-reason">${preview.reason}</span>
      </div>
    `;
    confirmBtn.classList.add('disabled');
    confirmBtn.disabled = true;
    return;
  }

  // MP消耗详情
  let mpHtml = preview.mpBreakdown.map((m) => {
    const discounted = m.cost < m.base;
    return `<span class="preview-mp-item${discounted ? ' discounted' : ''}">${m.card.icon}${m.card.name}${discounted ? ` <s>${m.base}</s>→${m.cost}` : `×${m.cost}`}</span>`;
  }).join(' ');

  const totalMpClass = preview.totalMp === 0 ? 'mp-free' : '';
  const isCombo = resolved && resolved.comboName;
  const isLh = resolved && resolved.comboName === '连环';
  const isNing = resolved && resolved.comboName === '凝';
  const isShi = resolved && resolved.comboName === '势';
  const isDuizi = resolved && resolved.comboName === '对子';

  // 组合特效说明
  let effectHtml = '';
  if (resolved && resolved.bonusEffects && resolved.bonusEffects.length > 0) {
    effectHtml = resolved.bonusEffects.map(e => {
      const eClass = e.type === 'cd_reset' ? 'hint-ning'
        : e.type === 'mp_free' ? 'hint-shi'
        : e.type === 'atk_buff' || e.type === 'def_debuff' ? 'hint-lianhuan'
        : 'hint-duizi';
      return `<span class="card-combo-hint ${eClass}">${e.name}：${e.value}</span>`;
    }).join(' ');
  }

  // 伤害估算（基于mult倍率估算，实际由战斗系统计算）
  let dmgEstHtml = '';
  if (resolved) {
    const dmgMultStr = resolved.damageMult ? `×${resolved.damageMult.toFixed(1)}` : '';
    if (resolved.comboName) {
      dmgEstHtml = `<div class="preview-damage-est">预估伤害倍率：<span class="dmg-value">${dmgMultStr}</span> ${resolved.extraAction ? '＋额外攻击' : ''}</div>`;
    }
  }

  // 确认按钮文字
  let confirmText = '⚔️ 确认出牌';
  if (isLh) confirmText = '💥 连环！爆发！';
  else if (isNing) confirmText = '✦ 凝！追加攻击！';
  else if (isShi) confirmText = '⚡ 势！三连击！';
  else if (isDuizi) confirmText = '👫 对子！效果增强！';
  else if (count === 3) confirmText = '⚡ 三连击！';

  previewEl.innerHTML = `
    <div class="preview-info ${isCombo ? 'preview-ready' : ''}">
      <div class="preview-row">
        <span class="preview-count">${count}张已选 ${resolved && resolved.comboName ? resolved.comboIcon : ''}</span>
        <span class="preview-mp ${totalMpClass}">消耗 ${preview.totalMp} 气</span>
      </div>
      <div class="preview-cards">${mpHtml}</div>
      ${effectHtml ? `<div class="card-combo-hints" style="margin-top:4px">${effectHtml}</div>` : ''}
      ${dmgEstHtml}
    </div>
  `;

  confirmBtn.textContent = confirmText;
  confirmBtn.classList.remove('disabled');
  confirmBtn.disabled = false;
};

/**
 * 确认出牌（升级版：使用ComboResolver统一结算，3张战法组合有专属宣告动画）
 * 1张 = 普通技能 | 2张 = 对子效果 | 3张 = 战法组合（凝/势/连环）
 */
window.CardConfirmPlay = async function() {
  if (typeof CardSystem === 'undefined' || !CardSystem.active) return;
  if (CardSystem.isAnimating) return;

  const selected = [...CardSystem.selectedCards];
  if (selected.length === 0) {
    if (typeof showToast === 'function') showToast('请先选择要出的手牌');
    return;
  }

  // ── 出牌后隐藏手牌区，让玩家看清战斗 ──
  (function hideCardHand(){
    const wrap = document.getElementById('cardHandWrap');
    if(!wrap) return;
    wrap.classList.add('card-hand-hidden');
    setTimeout(()=>{ wrap.style.display='none'; },320);
  })();

  // ── 选牌 → ComboResolver 分析 ──
  const selectedCards = selected
    .map(uid => CardSystem.hand.find(c => c.uid === uid))
    .filter(Boolean);

  if (selectedCards.length === 0) return;

  const resolved = (typeof CardSystem.ComboResolver !== 'undefined')
    ? CardSystem.ComboResolver.resolve(selectedCards, CardSystem)
    : null;

  // ── 执行出牌（扣除MP，移除手牌）──
  const result = CardSystem.playSelectedCards(selected);
  if (!result.success) {
    if (typeof showToast === 'function') showToast(result.reason || '出牌失败');
    return;
  }

  // ── 跳过动画：避免打断战斗节奏 ──
  if (typeof window.delay === 'function') await window.delay(100);

  // ── 获取组合信息 ──
  const hasCombo = resolved && resolved.comboName;
  const comboInfo = hasCombo ? {
    comboName: resolved.comboName,
    comboIcon: resolved.comboIcon || '',
    comboDesc: resolved.desc || ''
  } : null;

  // ── 获取听牌信息 ──
  const tingpai = result.tingpai || { tingpaiTriggered: false };
  if (tingpai.tingpaiTriggered && typeof showToast === 'function') {
    showToast(`🎯 听牌爆发！${tingpai.school}系伤害×${tingpai.mult}！`);
  }

  // ── 执行技能 ──
  console.log('[CardConfirmPlay] result.skills:', result.skills);
  console.log('[CardConfirmPlay] resolved:', resolved);
  console.log('[CardConfirmPlay] typeof execSkill:', typeof execSkill);
  console.log('[CardConfirmPlay] LH.skills:', LH?.skills);
  if (result.skills && result.skills.length > 0) {
    // 多张牌时，第一个技能带组合名称显示
    let firstSkill = true;
    // ── 反击蓄势：检查并应用格挡后下次出牌加成 ──
    const riposteBonus = (typeof lSt !== 'undefined' && lSt.riposteBonus > 0) ? lSt.riposteBonus : 0;
    if (riposteBonus > 0) {
      // 通过临时buff应用加成（execSkill会在applyDmg中读取lSt._bonusDmg）
      lSt._bonusDmg = (lSt._bonusDmg || 1) + riposteBonus;
      lSt.riposteBonus = 0;
      log(`💥 蓄势反击！伤害+${Math.round(riposteBonus * 100)}%`,'ls');
      if (typeof flash === 'function') flash('gold');
    }

    for (const sk of result.skills) {
      // result.skills 现在是技能对象数组（playSelectedCards 已提取 card._skill）
      console.log('[CardConfirmPlay] 准备执行技能:', sk?.id, sk?.name, typeof execSkill);
      if (sk && typeof execSkill === 'function') {
        // 只有组合出牌且是第一个技能时才显示组合名
        if (hasCombo && firstSkill && typeof showSkillCinematic === 'function') {
          // 如果同时触发了听牌，组合名改为显示听牌
          const displayName = tingpai.tingpaiTriggered
            ? `${comboInfo.comboIcon} ${comboInfo.comboName}\n🎯听牌爆发×${tingpai.mult}！`
            : sk.name;
          const displayComboName = tingpai.tingpaiTriggered ? comboInfo.comboName : null;
          const displayComboIcon = tingpai.tingpaiTriggered ? comboInfo.comboIcon : '';

          showSkillCinematic({
            side: 'l',
            skillName: displayName,
            school: sk.school || '',
            type: sk.type || '',
            isCrit: false,
            comboName: displayComboName,
            comboIcon: displayComboIcon,
            comboDesc: comboInfo.comboDesc
          });
          firstSkill = false;
        }
        // ── 检查是否是格挡技能 ──
        if (sk.type === 'shield' || (sk.name && /[护防守格盾]/.test(sk.name))) {
          // 执行格挡效果
          log(`🛡 ${LH.name} 摆出防御姿态！`,'ls');
          // 触发防御加成
          if (typeof lSt !== 'undefined') {
            lSt.defBuff = (lSt.defBuff || 0) + 0.3; // 防御+30%
            lSt.defBuffTurns = 2;
            // 格挡反击蓄势：下次出牌伤害+20%
            lSt.riposteBonus = (lSt.riposteBonus || 0) + 0.2;
            log(`🛡 蓄势反击！下次出牌伤害+20%`,'ls');
          }
          // 格挡气势减少（防御不涨气势）
          if (typeof changeMomentum === 'function') {
            changeMomentum(-5);
          }
          // 更新状态显示
          if (typeof updateBars === 'function') updateBars();
          if (typeof renderStatus === 'function') renderStatus();
          flash('blue');
        } else {
          // 执行普通技能
          execSkill(sk, 'l');
          console.log('[CardConfirmPlay] execSkill 执行完毕');
        }
      } else {
        console.warn('[CardConfirmPlay] execSkill 不可用，跳过技能', sk?.id);
      }
    }
  } else {
    console.warn('[CardConfirmPlay] result.skills 为空！');
  }

  // ── 批量积累学派（双层积累池）──
  if (typeof CardSystem !== 'undefined' && result.cards && result.cards.length > 0) {
    CardSystem.finalizeAccumulation(result.cards);
  }

  // ── 更新双层积累池UI ──
  if (typeof updateChainPools === 'function') {
    updateChainPools();
  }

  // ── 触发气势变化 ──
  const cardCount = selected.length;
  let momentumGain = 10; // 基础气势增加
  if (comboInfo) {
    // 组合出牌获得额外气势
    momentumGain += 15;
    log(`⚡ 组合出牌！气势+${momentumGain}！`,'ls');
  } else if (cardCount === 3) {
    // 三连击获得额外气势
    momentumGain += 5;
    log(`⚡ 三连击！气势+${momentumGain}！`,'ls');
  } else {
    log(`⚔ 出牌！气势+${momentumGain}！`,'lm');
  }
  if (typeof changeMomentum === 'function') {
    changeMomentum(momentumGain);
  }

  // ── 触发敌人回合 ──
  // 标记跳过 execSkill 中的 raidTick（避免重复触发）
  window._skipRaidTickInExecSkill = true;
  setTimeout(() => {
    window._skipRaidTickInExecSkill = false;
    if (typeof raidTick === 'function') {
      raidTick();
    }
  }, 100);

  // ── 重新渲染手牌 ──
  renderCardHand(CardSystem);
};

// ═══════════════════════════════════════════════════════════════
//  ✦ 手牌系统初始化集成点
//  在 battle.js 的 resetFight() 函数末尾会被调用

/**
 * 初始化手牌系统（由 battle.js 在 resetFight 末尾调用）
 */
window.initCardSystem = function() {
  if (typeof CardSystem === 'undefined') return;

  // 暴露到全局供 updateChainPools 等函数访问
  window.cardSystem = CardSystem;

  // 获取玩家技能
  const skills = (typeof LH !== 'undefined' && LH.skills) ? LH.skills : [];
  
  console.log('[initCardSystem] LH.name:', LH?.name);
  console.log('[initCardSystem] LH.skills count:', LH?.skills?.length);
  console.log('[initCardSystem] LH.skills ids:', LH?.skills?.map(s => s?.id));
  console.log('[initCardSystem] skills length:', skills?.length);
  if (skills?.length > 0) {
    console.log('[initCardSystem] skills[0]:', JSON.stringify(skills[0]));
  }

  if (skills.length === 0) {
    console.log('[CardSystem] 玩家无技能，跳过手牌系统初始化');
    CardSystem.active = false;
    return;
  }

  // 初始化手牌系统
  CardSystem.init(skills, {
    sectBonus: window._playerSectBonus || null,
  });

  // ── 隐藏传统技能栏 ──
  const skillBarEl = document.getElementById('skillBar');
  if (skillBarEl) { skillBarEl.innerHTML = ''; skillBarEl.style.display = 'none'; }

  // ── 添加通用卡牌（格挡）到摸牌池 ──
  // 格挡卡牌：虚拟技能，执行时触发格挡效果
  const GUARD_SKILL = {
    id: '__guard__',
    name: '格挡',
    icon: '🛡',
    school: '通用',
    mpCost: 0,
    type: 'defense',
    cd: 1,
    mult: 0,
    rarity: 'common',
    desc: '防御姿态，减少受到伤害',
    // 特殊处理：执行时调用格挡逻辑
    _isGuard: true,
  };

  // 将格挡加入摸牌池
  if (typeof CardSystem !== 'undefined' && CardSystem.pool) {
    // 检查是否已存在（避免重复）
    const hasGuard = CardSystem.pool.some(s => s.id === '__guard__');
    if (!hasGuard) {
      CardSystem.pool.push(GUARD_SKILL);
    }
  }

  // 渲染手牌UI
  renderCardHand(CardSystem);

  // 初始化双层积累池UI
  if (typeof updateChainPools === 'function') {
    updateChainPools();
  }
};

 * 手牌系统回合结束（由 battle.js 在 raidTick 末尾调用）

/**
 * 手牌系统战斗结束清理
 */
window.cleanupCardSystem = function() {
  if (typeof CardSystem !== 'undefined' && CardSystem.active) {
    CardSystem.reset();
    const wrap = document.getElementById('cardHandWrap');
    if (wrap) wrap.classList.remove('active');
  }
};

/**

// 构建敌人角色（兼容 battle.js 格式）

function buildEnemyCharForBattle(enemy) {

  const typeColor = {

    beast:'#c08040', bandit:'#a07050', evil:'#a040c0',

    assassin:'#8080e0', ghost:'#60e0c0', boss:'#ff6040'

  };

  const tierColor = { func:'#a08060', major:'#ffd060', elite:'#ff8060' };

  const col = tierColor[enemy.tier] || typeColor[enemy.type] || '#c09060';

  

  let dungeonContext = {};

  if (battleMode === 'dungeon') {

    try {

      dungeonContext = JSON.parse(sessionStorage.getItem('wuxia_dungeon_battle_context') || '{}');

    } catch (e) {

      dungeonContext = {};

    }

  }

  const baseDrops = Array.isArray(enemy.drops) ? enemy.drops.map(drop => ({ ...drop })) : [];

  const extraDrops = (battleMode === 'dungeon' && dungeonContext.dungeonId && typeof getDungeonExtraEnemyDrops === 'function')

    ? getDungeonExtraEnemyDrops(dungeonContext.dungeonId, enemy.id)

    : [];

  const mergedDrops = [...baseDrops, ...extraDrops];

  

  const skillObjs = (enemy.skills || []).map(sid => {



    if (typeof sid !== 'string') return sid;

    if (typeof SKILL_LIB !== 'undefined') {

      for (const school of Object.values(SKILL_LIB)) {

        const sk = Array.isArray(school) ? school.find(s => s.id === sid) : null;

        if (sk) return sk;

      }

    }

    return { id: sid, name: sid, mpCost: 0 };

  }).filter(Boolean);

  

  // 生成称号（arena 模式直接用传入的 title，其他模式用 generateEnemyTitle）
  let enemyTitle;
  if (battleMode === 'arena' && enemy.title) {
    enemyTitle = enemy.title;
  } else if (typeof generateEnemyTitle === 'function') {
    enemyTitle = generateEnemyTitle(enemy);
  } else {
    // 降级：使用简单的等级格式
    enemyTitle = (enemy.icon || '⚔') + ' Lv' + enemy.level;
  }

  

  // 为人形敌人自动生成 parts（捏脸形象）
  let parts = enemy.parts || null;
  if (!parts && !enemy.stand && !enemy.avatar) {
    const eType = enemy.type || (battleMode === 'arena' ? 'bandit' : null);
    if (eType && typeof generateEnemyParts === 'function') {
      parts = generateEnemyParts({ ...enemy, type: eType });
    }
  }

  return {

    id: '_enemy_' + enemy.id,

    name: enemy.name,

    title: enemyTitle,

    tag: enemy.tier || 'func',

    tagColor: col,

    color: col,

    level: enemy.level || 1,  // 添加 level 字段，供 checkWin 计算经验使用

    maxHp: enemy.hp,

    atk: enemy.atk,

    def: enemy.def || 0,

    speedN: enemy.spd || 8,

    crit: enemy.crit || 5,

    dodge: enemy.dodge || 3,

    mp: enemy.mp || 0,

    maxMp: enemy.mp || 0,

    exp: enemy.exp || 0,  // 基础经验值，供 calcBattleExp 读取

    stand: enemy.stand || enemy.avatar || enemy.icon || '👾',

    attack: Array.isArray(enemy.attack) ? enemy.attack : (enemy.attack ? [enemy.attack] : []),

    heavy: Array.isArray(enemy.heavy) ? enemy.heavy : (enemy.heavy ? [enemy.heavy] : []),

    hit: Array.isArray(enemy.hit) ? enemy.hit : (enemy.hit ? [enemy.hit] : []),

    down: enemy.down || '',

    parts: parts,

    skills: skillObjs,

    drops: mergedDrops,

    _drops: mergedDrops,

    tier: enemy.tier || 'func',

    _isEnemy: true,

    _isWildEnemy: true,

    _enemyTier: enemy.tier,

    _enemyType: enemy.type,

    _enemyLevel: enemy.level,

    _enemyData: { ...enemy, drops: mergedDrops },

    // 保留原始标记（门派演武场等需要）
    ...(enemy._sectArena ? { _sectArena: true, _sectId: enemy._sectId, _npcId: enemy._npcId, _oppIdx: enemy._oppIdx, _reward: enemy._reward } : {}),

  };

}





// ════════════════════════════════════════════════════

// 待机跳舞动画系统 - 长时间不操作时主角自动跳舞

// ════════════════════════════════════════════════════



(function() {

  // 配置参数

  const DANCE_CONFIG = {

    idleTime: 15000,      // 15秒无操作后开始跳舞

    noteInterval: 400,    // 音符生成间隔

    hintDuration: 3000    // 提示文字显示时长

  };



  // 舞步库配置

  const DANCE_MOVES = [

    { id: 1, name: '迪斯科', desc: '原地摇摆', sound: 'dance_disco' },

    { id: 2, name: '街舞', desc: '左右移动', sound: 'dance_hiphop' },

    { id: 3, name: '太极', desc: '圆周运动', sound: 'dance_taiji' },

    { id: 4, name: '机械舞', desc: '顿挫定格', sound: 'dance_robot' },

    { id: 5, name: '弹跳', desc: '上下蹦跳', sound: 'dance_bounce' },

    { id: 6, name: '摇摆', desc: '左右摇摆', sound: 'dance_swing' }

  ];



  let idleTimer = null;

  let isDancing = false;

  let noteTimer = null;

  let danceSoundTimer = null;

  let lastActivityTime = Date.now();

  let currentDanceMove = null;



  // 获取主角DOM元素（#fL是左侧主角）

  function getPlayerFighter() {

    return document.getElementById('fL');

  }



  // 随机选择一个舞步

  function pickRandomDanceMove() {

    return DANCE_MOVES[Math.floor(Math.random() * DANCE_MOVES.length)];

  }



  // 应用舞步动画到fighter的各个部件

  function applyDanceMove(fighter, moveId) {

    const parts = ['ft-head', 'ft-body', 'ft-arm-l', 'ft-arm-r', 'ft-legs', 'ft-aura'];

    parts.forEach(partClass => {

      const part = fighter.querySelector('.' + partClass);

      if (part) {

        // 根据部件类型选择对应的关键帧

        const partName = partClass.replace('ft-', '').replace('-l', 'L').replace('-r', 'R');

        const animName = `dance${moveId}${partName.charAt(0).toUpperCase() + partName.slice(1)}`;

        part.style.animationName = animName;

      }

    });

  }



  // 清除舞步动画

  function clearDanceMove(fighter) {

    const parts = ['ft-head', 'ft-body', 'ft-arm-l', 'ft-arm-r', 'ft-legs', 'ft-aura'];

    parts.forEach(partClass => {

      const part = fighter.querySelector('.' + partClass);

      if (part) {

        part.style.animationName = '';

      }

    });

  }



  // 开始跳舞

  function startDancing() {

    const fighter = getPlayerFighter();
    const enemy = document.getElementById('fR');

    if (!fighter || isDancing) return;



    isDancing = true;

    fighter.classList.add('ft-dancing');

    if (enemy) {
      enemy.classList.add('ft-dancing');
    }


    // 随机选择舞步

    currentDanceMove = pickRandomDanceMove();

    applyDanceMove(fighter, currentDanceMove.id);

    if (enemy) {
      applyDanceMove(enemy, currentDanceMove.id);
    }



    // 播放舞步音效

    playDanceSound();



    // 显示提示文字

    showDanceHint();



    // 开始生成音符

    noteTimer = setInterval(createDanceNote, DANCE_CONFIG.noteInterval);



    // 开始播放跳舞音效循环

    startDanceSoundLoop();



    console.log(`[Dance] 主角开始跳${currentDanceMove.name}~ 💃🕺 (${currentDanceMove.desc})`);

  }



  // 停止跳舞

  function stopDancing() {

    const fighter = getPlayerFighter();
    const enemy = document.getElementById('fR');

    if (fighter) {

      fighter.classList.remove('ft-dancing');

      // 清除舞步动画

      clearDanceMove(fighter);

    }

    if (enemy) {

      enemy.classList.remove('ft-dancing');

      clearDanceMove(enemy);

    }



    isDancing = false;

    currentDanceMove = null;



    // 停止生成音符

    if (noteTimer) {

      clearInterval(noteTimer);

      noteTimer = null;

    }



    // 停止音效循环

    if (danceSoundTimer) {

      clearInterval(danceSoundTimer);

      danceSoundTimer = null;

    }



    // 清除所有音符

    document.querySelectorAll('.ft-dance-note').forEach(n => n.remove());



    console.log('[Dance] 主角停止跳舞');

  }



  // 播放当前舞步的音效

  function playDanceSound() {

    if (currentDanceMove && currentDanceMove.sound && typeof playSound === 'function') {

      playSound(currentDanceMove.sound);

    }

  }



  // 开始音效循环（与舞步动画同步，每0.6秒一个节拍）

  function startDanceSoundLoop() {

    // 先停止旧的循环

    if (danceSoundTimer) {

      clearInterval(danceSoundTimer);

    }

    // 立即播放一次

    playDanceSound();

    // 每0.6秒循环播放，与CSS动画周期同步

    danceSoundTimer = setInterval(playDanceSound, 600);

  }



  // 显示跳舞提示

  function showDanceHint() {

    const stage = document.querySelector('.battle-stage');

    if (!stage) return;



    const hint = document.createElement('div');

    hint.className = 'ft-dance-hint';

    hint.textContent = '♪ 主角等得不耐烦了，开始跳舞~ ♪';

    hint.style.cssText = `

      position: absolute;

      top: 20%;

      left: 20%;

      transform: translateX(-50%);

      color: #f0c060;

      font-size: 14px;

      text-shadow: 0 0 10px #f0c060, 0 0 20px #ff8040;

      pointer-events: none;

      z-index: 100;

      animation: danceHintPop 0.5s ease-out, danceHintFade 2.5s ease-in 0.5s forwards;

    `;



    // 添加提示动画样式（如果不存在）

    if (!document.getElementById('dance-hint-styles')) {

      const style = document.createElement('style');

      style.id = 'dance-hint-styles';

      style.textContent = `

        @keyframes danceHintPop {

          0% { transform: translateX(-50%) scale(0.5); opacity: 0; }

          50% { transform: translateX(-50%) scale(1.1); opacity: 1; }

          100% { transform: translateX(-50%) scale(1); opacity: 1; }

        }

        @keyframes danceHintFade {

          0% { opacity: 1; transform: translateX(-50%) translateY(0); }

          100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }

        }

      `;

      document.head.appendChild(style);

    }



    stage.appendChild(hint);

    setTimeout(() => hint.remove(), DANCE_CONFIG.hintDuration);

  }



  // 创建浮动音符

  function createDanceNote() {

    const fighter = getPlayerFighter();

    const stage = document.querySelector('.battle-stage');

    if (!fighter || !stage) return;



    const notes = ['♪', '♫', '♬', '♩', '♭', '♮'];

    const colors = ['#f0c060', '#ff8040', '#40d4ff', '#c060ff', '#44ff88'];



    const note = document.createElement('div');

    note.className = 'ft-dance-note';

    note.textContent = notes[Math.floor(Math.random() * notes.length)];



    const rect = fighter.getBoundingClientRect();

    const stageRect = stage.getBoundingClientRect();



    // 随机位置（主角周围）

    const offsetX = (Math.random() - 0.5) * 80;

    const startX = rect.left - stageRect.left + rect.width / 2 + offsetX;

    const startY = rect.top - stageRect.top;



    note.style.cssText = `

      position: absolute;

      left: ${startX}px;

      top: ${startY}px;

      color: ${colors[Math.floor(Math.random() * colors.length)]};

      font-size: ${16 + Math.random() * 12}px;

      pointer-events: none;

      z-index: 50;

      animation: ftNoteFloat 1.2s ease-out forwards;

      text-shadow: 0 0 8px currentColor;

    `;



    stage.appendChild(note);



    // 动画结束后移除

    setTimeout(() => note.remove(), 1200);

  }



  // 重置空闲计时器

  function resetIdleTimer() {

    lastActivityTime = Date.now();



    // 如果正在跳舞，停止

    if (isDancing) {

      stopDancing();

    }



    // 清除旧计时器

    if (idleTimer) {

      clearTimeout(idleTimer);

    }



    // 设置新计时器

    idleTimer = setTimeout(startDancing, DANCE_CONFIG.idleTime);

  }



  // 监听用户活动

  function initDanceSystem() {

    // 各种交互事件都会重置计时器

    const events = ['mousedown', 'mousemove', 'keydown', 'touchstart', 'click', 'scroll'];



    events.forEach(event => {

      document.addEventListener(event, resetIdleTimer, { passive: true });

    });



    // 监听战斗状态变化

    const winObserver = new MutationObserver(() => {

      // 如果战斗结束，停止跳舞系统

      const winLayer = document.getElementById('winLayer');

      if (winLayer && winLayer.classList.contains('on')) {

        stopDancing();

        if (idleTimer) {

          clearTimeout(idleTimer);

          idleTimer = null;

        }

      }

    });



    const winLayer = document.getElementById('winLayer');

    if (winLayer) {

      winObserver.observe(winLayer, { attributes: true, attributeFilter: ['class'] });

    }



    // 监听fighter元素变化（resetFight重新渲染后恢复跳舞状态）

    const fighterObserver = new MutationObserver((mutations) => {

      mutations.forEach((mutation) => {

        if (mutation.type === 'childList') {

          // fL/fR被重新渲染了，如果之前在跳舞，恢复状态和舞步

          if (isDancing && currentDanceMove) {

            const fighter = getPlayerFighter();
            const enemy = document.getElementById('fR');

            if (fighter && !fighter.classList.contains('ft-dancing')) {

              fighter.classList.add('ft-dancing');

              applyDanceMove(fighter, currentDanceMove.id);

            }

            if (enemy && !enemy.classList.contains('ft-dancing')) {

              enemy.classList.add('ft-dancing');

              applyDanceMove(enemy, currentDanceMove.id);

            }

            console.log(`[Dance] 检测到重新渲染，恢复${currentDanceMove.name}状态`);

          }

        }

      });

    });



    const fLwrap = document.getElementById('fLwrap');

    if (fLwrap) {

      fighterObserver.observe(fLwrap, { childList: true, subtree: true });

    }



    // 初始启动计时器

    resetIdleTimer();



    console.log('[Dance] 待机跳舞系统已初始化，15秒无操作后主角将开始跳舞~');

  }



  // 页面加载完成后初始化

  if (document.readyState === 'loading') {

    document.addEventListener('DOMContentLoaded', initDanceSystem);

  } else {

    // 延迟初始化，确保战斗场景已渲染

    setTimeout(initDanceSystem, 1000);

  }



  // 暴露全局接口

  window.DanceSystem = {

    start: startDancing,

    stop: stopDancing,

    isDancing: () => isDancing,

    config: DANCE_CONFIG,

    moves: DANCE_MOVES,

    currentMove: () => currentDanceMove,

    // 切换到指定舞步（1-6）

    switchMove: (moveId) => {

      if (!isDancing) {

        console.log('[Dance] 先调用DanceSystem.start()开始跳舞');

        return;

      }

      const move = DANCE_MOVES.find(m => m.id === moveId);

      if (move) {

        currentDanceMove = move;

        const fighter = getPlayerFighter();

        if (fighter) applyDanceMove(fighter, moveId);

        // 切换舞步时播放对应音效

        playDanceSound();

        console.log(`[Dance] 切换到${move.name}~ ${move.desc}`);

      }

    },

    // 随机切换舞步

    randomMove: () => {

      if (!isDancing) {

        console.log('[Dance] 先调用DanceSystem.start()开始跳舞');

        return;

      }

      const move = pickRandomDanceMove();

      currentDanceMove = move;

      const fighter = getPlayerFighter();

      if (fighter) applyDanceMove(fighter, move.id);

      // 切换舞步时播放对应音效

      playDanceSound();

      console.log(`[Dance] 随机切换到${move.name}~ ${move.desc}`);

    }

  };

})();

</script>



<script>
// ═══════════════════════════════════════════════════════════════════════════
//  覆盖 updateChainPools：按花色分池更新小池UI
//  （battle-cards.js 花色系统友好补丁）
// ═══════════════════════════════════════════════════════════════════════════
function updateChainPools() {
  const cardSys = window.cardSystem;
  if (!cardSys) return;

  // ── 4花色小池 ──
  const suitConfig = {
    star:  { color: '#b088f9', glow: 'rgba(176,136,249,0.6)', label: '☽星' },
    moon:  { color: '#f0e68c', glow: 'rgba(240,230,140,0.6)', label: '☁月' },
    wind:  { color: '#87cefa', glow: 'rgba(135,206,250,0.6)', label: '☀风' },
    cloud: { color: '#90ee90', glow: 'rgba(144,238,144,0.6)', label: '☃云' },
  };

  Object.entries(suitConfig).forEach(([suit, cfg]) => {
    const poolRow = document.querySelector(`.suit-mini-pool[data-suit="${suit}"]`);
    if (!poolRow) return;
    const dots = poolRow.querySelectorAll('.suit-dot');
    const count = (cardSys.smallPoolBySuit[suit] || 0);

    dots.forEach((dot, i) => {
      const isFilled = i < count;
      dot.classList.toggle('filled', isFilled);
      if (isFilled) {
        dot.style.background = cfg.color;
        dot.style.borderColor = cfg.color;
        dot.style.boxShadow = `0 0 6px ${cfg.glow}`;
        dot.title = `${cfg.label} (${count}/3)`;
      } else {
        dot.style.background = '';
        dot.style.borderColor = '';
        dot.style.boxShadow = '';
        dot.title = cfg.label;
      }
    });
  });

  // ── 大连池（按花色分池：4花色各3格）──
  const bigPoolBySuit = cardSys.bigPoolBySuit || { star: [], moon: [], wind: [], cloud: [] };
  const suitBigConfig = {
    star:  { color: '#b088f9', glow: 'rgba(176,136,249,0.6)', label: '☽星大连' },
    moon:  { color: '#f0e68c', glow: 'rgba(240,230,140,0.6)', label: '☁月大连' },
    wind:  { color: '#87cefa', glow: 'rgba(135,206,250,0.6)', label: '☀风大连' },
    cloud: { color: '#90ee90', glow: 'rgba(144,238,144,0.6)', label: '☃云大连' },
  };

  Object.entries(suitBigConfig).forEach(([suit, cfg]) => {
    const poolRow = document.querySelector(`.suit-big-pool[data-suit="${suit}"]`);
    if (!poolRow) return;
    const dots = poolRow.querySelectorAll('.suit-dot');
    const entries = bigPoolBySuit[suit] || [];

    dots.forEach((dot, i) => {
      const isFilled = i < entries.length;
      dot.classList.toggle('filled', isFilled);
      if (isFilled) {
        const entry = entries[i];
        const comboType = entry?.comboType || 'none';
        const comboColors = {
          'lianhuan': { fill: 'linear-gradient(135deg, #c060ff, #9020e0)', border: '#d080ff', glow: 'rgba(192,96,255,0.8)', icon: '💥' },
          'ning':      { fill: 'linear-gradient(135deg, #60c0ff, #2090e0)', border: '#80d0ff', glow: 'rgba(96,192,255,0.8)',  icon: '✦' },
          'shi':       { fill: 'linear-gradient(135deg, #80ff50, #50c020)', border: '#a0ff70', glow: 'rgba(128,255,80,0.8)',  icon: '⚡' },
          'duizi':     { fill: 'linear-gradient(135deg, #ffc050, #e09020)', border: '#ffd070', glow: 'rgba(255,192,80,0.8)',  icon: '👫' },
          'none':      { fill: 'linear-gradient(135deg, #ff6060, #ff3020)', border: '#ff8080', glow: 'rgba(255,96,48,0.7)',  icon: '🔥' },
        };
        const cs = comboColors[comboType] || comboColors['none'];
        dot.style.background = cs.fill;
        dot.style.borderColor = cs.border;
        dot.style.boxShadow = `0 0 8px ${cs.glow}`;
        const name = (typeof CARD_COMBO_NAMES !== 'undefined' && CARD_COMBO_NAMES[comboType]) ? CARD_COMBO_NAMES[comboType] : comboType;
        dot.title = `${cfg.label}: ${cs.icon}${name} (${i+1}/3)`;
      } else {
        dot.style.background = '';
        dot.style.borderColor = cfg.color;
        dot.style.boxShadow = '';
        dot.title = cfg.label;
      }
    });
  });

  // 任一花色大连满时闪烁提示
  const wrapEl = document.getElementById('chainPoolsWrap');
  if (wrapEl) {
    const anyReady = Object.values(bigPoolBySuit).some(arr => arr.length >= 3);
    wrapEl.classList.toggle('chain-pool-ready', anyReady);
  }
}
